name: Tests

# Disabled 2026-05-07 per Jon: "I'd also like to disable building this on
# github actions for now while we are iterating very fast. There is no
# need to churn the servers with rust CIs until we have something we
# really need github action testing for. Keep the structure just skip
# it for now with a note."
#
# To re-enable: switch the trigger back to the original push/pull_request
# block (kept commented below). The structure of the jobs stays intact
# so re-enabling is a one-line change.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  engine-tests:
    name: ambition_engine library + integration tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: engine
      - name: cargo test -p ambition_engine
        # Library + integration tests (proptest_foundation, body_shape_fits_at,
        # wall_jump_fuzz). The engine has no system libraries so this is a
        # cheap smoke gate.
        run: cargo test -p ambition_engine

  sandbox-headless-smoke:
    name: ambition_sandbox headless smoke
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sandbox-headless
      - name: Install Bevy system dependencies
        # Bevy's default-features dragsalsa-bus-1 / wayland; the
        # `--features headless` build path of the sandbox doesn't need
        # them today, but the lib build does until subsystem gates are
        # complete (see crates/ambition_sandbox/Cargo.toml).
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config \
            libwayland-dev libxkbcommon-dev
      - name: cargo test -p ambition_sandbox --lib
        # Library tests cover the headless module (run_headless ticks,
        # sim → presentation message seam) plus encounter/cutscene/quest
        # logic. Integration tests (repro_walls.rs) run as part of this.
        run: cargo test -p ambition_sandbox --lib
      - name: cargo test -p ambition_sandbox --test repro_walls
        run: cargo test -p ambition_sandbox --test repro_walls
      - name: cargo run --bin headless (smoke 60 ticks)
        # End-to-end smoke: the headless binary boots the full
        # sim plugin chain, runs 60 sandbox ticks, and exits 0.
        # Catches plugin-init regressions the lib tests miss (e.g. a
        # missing add_message that only fires when the visible plugin
        # path runs).
        run: cargo run -p ambition_sandbox --bin headless -- 60

  format-and-clippy:
    name: rustfmt + clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
      - name: Install Bevy system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config \
            libwayland-dev libxkbcommon-dev
      - name: cargo fmt -- --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        # Don't fail on warnings here yet — the codebase has ~14 known
        # warnings (unused imports in feature-gated paths). Run clippy
        # for visibility but with `--message-format=short` so PR reviews
        # can spot regressions without blocking on them.
        run: cargo clippy --workspace --all-targets --message-format=short || true
