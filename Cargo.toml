[workspace]
members = [
    "crates/ambition_engine",
    "crates/ambition_sandbox",
    "crates/ambition_sfx",
    "crates/ambition_sfx_bank",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "Apache-2.0"
authors = ["Jon Crall + ChatGPT"]
description = "Ambition: a code-generated endgame movement sandbox for a mathematical AI-first platformer."

[profile.dev.package."*"]
opt-level = 3
