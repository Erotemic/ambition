<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Ambition — Web (first-pass)</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #05060a;
            color: #d6d8e6;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            overflow: hidden;
        }
        #stage {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }
        /*
         * `fit_canvas_to_parent: true` in run_web() resizes the canvas to
         * track this parent's size, so the canvas fills the viewport
         * without a JS resize observer.
         */
        canvas#bevy {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
            background: #0a0c14;
        }
        #status {
            position: fixed;
            left: 12px;
            bottom: 10px;
            font-size: 12px;
            opacity: 0.65;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="stage">
        <canvas id="bevy" tabindex="0"></canvas>
    </div>
    <div id="status">Ambition · wasm32 first pass · click the canvas to capture keyboard</div>

    <!--
        AudioContext unlock shim. Browsers create the Web Audio
        `AudioContext` in the `suspended` state and only let
        `ctx.resume()` succeed if the call originates from a user
        gesture handler. Kira (via cpal's webaudio backend) creates
        the AudioContext at startup — well before any gesture — and
        cpal calls `ctx.resume()` lazily from inside `Stream::play()`.
        Those play calls are dispatched from Bevy's RAF loop, not from
        the gesture handler, so `resume()` silently fails and audio
        stays muted forever.

        Standard fix: patch the AudioContext constructor so we can
        track every context cpal creates, and resume them ourselves
        from a real DOM gesture handler. This is run BEFORE the wasm
        module so the patch wraps cpal's eventual `new AudioContext()`.

        Source-link this in `docs/web_audio_manual_test.md` when
        debugging silent audio.
    -->
    <script>
        (function () {
            const Orig = window.AudioContext || window.webkitAudioContext;
            if (!Orig) {
                console.warn("[ambition-audio] no AudioContext on this browser; audio will be silent");
                return;
            }
            const tracked = [];
            const Patched = function (...args) {
                const ctx = new Orig(...args);
                tracked.push(ctx);
                console.info(
                    "[ambition-audio] AudioContext created (state=" + ctx.state +
                    ", sampleRate=" + ctx.sampleRate + "). " +
                    (ctx.state === "suspended"
                        ? "Waiting for first user gesture to resume."
                        : "Already running.")
                );
                return ctx;
            };
            Patched.prototype = Orig.prototype;
            window.AudioContext = Patched;
            if (window.webkitAudioContext) {
                window.webkitAudioContext = Patched;
            }

            const status = () =>
                tracked.map((c) => c.state).join(", ") || "<none>";

            const resumeAll = (evtType) => {
                if (tracked.length === 0) {
                    return;
                }
                let attempted = 0;
                for (const ctx of tracked) {
                    if (ctx.state === "suspended") {
                        attempted++;
                        ctx.resume()
                            .then(() =>
                                console.info(
                                    "[ambition-audio] resume() succeeded via " + evtType +
                                    " (now state=" + ctx.state + ")"
                                )
                            )
                            .catch((err) =>
                                console.warn(
                                    "[ambition-audio] resume() failed via " + evtType + ":",
                                    err
                                )
                            );
                    }
                }
                if (attempted > 0) {
                    console.info(
                        "[ambition-audio] attempted resume on " + attempted +
                        " suspended context(s); current states=[" + status() + "]"
                    );
                }
            };

            const events = ["pointerdown", "keydown", "touchstart", "click"];
            for (const evt of events) {
                document.addEventListener(evt, () => resumeAll(evt), {
                    capture: true,
                    passive: true,
                });
            }
            console.info(
                "[ambition-audio] AudioContext unlock hook installed (listeners: " +
                events.join(", ") + ")"
            );
        })();
    </script>

    <!--
        First-pass JS bootstrap. The wasm-bindgen `--target web` pipeline
        emits `pkg/ambition_gameplay_core.js` (the JS shim) and
        `pkg/ambition_gameplay_core_bg.wasm` (the module) next to this HTML file.
        `init()` instantiates the module; the `#[wasm_bindgen(start)]`
        hook in `lib.rs` (`web_start`) then fires on its own and boots
        `app::run_web()`.

        See `docs/web_build.md` for the build command that produces `pkg/`.
    -->
    <script type="module">
        import init from "./pkg/ambition_gameplay_core.js";

        const status = document.getElementById("status");
        const canvas = document.getElementById("bevy");

        try {
            await init();
            status.textContent = "Ambition · loaded · click the canvas to capture keyboard";
            canvas.focus();
        } catch (err) {
            console.error(err);
            status.textContent = "Ambition · failed to load wasm (see console)";
        }
    </script>
</body>
</html>
