[package]
name = "ambition_render"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Ambition's Bevy presentation layer: the sandbox's default renderer (sprite/world sync, parallax, HUD overlay, screen-space FX, cutscene UI, fonts). Reads the sim machinery in ambition_gameplay_core; never mutates it. Extracted so the sim->render seam is a crate boundary the sandbox lib cannot cross."

[lib]
crate-type = ["rlib"]

[features]
default = []
# Forwarders: cfg(feature = "...") gates inside this crate key off OUR feature
# names; each forwards to the matching ambition_gameplay_core machinery feature so a
# mismatched combination is a compile error, never a silent missing system.
input = ["dep:leafwing-input-manager", "ambition_gameplay_core/input"]
# The reusable portal renderer the world-sync code installs when portals draw.
portal_render = ["dep:ambition_portal_presentation", "ambition_gameplay_core/portal_render"]

[dependencies]
# The machinery this crate renders. Same always-on baseline every persona used
# pre-split (ldtk/input/portal are not end-to-end cfg-gated in the sandbox).
ambition_gameplay_core = { path = "../ambition_gameplay_core", default-features = false, features = [
    "ldtk_runtime",
    "input",
    "portal",
] }
ambition_platformer_primitives = { path = "../ambition_platformer_primitives" }
# The VFX message vocabulary `fx` re-exports (`ambition_vfx::vfx::*`).
ambition_vfx = { path = "../ambition_vfx" }
ambition_sprite_sheet = { path = "../ambition_sprite_sheet" }
# The cutscene format + live state the cutscene UI plays back.
ambition_cutscene = { path = "../ambition_cutscene" }
# Font id resolution for the UI font loader (`ui_fonts`).
ambition_asset_manager = { path = "../ambition_asset_manager", features = ["bevy"] }
# The reusable portal renderer (portal_render only); world-sync installs it.
ambition_portal_presentation = { path = "../ambition_portal_presentation", optional = true }

# Render-facing by definition: the 2D + UI render pipeline for sprites, Mesh2d,
# bevy_ui nodes, and text. `ui_api` matches the sandbox baseline; the render
# features (`2d_bevy_render`, `ui_bevy_render`, `scene`, `png`) are what a
# headless sandbox drops — this crate always needs them because it draws.
bevy = { version = "0.18.1", default-features = false, features = [
    "ui_api",
    "2d_bevy_render",
    "ui_bevy_render",
    "scene",
    "png",
] }

leafwing-input-manager = { version = "0.20", optional = true }
