[package]
name = "ambition_render"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Ambition's Bevy presentation layer: the sandbox's default renderer (sprite/world sync, parallax, HUD overlay, screen-space FX, cutscene UI, fonts). Consumes sim read-models and lower presentation vocabulary; never depends on or mutates actor machinery."

[lib]
crate-type = ["rlib"]

[features]
default = []
# Forwarders: cfg(feature = "...") gates inside this crate key off OUR feature
# names; app/content composition chooses the matching producer-side features so
# mismatched combinations are a compile error, never a silent missing system.
input = ["ambition_sim_view/input"]
# The reusable portal renderer the world-sync code installs when portals draw.
portal_render = ["dep:ambition_portal_presentation"]

[dependencies]
ambition_sim_view = { path = "../ambition_sim_view" }
ambition_ui_nav = { path = "../ambition_ui_nav" }
ambition_projectiles = { path = "../ambition_projectiles" }
ambition_platformer_primitives = { path = "../ambition_platformer_primitives" }
ambition_engine_core = { path = "../ambition_engine_core" }
ambition_entity_catalog = { path = "../ambition_entity_catalog" }
ambition_world = { path = "../ambition_world" }
ambition_characters = { path = "../ambition_characters" }
ambition_persistence = { path = "../ambition_persistence" }
# The VFX message vocabulary `fx` re-exports (`ambition_vfx::vfx::*`).
ambition_vfx = { path = "../ambition_vfx" }
ambition_sfx = { path = "../ambition_sfx" }
ambition_time = { path = "../ambition_time" }
ambition_sprite_sheet = { path = "../ambition_sprite_sheet" }
ambition_dev_tools = { path = "../ambition_dev_tools" }
# The cutscene format + live state the cutscene UI plays back.
ambition_cutscene = { path = "../ambition_cutscene" }
# Font id resolution for the UI font loader (`ui_fonts`).
ambition_asset_manager = { path = "../ambition_asset_manager", features = ["bevy"] }
# The reusable portal renderer (portal_render only); world-sync installs it.
ambition_portal_presentation = { path = "../ambition_portal_presentation", optional = true }

# Render-facing by definition: the 2D + UI render pipeline for sprites, Mesh2d,
# bevy_ui nodes, and text. `ui_api` matches the sandbox baseline; the render
# features (`2d_bevy_render`, `ui_bevy_render`, `scene`, `png`) are what a
# headless sandbox drops — this crate always needs them because it draws.
bevy = { version = "0.18.1", default-features = false, features = [
    "ui_api",
    "2d_bevy_render",
    "ui_bevy_render",
    "scene",
    "png",
] }
