[package]
name = "ambition_runtime"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "The platformer ENGINE face (demo plan E5): a `PlatformerEnginePlugins` plugin group that assembles the content-free simulation plugins, so a game (Ambition, or a demo) builds an engine App by adding this group + its own content crate. The demo gate — S5/M-track apps depend on this, not on ambition_app."

[dependencies]
# The headless sim feature set: the sim schedule + LDtk runtime spine, WITHOUT
# the desktop/visible/devtools stack. A demo app layers its own presentation on
# top. (Feature unification with a visible host app is fine — it only ever ADDS
# rendering features the host already declares.)
ambition_actors = { path = "../ambition_actors", default-features = false, features = [
    "headless",
    "input",
    "portal_ldtk",
] }
ambition_dialog = { path = "../ambition_dialog", features = ["input"] }
ambition_projectiles = { path = "../ambition_projectiles" }
ambition_combat = { path = "../ambition_combat" }
ambition_encounter = { path = "../ambition_encounter" }
ambition_characters = { path = "../ambition_characters" }
ambition_portal = { path = "../ambition_portal" }
ambition_sim_view = { path = "../ambition_sim_view", features = ["input"] }
# The combat-phase chain's effect seam (`EffectRequest`/`apply_effects`) —
# sim-side effect vocabulary, not presentation.
ambition_vfx = { path = "../ambition_vfx" }
# The per-frame player/room schedule wiring (E5 step 5): the world-clock
# refresh, the input-set vocabulary, and the body-cluster component types the
# player frame registers as required components.
ambition_time = { path = "../ambition_time" }
ambition_input = { path = "../ambition_input" }
ambition_engine_core = { path = "../ambition_engine_core" }
# The engine sim messages/resource defaults (E5 step 6, SimCoreResourcesPlugin).
ambition_sfx = { path = "../ambition_sfx" }
ambition_persistence = { path = "../ambition_persistence" }
ambition_menu = { path = "../ambition_menu" }
ambition_items = { path = "../ambition_items" }
ambition_platformer_primitives = { path = "../ambition_platformer_primitives" }
ambition_dev_tools = { path = "../ambition_dev_tools" }
# The authored world IR — `ActiveRoomMetadata` is what the mode-scope seam
# (D-C) reads to decide which hosted ruleset is awake.
ambition_world = { path = "../ambition_world" }
bevy_common_assets = { version = "0.15", features = ["ron"] }
blake3 = "1"
bevy_ggrs = "0.21"
bevy = { version = "0.18.1", default-features = false, features = [
    # add_headless_foundation: asset/image registries + states for a
    # windowless engine app (bevy_ecs_ldtk touches Image handles).
    "bevy_asset",
    "bevy_image",
    "bevy_state",
] }

[features]
# Forward the sim-relevant feature gates so a consumer can opt into the same
# optional subsystems the plugin group conditionally bundles. Kept minimal for
# the first assembly; widened as more plugins migrate in.
portal = ["ambition_actors/portal"]
