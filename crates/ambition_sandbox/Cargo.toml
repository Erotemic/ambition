[package]
name = "ambition_sandbox"
version = "0.2.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Bevy-powered playable sandbox for Ambition Engine."

[lib]
crate-type = ["rlib", "cdylib"]

[features]
# Default preserves the full desktop sandbox / development posture. Android
# builds use the `android` composite below with `--no-default-features` so the
# phone build keeps gameplay/touch/audio/LDtk while avoiding desktop-only
# inspector/file-watcher tooling.
default = ["desktop_dev"]

# Full desktop sandbox. This is the regular `cargo run` experience: visible
# gameplay plus inspector/devtools, mobile touch, and RL/test adapters.
desktop_dev = ["visible", "desktop_platform", "dev_tools", "mobile_touch", "rl_sim"]


# Desktop platform support mirrors Bevy's default platform collection: windowing,
# desktop gamepads via gilrs, default font fallback, system info, and desktop
# display backends. Keep this out of Android so phone builds do not initialize
# unsupported desktop gamepad backends.
desktop_platform = ["bevy/default_platform"]

# Android platform support is intentionally narrower than Bevy's
# `default_platform`: it keeps the Android GameActivity/winit/std pieces needed
# to launch the app, but excludes `bevy_gilrs`, desktop display backends,
# sysinfo_plugin, and web-only platform features.
android_platform = [
    "bevy/std",
    "bevy/android-game-activity",
    "bevy/android_shared_stdcxx",
    "bevy/bevy_winit",
    "bevy/default_font",
    "bevy/multi_threaded",
]

# Web/browser platform support. First-pass wasm32 build: bevy's canvas-backed
# winit, default font, and WebGL2 renderer plus the `bevy/web` glue. Excludes
# `bevy_gilrs`, x11/wayland, sysinfo_plugin, and `multi_threaded` (the latter
# needs wasm atomics + nightly). `console_error_panic_hook` and `wasm-bindgen`
# wire the JS bootstrap that loads the wasm module from `web/index.html` and
# routes panics to the browser console.
web_platform = [
    "bevy/std",
    "bevy/bevy_winit",
    "bevy/default_font",
    "bevy/web",
    "bevy/webgl2",
    "dep:console_error_panic_hook",
    "dep:wasm-bindgen",
]

# Composite for the playable Bevy app. Desktop and Android both build on this.
visible = ["ldtk_runtime", "input", "audio", "ui", "physics_debris"]

# Shared backbone for the two browser personas. Mirrors `visible` but
# drops the subsystems that don't yet have a wasm story: audio
# (kira/fundsp), UI polish (yarnspinner/material_ui), physics debris
# (avian2d), file watcher, mobile touch (virtual_joystick), and dev
# tools (egui inspector). `static_map` is mandatory because the wasm
# build has no synchronous filesystem reader for `sandbox.ldtk`.
visible_web_base = ["ldtk_runtime", "input", "static_map"]

# Composite for the "embed core assets" browser persona. Bundles the
# LDtk world + a bounded set of UI fonts + primary character sheets +
# core entity sprites into the wasm binary. Smaller asset footprint
# on the host; bigger binary. Out-of-set sprites fall back to colored
# rectangles. See `docs/web_build.md` for the build/check commands.
visible_web = ["visible_web_base", "static_core_assets"]

# Composite for the "served assets" browser persona. Bundles LDtk only;
# every other visual / audio asset is fetched over HTTP from the
# `/assets/` tree served alongside `index.html`. The sandbox selects
# `AssetProfile::WebServedAssets` automatically when the `web_served`
# feature is enabled (see `crate::game_assets::default_asset_profile`).
# The full "same game in the browser" mode.
visible_web_served = ["visible_web_base", "web_served"]

# Browser persona — embedded core assets. The composite a `wasm-pack
# build` / `wasm-bindgen --target web` step builds against by default;
# see `docs/web_build.md`.
web = ["visible_web", "web_platform"]

# Browser persona — served assets. Use with `./build_for_web.sh --served`
# (which symlinks/copies `crates/ambition_sandbox/assets/` into
# `crates/ambition_sandbox/web/assets/` so the served pages can reach
# them under `/assets/...`).
web_served_assets = ["visible_web_served", "web_platform"]

# Marker feature read by `crate::game_assets::default_asset_profile`
# to flip the wasm default to `AssetProfile::WebServedAssets`. No deps
# of its own — composing it pulls in the right sandbox behavior.
web_served = []

# RL / programmatic-input adapter. The `rl_sim` module + `SandboxSim`
# stepping API + `AgentAction` / `AgentObservation` shapes. Enabled
# by default so research code and the in-tree binaries (`rl_random_walker`,
# `rl_smoke`, `trace_replay`) build out of the box; can be disabled
# for tightly-stripped builds (e.g. console ports, distribution
# binaries that don't need the RL surface).
rl_sim = []

# Composite for the headless simulation binary. Intentionally enables
# nothing: this is the lever that strips heavy deps from the dep graph
# once subsystem code-side gates land. See docs/path_forward.md step A.
# As of this commit only `dev_tools` has a code gate; building headless
# fully (without dragging Kira/Avian/inspector/bevy_ecs_ldtk) needs the
# remaining subsystem gates.
headless = []

# Devtools: egui inspector plugins + Bevy file watcher for hot reload.
dev_tools = ["dep:bevy-inspector-egui", "bevy/file_watcher"]

# Backward-compat alias used by docs/CI before `dev_tools` existed.
# File-watcher only, no inspector; matches prior `dev_hot_reload` semantics.
dev_hot_reload = ["bevy/file_watcher"]

# Opt-in self-contained map build. Normal sandbox builds load
# assets/ambition/worlds/sandbox.ldtk from disk so LDtk edits and modded maps do
# not require recompiling Rust. Enabling this feature also embeds the checked-in
# map and falls back to it if the external map cannot be read or parsed.
static_map = []

# Embed a bounded "core visual" subset (UI fonts + primary character sheets +
# core entity sprite PNGs) into the binary via `include_bytes!`, and register
# them with Bevy's `EmbeddedAssetRegistry` via `AmbitionAssetSourcePlugin`.
# Intended for `WebStatic` / `BundledStatic` builds where there is no
# filesystem to read from. Desktop dev builds normally leave this off — the
# loose `assets/` tree under `cargo run` is the source of truth there.
#
# Composes with `static_map`: `static_map` embeds the LDtk world JSON,
# `static_core_assets` embeds the visual layer. The `web` composite feature
# enables both.
static_core_assets = []

# Opt-in static SFX bank embedding. This is mainly for Android until the
# synchronous SFX-bank loader can read from APK assets. The build script enables
# this automatically when crates/ambition_sandbox/assets/audio/sfx.bank exists
# and passes AMBITION_STATIC_SFX_BANK_PATH for include_bytes!.
static_sfx_bank = []

# Android phone-test packaging. This is platform composition, not a stripped
# release persona: keep the playable sandbox, touch controls, audio, LDtk,
# UI, and RL/test seams, but do not pull desktop-only inspector/file-watcher
# tooling into the phone build. Keep `static_map` here for now because the
# sandbox LDtk world is synchronously parsed before Bevy's Android AssetServer
# path can hand it to the runtime; the APK still packages the loose asset tree
# for sprites/audio/fonts and future map-loading work.
android = ["visible", "android_platform", "mobile_touch", "rl_sim", "static_map"]

# Explicit alias for Android builds that still include sandbox/dev gameplay
# behavior. Kept separate so future phone-only diagnostics can be added without
# changing the base Android packaging feature.
android_dev = ["android"]

# Subsystem gates. Deps are flipped to `optional = true` so toggling
# these features actually moves crates in/out of the dep graph. Code
# inside these subsystems is not yet cfg-gated end-to-end, so disabling
# them today only works when paired with `--features visible` (where
# they're all enabled).
ldtk_runtime = ["dep:bevy_ecs_ldtk", "dep:bevy_asset_loader"]
audio = ["dep:bevy_kira_audio", "dep:fundsp"]
ui = ["dep:bevy_material_ui", "dep:bevy_yarnspinner"]
physics_debris = ["dep:avian2d"]
input = ["dep:leafwing-input-manager"]
# Mobile / Android touch input. Pulls `virtual_joystick` for the
# on-screen sticks; the supporting Bevy systems live behind this feature
# flag so desktop / gamepad / headless builds skip the touch path.
# Pure helper (`mobile_input::fold_touch_into_control_frame`) is
# always-available so its tests run in a default `cargo test` without
# requiring the feature.
mobile_touch = ["input", "dep:virtual_joystick"]

# Bevy/Tracy per-system profiling. Off by default because it pulls
# `tracing-tracy` and instruments every Bevy system, increasing binary
# size and runtime overhead. Build with `cargo run --features profile`
# and connect the Tracy GUI to record a flamegraph. See
# `docs/profiling.md` for the workflow.
profile = ["bevy/trace", "bevy/trace_tracy"]

[dependencies]
ambition_engine = { path = "../ambition_engine" }
# `ambition_sfx` stays in the dep graph regardless of the `audio`
# feature: it has no audio backend deps and the sim layer
# (`features.rs`) needs `SfxId` to enqueue SFX-only events generically.
# Headless / RL builds compile it but never play through it.
ambition_sfx = { path = "../ambition_sfx" }
# Logical asset catalog + per-profile source resolution. Bevy + sfx
# features so the sandbox can format `AssetPath` strings through the
# catalog and (in a follow-up) route the SFX bank bytes through the
# same id space. See `docs/asset_manager.md`.
ambition_asset_manager = { path = "../ambition_asset_manager", features = [
    "bevy",
    "sfx",
] }
avian2d = { version = "0.5", optional = true }
bevy = { version = "0.18.1", default-features = false, features = [
    "default_app",
    "2d_bevy_render",
    "ui_api",
    "ui_bevy_render",
    "scene",
    "png",
] }
bevy_common_assets = { version = "0.15", features = ["ron"] }
bevy_yarnspinner = { version = "0.8", optional = true }
bevy_material_ui = { version = "0.2.7", default-features = false, features = ["bevy_minimal"], optional = true }
bevy_asset_loader = { version = "0.26", optional = true }
bevy_ecs_ldtk = { version = "0.14", optional = true }
bevy-inspector-egui = { version = "0.36", optional = true }
bevy_kira_audio = { version = "0.25", default-features = false, features = ["wav", "ogg"], optional = true }
fundsp = { version = "0.23", optional = true }
leafwing-input-manager = { version = "0.20", optional = true }
virtual_joystick = { version = "2.7.2", default-features = false, optional = true }
# Browser bootstrap deps. Pulled in only by the `web_platform` feature.
# `wasm-bindgen` exposes the `#[wasm_bindgen(start)]` entry point that
# `web/index.html` loads; `console_error_panic_hook` forwards panics to the
# browser console so a first-pass crash is debuggable.
console_error_panic_hook = { version = "0.1", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
petgraph = "0.8"
ron = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# tune_preview renders music to WAV via the audio subsystem; it can't
# build without `audio` enabled. `headless` and the lib build target are
# unaffected.
[[bin]]
name = "tune_preview"
required-features = ["audio"]

# music_track_report walks the embedded sandbox.ron audio manifest and
# prints id/name/bpm/duration/validation per track. The optional WAV
# render reuses the audio subsystem so this binary requires `audio`
# the same way `tune_preview` does.
[[bin]]
name = "music_track_report"
required-features = ["audio"]

# headless binary doesn't need any subsystem features (the sim's seam
# is feature-gated; messages drain harmlessly without subscribers).
# It does use SandboxSim for the --dump-trace path so the `rl_sim` feature
# is required.
[[bin]]
name = "headless"
required-features = ["rl_sim"]

# RL / fuzz / replay binaries that drive SandboxSim. All gated behind
# the `rl_sim` feature so a no-rl_sim build skips the bins entirely.
[[bin]]
name = "rl_random_walker"
required-features = ["rl_sim"]

[[bin]]
name = "rl_smoke"
required-features = ["rl_sim"]

[[bin]]
name = "trace_replay"
required-features = ["rl_sim"]
