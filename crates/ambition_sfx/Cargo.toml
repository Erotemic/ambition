[package]
name = "ambition_sfx"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "SFX runtime contract for Ambition: SfxId, SfxClip, SfxProvider trait, and Bank/Filesystem/Silent/Layered providers."

[features]
# `bevy` (default) enables the gameplay-facing `SfxMessage` request enum,
# which derives `bevy_ecs::Message` and carries `bevy_math::Vec2`. Disable
# (`default-features = false`) to keep the crate Bevy-free for headless /
# RL / benchmarking use — only `SfxId` / providers / ids remain.
default = ["bevy"]
bevy = ["dep:bevy_ecs", "dep:bevy_math"]

[dependencies]
ambition_sfx_bank = { path = "../ambition_sfx_bank" }
thiserror = "1"
bevy_ecs = { version = "0.18.1", default-features = false, optional = true }
bevy_math = { version = "0.18.1", optional = true }
