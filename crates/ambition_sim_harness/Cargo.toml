[package]
name = "ambition_sim_harness"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Programmatic simulation harness: reset/step, typed AgentAction, AgentObservation, example reward shaping, and a random-walk policy over a headless Bevy sim App. The harness composes the engine foundation and accepts a caller-supplied content/plugin composition, so a demo, test, or RL driver runs a sim WITHOUT linking Ambition's product shell (ambition_app)."

[lib]
crate-type = ["rlib"]

[dependencies]
# The engine surface: runtime foundation, actor/world/input/characters/items
# vocabulary. The harness reaches these through the facade exactly as the moved
# code did; the facade does NOT depend on ambition_app/ambition_content, so the
# harness stays below the product shell.
ambition = { path = "../ambition" }
# Bevy App/World/Time — the sim the harness owns and steps.
bevy = { version = "0.18.1", default-features = false }

[dev-dependencies]
# The exit-gate test composes a minimal sim (a one-room session) through the
# harness using only the reusable engine surface — proving a sim runs through the
# harness WITHOUT linking `ambition_app` (the product shell).
ambition = { path = "../ambition" }
bevy = { version = "0.18.1", default-features = false }
