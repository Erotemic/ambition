[package]
name = "ambition_sim_view"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "[the observation boundary] (E4): the SimView read-model — per-body pose + velocity views, the feature/actor/boss/nameplate indexes, the item/hud/prop fact resources, and the follow-camera snapshot resolve. Rebuilt once per sim tick as pure functions of sim state; render, RL observation, netcode confirmation, and slower-light shaders are all the SAME KIND of consumer."

[lib]
crate-type = ["rlib"]

[features]
default = []
# The blink-preview fact reads device actions, so it exists only with the
# input layer; forwarded so a mismatched combination is a compile error.
input = ["ambition_actors/input"]

[dependencies]
# The sim this crate observes (Tier 3 → Tier 4 arrow; render depends on THIS
# crate for views instead of querying the sim heart).
ambition_actors = { path = "../ambition_actors", default-features = false, features = [
    "ldtk_runtime",
    "input",
    "portal",
] }
ambition_projectiles = { path = "../ambition_projectiles" }
ambition_characters = { path = "../ambition_characters" }
ambition_engine_core = { path = "../ambition_engine_core" }
ambition_entity_catalog = { path = "../ambition_entity_catalog" }
ambition_interaction = { path = "../ambition_interaction" }
ambition_platformer_primitives = { path = "../ambition_platformer_primitives" }
ambition_time = { path = "../ambition_time" }
ambition_persistence = { path = "../ambition_persistence" }
ambition_input = { path = "../ambition_input", features = ["input"] }
leafwing-input-manager = "0.20"
bevy = { version = "0.18.1", default-features = false, features = ["bevy_state"] }
bevy_math = "0.18"
