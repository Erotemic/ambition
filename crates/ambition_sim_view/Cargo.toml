[package]
name = "ambition_sim_view"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Reusable sim -> presentation read-model vocabulary (the materialized snapshot types the renderer consumes) extracted from ambition_gameplay_core. The seam that lets presentation compile without the 95k gameplay crate (fable review D3)."

[lib]
# rlib only: the shared read-model vocabulary. gameplay_core WRITES these types
# (its per-frame view builders) and the renderer READS them, so both depend on
# this small leaf crate instead of the renderer depending on gameplay_core.
crate-type = ["rlib"]

[dependencies]
# Vec2 (the neutral 2D vector every body/feature reports positions in).
ambition_engine_core = { path = "../ambition_engine_core" }
# Only the ECS derive surface (Component) is needed — no render/audio/window.
bevy = { version = "0.18.1", default-features = false }
