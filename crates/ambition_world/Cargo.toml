[package]
name = "ambition_world"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Backend-agnostic authored world IR: room graph, placement records, moving-platform math, and room metadata."

[features]
default = []

[dependencies]
ambition_engine_core = { path = "../ambition_engine_core" }
ambition_entity_catalog = { path = "../ambition_entity_catalog" }
ambition_time = { path = "../ambition_time" }
# `FeatureEcsWorldOverlay` — the per-frame dynamic contribution `CollisionWorld`
# composites onto the authored room (R3). Content-free vocabulary; this crate
# depends on nothing but `engine_core` itself, so the edge stays downward.
ambition_platformer_primitives = { path = "../ambition_platformer_primitives" }
bevy_app = { version = "0.18.1", default-features = false }
bevy_ecs = { version = "0.18.1", default-features = false }
petgraph = "0.8"
ron = "0.11"
serde = { version = "1", features = ["derive"] }
