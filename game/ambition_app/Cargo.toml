[package]
name = "ambition_app"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Ambition app shell: assembly, binaries, host glue, headless/RL drivers."

[lib]
crate-type = ["rlib", "cdylib"]

[features]
# Personas mirror the pre-split ambition_actors graph; each forwards to the
# machinery lib (ambition_actors) and the content crate so one selection
# configures the whole stack. Command lines change from
# `-p ambition_actors` to `-p ambition_app` and keep the same feature names.
default = ["desktop_dev"]
desktop_dev = [
    "visible",
    "desktop_platform",
    "dev_tools",
    "mobile_touch",
    "rl_sim",
    "falling_sand",
]

visible = [
    "ambition_actors/visible",
    "ambition_content/portal",
    "ambition_content/portal_render",
    "ambition_content/ui",
    "ambition_content/audio",
    "ldtk_runtime",
    "input",
    "audio",
    "ui",
    "physics_debris",
    "portal",
    "portal_render",
    "frame_pacing",
    "bevy_ui_menu",
    "kaleidoscope_menu",
]

portal = ["ambition_actors/portal", "ambition_content/portal", "ambition_runtime/portal", "ambition_host/portal"]
portal_render = ["portal", "ambition_render/portal_render", "ambition_content/portal_render", "ambition_host/portal_render"]
portal_ldtk = ["portal", "ambition_actors/portal_ldtk"]

desktop_platform = ["ambition_actors/desktop_platform"]
android_platform = ["ambition_actors/android_platform"]
web_platform = [
    "ambition_actors/web_platform",
    "dep:console_error_panic_hook",
    "dep:wasm-bindgen",
]

visible_web_base = [
    "ambition_actors/visible_web_base",
    "ambition_content/portal",
    "ambition_content/portal_render",
    "ldtk_runtime",
    "input",
    "static_map",
    "portal",
    "portal_render",
    "bevy_ui_menu",
]
visible_web = ["visible_web_base", "static_core_assets"]
visible_web_served = ["visible_web_base", "web_served", "web_audio"]
web = ["visible_web", "web_platform"]
web_served_assets = ["visible_web_served", "web_platform"]
web_served = ["ambition_actors/web_served"]
web_audio = ["audio", "ambition_actors/web_audio"]

rl_sim = ["ambition_actors/rl_sim"]
headless = ["ambition_actors/headless"]
dev_tools = ["ambition_actors/dev_tools", "dep:bevy-inspector-egui"]
dev_hot_reload = ["ambition_actors/dev_hot_reload"]
static_map = ["ambition_actors/static_map", "ambition_content/static_map"]
static_core_assets = ["ambition_actors/static_core_assets"]
static_sfx_bank = ["ambition_actors/static_sfx_bank"]
android = [
    "visible",
    "android_platform",
    "mobile_touch",
    "rl_sim",
    "static_map",
]
android_dev = ["android", "dev_tools"]

ldtk_runtime = ["ambition_actors/ldtk_runtime", "dep:bevy_ecs_ldtk", "dep:bevy_asset_loader"]
audio = [
    "ambition_actors/audio",
    "ambition_content/audio",
    "ambition_audio/kira",
    "dep:bevy_kira_audio",
]
ui = ["ambition_actors/ui", "ambition_content/ui", "dep:bevy_material_ui", "dep:bevy_yarnspinner"]
physics_debris = ["ambition_actors/physics_debris"]
input = ["ambition_actors/input", "ambition_render/input", "ambition_host/input", "dep:leafwing-input-manager"]
mobile_touch = ["input", "ambition_actors/mobile_touch", "ambition_touch_input/mobile_touch"]
falling_sand = ["ambition_content/falling_sand"]
bevy_ui_menu = ["ambition_actors/bevy_ui_menu"]
kaleidoscope_menu = ["ambition_actors/kaleidoscope_menu"]
frame_pacing = ["ambition_actors/frame_pacing", "dep:bevy_framepace"]
profile = ["ambition_actors/profile"]

[dependencies]
ambition_actors = { path = "../../crates/ambition_actors", default-features = false }
ambition_sprite_sheet = { path = "../../crates/ambition_sprite_sheet" }
ambition_projectiles = { path = "../../crates/ambition_projectiles" }
# The engine face (E5): the app assembles its sim from `PlatformerEnginePlugins`
# — the same group a demo app uses — plus its app-local host wiring.
ambition_runtime = { path = "../../crates/ambition_runtime" }
# The windowed-host face (E5 step 5): leafwing bindings + camera cluster.
ambition_host = { path = "../../crates/ambition_host" }
ambition_sim_view = { path = "../../crates/ambition_sim_view", features = ["input"] }
ambition_content = { path = "../ambition_content" }
ambition_render = { path = "../../crates/ambition_render" }
ambition_portal = { path = "../../crates/ambition_portal" }
ambition_portal_presentation = { path = "../../crates/ambition_portal_presentation" }
ambition_combat = { path = "../../crates/ambition_combat" }
ambition_cutscene = { path = "../../crates/ambition_cutscene" }
ambition_engine_core = { path = "../../crates/ambition_engine_core" }
ambition_entity_catalog = { path = "../../crates/ambition_entity_catalog" }
ambition_characters = { path = "../../crates/ambition_characters" }
ambition_input = { path = "../../crates/ambition_input" }
ambition_items = { path = "../../crates/ambition_items" }
ambition_inventory_ui = { path = "../../crates/ambition_inventory_ui" }
# Touch/mobile input adapter — carved out of `src/host/mobile_input/` (app-thinness).
# Its `mobile_touch` feature (forwarded below) gates the virtual-joystick plugin.
ambition_touch_input = { path = "../../crates/ambition_touch_input" }
ambition_ui_nav = { path = "../../crates/ambition_ui_nav" }
ambition_platformer_primitives = { path = "../../crates/ambition_platformer_primitives" }
ambition_persistence = { path = "../../crates/ambition_persistence" }
ambition_asset_manager = { path = "../../crates/ambition_asset_manager", features = ["bevy"] }
ambition_audio = { path = "../../crates/ambition_audio" }
ambition_sfx = { path = "../../crates/ambition_sfx" }
ambition_vfx = { path = "../../crates/ambition_vfx" }
ambition_menu = { path = "../../crates/ambition_menu" }
# The bevy_lunex cube renderer — the first engine extension crate (E1e). The
# app's kaleidoscope_app host installs it to render the menu page model as a cube.
ambition_menu_kaleidoscope = { path = "../ambition_menu_kaleidoscope" }
ambition_time = { path = "../../crates/ambition_time" }
bevy = { version = "0.18.1", default-features = false, features = ["ui_api"] }
bevy_common_assets = { version = "0.15", features = ["ron"] }
bevy_yarnspinner = { version = "0.8", optional = true }
bevy_material_ui = { version = "0.2.7", default-features = false, features = ["bevy_minimal"], optional = true }
bevy_asset_loader = { version = "0.26", optional = true }
bevy_ecs_ldtk = { version = "0.14", optional = true }
bevy-inspector-egui = { version = "0.36", optional = true }
bevy_kira_audio = { version = "0.25", default-features = false, features = ["wav", "ogg"], optional = true }
bevy_framepace = { version = "0.21", default-features = false, optional = true }
leafwing-input-manager = { version = "0.20", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.11"
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# Browser builds intentionally opt getrandom into the JS/Web Crypto backend.
# Several transitive deps use different getrandom major versions; enabling the
# features here makes Cargo feature-unify the already-pinned versions for the
# wasm target without affecting native builds.
getrandom_02 = { package = "getrandom", version = "=0.2.17", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "=0.3.4", features = ["wasm_js"] }
getrandom_04 = { package = "getrandom", version = "=0.4.2", features = ["wasm_js"] }

[[bin]]
name = "ambition_game_bin"
path = "src/bin/ambition_game_bin.rs"


[[bin]]
name = "capture_scene"
path = "src/bin/capture_scene.rs"
required-features = ["visible"]

[[bin]]
name = "headless"
required-features = ["rl_sim"]

[[bin]]
name = "rl_random_walker"
required-features = ["rl_sim"]

[[bin]]
name = "rl_smoke"
required-features = ["rl_sim"]

[[bin]]
name = "trace_replay"
required-features = ["rl_sim"]

[dev-dependencies]
insta = { version = "1", features = ["ron"] }
proptest = "1"
