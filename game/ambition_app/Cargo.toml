[package]
name = "ambition_app"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Ambition app shell: assembly, binaries, host glue, headless/RL drivers."

[lib]
crate-type = ["rlib", "cdylib"]

[features]
# Personas mirror the pre-split ambition_actors graph; each forwards to the
# machinery lib (ambition_actors) and the content crate so one selection
# configures the whole stack. Command lines change from
# `-p ambition_actors` to `-p ambition_app` and keep the same feature names.
default = ["desktop_dev"]
desktop_dev = [
    "visible",
    "desktop_platform",
    "dev_tools",
    "mobile_touch",
    "rl_sim",
    "falling_sand",
]

visible = [
    "ambition/visible",
    "ambition_content/portal",
    "ambition_content/portal_render",
    "ambition_content/ui",
    "ambition_content/audio",
    "ldtk_runtime",
    "input",
    "audio",
    "ui",
    "physics_debris",
    "portal",
    "portal_render",
    "frame_pacing",
    "bevy_ui_menu",
    "kaleidoscope_menu",
    "ambition/basic_shell_presentation",
]

portal = ["ambition/portal", "ambition_content/portal"]
portal_render = ["portal", "ambition/portal_render", "ambition_content/portal_render"]
portal_ldtk = ["portal", "ambition/portal_ldtk"]

desktop_platform = ["ambition/desktop_platform"]
android_platform = ["ambition/android_platform"]
web_platform = [
    "ambition/web_platform",
    "dep:console_error_panic_hook",
    "dep:wasm-bindgen",
]

visible_web_base = [
    "ambition/visible_web_base",
    "ambition_content/portal",
    "ambition_content/portal_render",
    "ldtk_runtime",
    "input",
    "static_map",
    "portal",
    "portal_render",
    "bevy_ui_menu",
]
visible_web = ["visible_web_base", "static_core_assets"]
visible_web_served = ["visible_web_base", "web_served", "web_audio"]
web = ["visible_web", "web_platform"]
web_served_assets = ["visible_web_served", "web_platform"]
web_served = ["ambition/web_served"]
web_audio = ["audio", "ambition/web_audio"]

rl_sim = ["ambition/rl_sim"]
headless = ["ambition/headless"]
dev_tools = ["ambition/dev_tools", "dep:bevy-inspector-egui"]
dev_hot_reload = ["ambition/dev_hot_reload"]
static_map = ["ambition/static_map", "ambition_content/static_map"]
static_core_assets = ["ambition/static_core_assets"]
static_sfx_bank = ["ambition/static_sfx_bank"]
android = [
    "visible",
    "android_platform",
    "mobile_touch",
    "rl_sim",
    "static_map",
]
android_dev = ["android", "dev_tools"]

ldtk_runtime = ["ambition/ldtk_runtime", "dep:bevy_ecs_ldtk", "dep:bevy_asset_loader"]
audio = [
    "ambition/audio",
    "ambition_content/audio",
    "dep:bevy_kira_audio",
]
ui = ["ambition/ui", "ambition_content/ui", "dep:bevy_material_ui", "dep:bevy_yarnspinner"]
physics_debris = ["ambition/physics_debris"]
input = ["ambition/input", "dep:leafwing-input-manager"]
mobile_touch = ["input", "ambition/mobile_touch"]
falling_sand = ["ambition_content/falling_sand"]
bevy_ui_menu = ["ambition/bevy_ui_menu"]
kaleidoscope_menu = ["ambition/kaleidoscope_menu"]
frame_pacing = ["ambition/frame_pacing", "dep:bevy_framepace"]
profile = ["ambition/profile"]

[dependencies]
# The linked game providers of the multi-game shell host. The HOST depends on
# providers; providers never depend on hosts (each also runs unchanged in its
# own standalone demo app).
ambition_demo_sanic = { path = "../ambition_demo_sanic" }
ambition_demo_pocket = { path = "../ambition_demo_pocket" }
ambition_demo_smb1 = { path = "../ambition_demo_smb1" }
ambition = { path = "../../crates/ambition" }
ambition_content = { path = "../ambition_content" }
ambition_menu_kaleidoscope = { path = "../ambition_menu_kaleidoscope" }
bevy = { version = "0.18.1", default-features = false, features = ["ui_api"] }
bevy_common_assets = { version = "0.15", features = ["ron"] }
bevy_yarnspinner = { version = "0.8", optional = true }
bevy_material_ui = { version = "0.2.7", default-features = false, features = ["bevy_minimal"], optional = true }
bevy_asset_loader = { version = "0.26", optional = true }
bevy_ecs_ldtk = { version = "0.14", optional = true }
bevy-inspector-egui = { version = "0.36", optional = true }
bevy_kira_audio = { version = "0.25", default-features = false, features = ["wav", "ogg"], optional = true }
bevy_framepace = { version = "0.21", default-features = false, optional = true }
leafwing-input-manager = { version = "0.20", optional = true }
console_error_panic_hook = { version = "0.1", optional = true }
wasm-bindgen = { version = "0.2", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.11"
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# Browser builds intentionally opt getrandom into the JS/Web Crypto backend.
# Several transitive deps use different getrandom major versions; enabling the
# features here makes Cargo feature-unify the already-pinned versions for the
# wasm target without affecting native builds.
getrandom_02 = { package = "getrandom", version = "=0.2.17", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "=0.3.4", features = ["wasm_js"] }
getrandom_04 = { package = "getrandom", version = "=0.4.2", features = ["wasm_js"] }

[[bin]]
name = "ambition_game_bin"
path = "src/bin/ambition_game_bin.rs"


[[bin]]
name = "capture_scene"
path = "src/bin/capture_scene.rs"
required-features = ["visible"]

[[bin]]
name = "headless"
required-features = ["rl_sim"]

[[bin]]
name = "rl_random_walker"
required-features = ["rl_sim"]

[[bin]]
name = "rl_smoke"
required-features = ["rl_sim"]

[[bin]]
name = "trace_replay"
required-features = ["rl_sim"]

[dev-dependencies]
insta = { version = "1", features = ["ron"] }
proptest = "1"
