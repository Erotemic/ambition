[package]
name = "ambition_demo_sanic_app"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "The Sanic demo's thin SHELL: foundation + PlatformerEnginePlugins + PlatformerHostPlugins + the demo's content and rules crates. Playbook exit 3, executable."

[[bin]]
name = "sanic_demo"
path = "src/main.rs"

[features]
default = []
# Draw the world AND make it playable. Adds the engine's generic presentation face
# (OV1), the renderer's `visible` chain, AND the standard host input path (`input`)
# — a windowed demo that ignored the keyboard would not be a playable-persona demo.
# Without it the shell steps the sim headlessly (`tests/exit_3.rs`, the `sanic_demo`
# bin default).
visible = ["ambition/visible", "ambition/audio", "input", "dep:bevy_kira_audio"]
# The STANDARD host input path (leafwing bindings + the device→ControlFrame bridge +
# the fixed-tick latch), the same production wiring the full app uses. Folded into
# `visible` above so the windowed binary is interactive; also usable alone for the
# headless `tests/standard_input_path.rs` proof.
input = ["ambition/input"]

[dependencies]
# The engine, host, and vocabulary — through the ONE umbrella surface. A demo app
# depends on `ambition`, never on `ambition_app`. That is the demo gate.
ambition = { path = "../../crates/ambition", default-features = false }
# The demo's own content + rules. The shell names nothing else.
ambition_demo_sanic = { path = "../ambition_demo_sanic" }
# Bevy's derives cannot be reached through a re-export (see the content crate's
# manifest). The shell needs none, but `App`/`Update` come from here.
bevy = { version = "0.18.1", default-features = false }
bevy_kira_audio = { version = "0.25", default-features = false, features = ["ogg"], optional = true }
