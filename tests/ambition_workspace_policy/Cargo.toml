# The sequestered workspace-policy package.
#
# It holds every *repository-structure* test: source scans, dependency
# boundaries, module-size limits, architecture ratchets, forbidden-name checks,
# workspace consistency, and their poison tests. See
# `docs/planning/engine/test-organization-migration.md` and
# `docs/architecture/architecture-boundaries.md`.
#
# It INSPECTS the workspace as data (parsed manifests + source walking); it does
# NOT depend on any production Ambition crate. That is the whole point: running
# the policy suite must not compile `ambition_app` (or any game crate).
[package]
name = "ambition_workspace_policy"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
publish = false
description = "Sequestered workspace-policy tests: dependency boundaries, source scans, module-size, architecture ratchets, and their poison tests. Inspects the workspace as data; links no production crate."

[dependencies]
# Parsed TOML for workspace + manifest structure (the task's first-class option,
# lighter than cargo_metadata: no subprocess, no camino/semver graph). serde is
# already in the workspace lock via Bevy.
serde = { version = "1", features = ["derive"] }
toml = "0.9"
walkdir = "2"

# One integration-test binary, not one per rule file. Its independently
# filterable tests are `repository_policies`, `engine_policies`, `game_policies`,
# and `policy_runner_self_tests`.
[[test]]
name = "policy"
path = "tests/policy.rs"
