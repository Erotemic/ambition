# ControlFrame allowlist configuration (unified-actors step 5 / R6c guardrail).
#
# The invariant: the global `ControlFrame` is ONE player's device frame; only the
# INPUT LAYER may hold it. A body/sim system that reads it is silently slot-0-only
# (possession, co-op, netcode slot routing all break quietly).
#
# The SCANNER is Rust (src/custom/control_frame.rs) — the Res<>/ResMut<>/World
# holder detection, enclosing-fn attribution, whole-word matching, and cfg(test)
# skipping are too semantic for a generic rule. Only CONFIGURATION lives here: the
# scoped sim roots, excluded subpaths, the review marker, and the justified
# allowlist of holders (file + fn + bridge category + reason).
#
# Bidirectional, like the determinism lints: an unlisted holder fails, AND an
# allowlist entry matching no holder fails (that is exactly how unified-actors.md
# B3's holder list rotted). Roots are scoped so engine_policies (crates/*) and
# game_policies (game/ambition_content) run independently off one scanner.

source_doc = "docs/planning/engine/unified-actors.md"
rationale = "ControlFrame allowlist: only the input layer may hold the global device frame; a body/sim holder is silently slot-0-only and breaks possession/co-op/netcode slot routing (N1). Every allowed holder is a justified input-layer bridge or a named multiplayer TODO."
review_marker = "AMBITION_REVIEW(control_frame)"
non_sim_subpaths = ["menu/", "dev/", "audio/", "assets/", "persistence"]

