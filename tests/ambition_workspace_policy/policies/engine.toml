# Engine-scope policies: crates/* layering, foundation purity, determinism,
# control-frame ownership, module-size.
#
# Run: cargo test -p ambition_workspace_policy engine_policies
#
# The custom scanners (module-size, determinism, control-frame) also run under
# `engine_policies`; they carry their own config files and are invoked from
# tests/policy.rs. Anchor policy below keeps the declarative scan non-vacuous;
# real ratchets are appended by Tasks 4/6/9.

[[policy]]
id = "engine.engine-core-is-foundation-clean"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_engine_core"]
watch_paths = ["crates/ambition_engine_core/src"]
rationale = "ambition_engine_core is the bottom foundation crate: geometry, body contract, control-frame vocabulary. It must never name the headless composition tier, the content crate, or the app shell — those are strictly above it."
source_doc = "docs/planning/engine/architecture.md"
severity = "error"
roots = ["crates/ambition_engine_core/src"]
forbid = ["ambition_content", "ambition_app", "ambition_runtime"]

# ── migrated from crates/ambition_host/tests/host_names_no_content.rs (Task 4) ──

# was: manifest_does_not_depend_on_ambition_content
[[policy]]
id = "engine.host-names-no-content"
scope = "engine"
kind = "dependency-denylist"
owners = ["ambition_host"]
watch_paths = ["crates/ambition_host/Cargo.toml"]
rationale = "The windowed host is the ENGINE face's presentation companion, not a game: it must never depend on ambition_content. Locks the E5-step-5 exit invariant from the scaffold onward."
source_doc = "docs/planning/engine/decomposition.md#E5"
severity = "error"
manifest = "crates/ambition_host/Cargo.toml"
deny = ["ambition_content"]

# was: sources_name_no_content_crate
[[policy]]
id = "engine.host-source-names-no-content"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_host"]
watch_paths = ["crates/ambition_host/src"]
rationale = "The moment the host moves a system that reaches for a content type, this fails instead of the boundary rotting. Docs deliberately MENTION the forbidden crate, so comments are exempt."
source_doc = "docs/planning/engine/decomposition.md#E5"
severity = "error"
roots = ["crates/ambition_host/src"]
forbid = ["ambition_content"]

# ── migrated from crates/ambition_render/tests/observation_boundary.rs (Task 4) ──

# was: render_never_names_live_sim_state (E4 observation boundary)
[[policy]]
id = "engine.render-never-names-live-sim-state"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_render"]
watch_paths = ["crates/ambition_render/src"]
rationale = "Presentation reads ONLY the ambition_sim_view read-model — never the sim heart's live Body* clusters, actor/boss cluster refs, control seams, or item/ability sim components. Reintroducing a Query<&BodyKinematics> in render fails here. Whole-identifier match so GroundItemVisual does not trip GroundItem; vocabulary/data types (FeatureView, CharacterAnim, Health-as-data) are deliberately NOT forbidden."
source_doc = "docs/planning/engine/decomposition.md#E4"
severity = "error"
whole_ident = true
roots = ["crates/ambition_render/src"]
forbid = [
    "BodyKinematics", "BodyGroundState", "BodyWallState", "BodyBlinkState",
    "BodyFlightState", "BodyDashState", "BodyLedgeState", "BodyModeState",
    "BodyEnvironmentContact", "BodyAbilities", "BodyDodgeState", "BodyShieldState",
    "BodyCombat", "BodyHealth", "BodyMana", "BodyWallet", "BodyMelee",
    "BodyAnimFacts", "BodyBaseSize",
    "ControlledSubject", "ActorControl", "SlotControls", "PlayerBlinkCameraState",
    "ActorSpriteData", "BossClusterRef", "BossAttackState", "BossPhase",
    "ActorDisposition", "ActorIdentity", "ActorStatus", "ActorConfig", "ActorRoll",
    "MeleeSwing", "CenteredAabb", "FeatureSimEntity", "FeatureName",
    "HeldItem", "GroundItem", "HeldProjectile", "PlayerMark", "HealShrine",
    "GravityFlipSwitch", "LiveProjectile", "PlayerProjectileState",
]

