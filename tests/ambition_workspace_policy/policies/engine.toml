# ── App-local audio authority ratchet (audio process-global retirement) ──
# The former process-global audio install/override seam is retired: authored
# music and SFX are App-local (a provider registers an
# `ambition_audio::catalog::AudioCatalogFragment`; hosts read the assembled
# `AudioCatalogRegistry` resource or pass a selected registry explicitly). This
# rejects re-introduction of the retired global seam anywhere in runtime source.
[[policy]]
id = "engine.audio-authority-is-app-local"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_audio", "ambition_actors"]
watch_paths = ["crates/ambition_actors/src", "crates/ambition_audio/src", "game/ambition_content/src", "game/ambition_app/src", "game/ambition_demo_sanic/src", "game/ambition_demo_smb1/src"]
rationale = "Authored audio is App-local via AudioCatalogRegistry. The retired process-global install/override seam (install_music_registry / install_sfx_registry / authored_music_registry / authored_sfx_registry / *_REGISTRY_OVERRIDE) must never return; a new host reads the registry resource instead."
source_doc = "docs/planning/engine/startup-loading-and-frontend-flow.md"
severity = "error"
roots = ["crates/ambition_actors/src", "crates/ambition_audio/src", "game/ambition_content/src", "game/ambition_app/src", "game/ambition_demo_sanic/src", "game/ambition_demo_smb1/src"]
forbid = ["install_music_registry", "install_sfx_registry", "authored_music_registry", "authored_sfx_registry", "MUSIC_REGISTRY_OVERRIDE", "SFX_REGISTRY_OVERRIDE"]

# ── One frame-aware movement kernel (ADR 0024) ──
# Every integrated movable body carries exactly ONE explicit `MotionModel`;
# absence is never a policy. An `Option<&MotionModel>` or `Without<MotionModel>`
# query is the "missing model means axis-swept" convention returning — the exact
# ambiguity the unified kernel removed. Policy-specific whole-tick solvers are
# `pub(crate)` (visibility is the guard there); this rejects the QUERY-side
# regression rustc cannot see.
[[policy]]
id = "engine.movement-model-is-never-optional"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_engine_core", "ambition_actors"]
watch_paths = ["crates", "game"]
rationale = "ADR 0024 §1: absence is never a movement policy. No production query may treat MotionModel as optional or filter on its absence; every integrated body carries a variant from spawn and dispatch happens inside step_motion."
source_doc = "docs/adr/0024-frame-aware-unified-movement-kernel.md"
severity = "error"
production_only = true
skip_tests = true
roots = ["crates", "game"]
forbid = [
    "Option<&MotionModel>", "Option<&mut MotionModel>", "Without<MotionModel>",
    "Option<&crate::features::MotionModel>", "Option<&mut crate::features::MotionModel>",
    "Without<crate::features::MotionModel>",
    "Option<&'static MotionModel>", "Option<&'static mut MotionModel>",
    "Option<&'static mut crate::features::MotionModel>",
]

# The crawler is an explicit movement POLICY dispatched inside the kernel; the
# authored `surface_walker` flag exists only as the spawn-time selector in
# `ActorTuning::motion_model`. Any other production read is a hidden third
# integrator (or a policy branch outside the kernel) growing back.
[[policy]]
id = "engine.crawler-flag-is-spawn-selection-only"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_actors"]
watch_paths = ["crates/ambition_actors/src"]
rationale = "ADR 0024 §8: the former surface_walker integrator is the AdhesiveCrawler policy. The authored boolean selects the MotionModel once at spawn (ActorTuning::motion_model); runtime dispatch reads the body's explicit model, never the flag."
source_doc = "docs/adr/0024-frame-aware-unified-movement-kernel.md"
severity = "error"
production_only = true
skip_tests = true
skip_paths = ["features/ecs/actor_tuning.rs", "features/enemies/mod.rs"]
roots = ["crates/ambition_actors/src"]
forbid = ["tuning.surface_walker", ".config.tuning.surface_walker"]

# ADR 0024 authority model: every production write to authoritative body pose
# belongs to a NAMED authority — the movement kernel (continuous integration),
# `transit_body` (discrete teleports), `carry_body`/`constrain_body_pose`
# (external kinematic constraints), or a domain integrator (projectiles, free
# items, the portal core's aperture transit). A bare `kin.pos = …` anywhere
# else is an authority leak: it moves a body without reconciling contacts,
# attachment, model-private state, or the §3.1 motion record.
[[policy]]
id = "engine.pose-writes-are-authority-only"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_engine_core", "ambition_actors"]
watch_paths = ["crates", "game"]
rationale = "ADR 0024 authority model: body pose writes go through the kernel, transit_body, carry_body/constrain_body_pose, or a sanctioned domain integrator — never a bare field write."
source_doc = "docs/adr/0024-frame-aware-unified-movement-kernel.md"
severity = "error"
production_only = true
skip_tests = true
roots = ["crates", "game"]
forbid = [
    "kin.pos = ", "kin.pos += ", "kin.pos -= ",
    "kinematics.pos = ", "kinematics.pos += ", "kinematics.pos -= ",
    "kin.pos.x = ", "kin.pos.y = ", "kinematics.pos.x = ", "kinematics.pos.y = ",
]
skip_paths = [
    # The authorities themselves + kernel-internal solvers.
    "ambition_engine_core/src/movement/",
    "ambition_engine_core/src/ledge_grab/",
    # Engine body-shape ops (feet-planted resize recenters).
    "ambition_engine_core/src/player_state.rs",
    # Sanctioned domain integrators: generic kinematic bodies, projectile
    # physics, free thrown items, and the portal core's aperture transit
    # (whose kernel-body reconciliation is completed by the content adapter).
    "ambition_platformer_primitives/src/kinematic.rs",
    "ambition_platformer_primitives/src/projectile/",
    "ambition_projectiles/src/",
    "ambition_portal/src/transit.rs",
    "ambition_actors/src/items/pickup/",
    # Dev tooling body-profile resize (feet-planted recenter).
    "ambition_dev_tools/src/dev_tools/editable.rs",
]

# ADR 0024 frame law: body-relative MECHANICS consume the body's per-tick
# ResolvedMotionFrame — published once by the frame resolution phase — never a
# reconstructed frame. Point sampling (`dir_at`) and the presentation
# `GravityField` mirror remain legal ONLY for observation: rendering, sprite
# roll easing, dev overlays, touch glyph labels, and the gravity machinery
# itself. A mechanics-side read is a second frame resolver growing back.
[[policy]]
id = "engine.mechanics-consume-the-resolved-frame"
scope = "engine"
kind = "forbidden-source-reference"
owners = ["ambition_engine_core", "ambition_actors"]
watch_paths = ["crates", "game"]
rationale = "ADR 0024 frame law: gameplay mechanics read ResolvedMotionFrame; dir_at/GravityField are observation-only (render, roll easing, dev, the gravity machinery)."
source_doc = "docs/adr/0024-frame-aware-unified-movement-kernel.md"
severity = "error"
production_only = true
skip_tests = true
roots = [
    "crates/ambition_actors/src",
    "crates/ambition_combat/src",
    "crates/ambition_characters/src",
    "game",
]
forbid = [".dir_at(", "Res<GravityField>", "gravity_dir_or_default("]
skip_paths = [
    # The gravity machinery + frame resolution phase itself.
    "ambition_actors/src/gravity/",
    # Free-body integrators resolve per body inline (dir_for) and feed the
    # shared world-forces seam through a local field value.
    "ambition_actors/src/items/pickup/",
    # Presentation, dev tooling, and the RL observation port.
    "ambition_app/src/dev/",
    "ambition_app/src/rl_sim/",
    # The portal adapters orient exits from the presentation mirror (the
    # portal core moves cluster-less bodies too); recorded residual debt.
    "ambition_content/src/portal/",
]

