[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ambition-background-renderer"
version = "0.1.0"
description = "Procedural placeholder parallax background layer renderer for Ambition."
requires-python = ">=3.10"
dependencies = ["Pillow>=10"]

[project.scripts]
ambition-background-renderer = "ambition_background_renderer.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["ambition_background_renderer*"]
