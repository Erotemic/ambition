[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "ambition-ldtk-tools"
version = "0.1.0"
description = "Modal CLI for editing, validating, and repairing the Ambition sandbox.ldtk"
requires-python = ">=3.10"
dependencies = [
  "PyYAML",
  "jsonschema",
  "requests",
  # python-ron wraps the Rust `ron` crate so the Python side parses
  # exactly what the Rust side does. Used by `area_authoring` (post-
  # Phase 4 RON spec format) and any future Python tooling that
  # consumes RON. See `ambition_ldtk_tools/ron_parse.py`.
  "python-ron>=0.2.5",
]

[project.scripts]
ambition-ldtk-tools = "ambition_ldtk_tools.cli:main"

[tool.setuptools.packages.find]
include = ["ambition_ldtk_tools*"]
namespaces = false
