# drain_alley — fourth room of the intro sequence.
#
# Beat: First post-lab decompression. Player lands behind the gate
# stack in a maintenance alley. Oiler — a street mechanic, not a
# mentor — finds them and offers a repair / movement tip. Signage
# starts shifting tone from "horror basement" to "annoyed
# infrastructure city."
#
# Layout (1024x512):
#
#   +---------------------------------------------------+
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ |
#   | [vent in]                                          |
#   |                                                    |
#   |                                                    |
#   |       [Oiler]   [news board]      [→ gate stack]   |
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒│ ← floor
#   +---------------------------------------------------+
id: drain_alley
level_id: drain_alley
world_x: 106000
world_y: 0
px_wid: 1024
px_hei: 512
fill_collision: empty
bg_color: "#1B201A"
biome: cave

entities:
  # --- Outer geometry.
  - type: Solid
    px: [0, 480]
    size: [1024, 32]
    fields: { name: floor }
  - type: Solid
    px: [0, 0]
    size: [16, 480]
    fields: { name: left_wall }
  - type: Solid
    px: [1008, 0]
    size: [16, 480]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [992, 32]
    fields: { name: ceiling }

  # --- Vent-in from the escape shaft (top-left).
  - type: LoadingZone
    px: [16, 384]
    size: [48, 96]
    fields:
      id: drain_alley_entry
      name: drain_alley_entry
      activation: walk
      target_room: intro_escape_shaft
      target_zone: escape_shaft_exit
      bidirectional: true

  # --- Player spawn (only used on direct jump).
  - type: PlayerStart
    px: [96, 434]
    size: [28, 46]
    fields: { name: drain_alley_spawn }

  # --- Oiler: the first post-lab helper. Practical street mechanic.
  - type: NpcSpawn
    px: [320, 432]
    size: [32, 48]
    fields:
      name: Oiler
      prompt: "Talk to Oiler"
      dialogue_id: oiler_intro

  # --- News board: implicit lying-headline reveal about the lab incident.
  - type: NpcSpawn
    px: [560, 432]
    size: [32, 48]
    fields:
      name: News Board
      prompt: "Read the news board"
      dialogue_id: news_board_lab_incident

  # --- Exit to the gate stack hub on the right.
  - type: LoadingZone
    px: [960, 384]
    size: [48, 96]
    fields:
      id: drain_alley_exit
      name: drain_alley_exit
      activation: Door
      target_room: gate_stack_lower
      target_zone: gate_stack_drain_entry
      bidirectional: true

  # --- Camera zone.
  - type: CameraZone
    px: [0, 0]
    size: [1024, 512]
    fields: { id: drain_alley_camera, name: drain_alley_camera, mode: Default }

  # --- Diegetic labels for tone shift.
  - type: DebugLabel
    px: [40, 64]
    size: [320, 24]
    fields:
      name: drain_alley_signage_staff_only
      text: "DRAIN MARKET — STAFF ONLY"
      category: Custom
  - type: DebugLabel
    px: [40, 96]
    size: [320, 24]
    fields:
      name: drain_alley_signage_no_swordguns
      text: "No swordguns inside the food court"
      category: Custom
  - type: DebugLabel
    px: [40, 128]
    size: [320, 24]
    fields:
      name: drain_alley_signage_ripples
      text: "Report unstable ripples to platform staff"
      category: Custom
  - type: DebugLabel
    px: [880, 416]
    size: [120, 24]
    fields:
      name: drain_alley_exit_arrow
      text: "→ Gate Stack"
      category: Custom
