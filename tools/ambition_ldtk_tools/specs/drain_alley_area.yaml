# drain_alley — fourth room of the intro sequence.
#
# Beat: First post-lab decompression. Oiler finds the player; signage
# shifts tone from horror-basement to annoyed-infrastructure-city.
#
# Transitions: both EdgeExits at the side walls (walk-through).
id: drain_alley
level_id: drain_alley
world_x: 106000
world_y: 0
px_wid: 1024
px_hei: 512
fill_collision: empty
bg_color: "#1B201A"
biome: cave

entities:
  - type: Solid
    px: [0, 480]
    size: [1024, 32]
    fields: { name: floor }
  - type: Solid
    px: [16, 0]
    size: [992, 32]
    fields: { name: ceiling }

  # Left-edge EdgeExit (from escape shaft).
  - type: LoadingZone
    px: [0, 0]
    size: [16, 480]
    fields:
      id: drain_from_escape
      name: drain_from_escape
      activation: EdgeExit
      target_room: intro_escape_shaft
      target_zone: escape_to_drain
      bidirectional: true

  - type: PlayerStart
    px: [120, 434]
    size: [28, 46]
    fields: { name: drain_alley_spawn }

  - type: NpcSpawn
    px: [320, 432]
    size: [32, 48]
    fields:
      name: Oiler
      prompt: "Talk to Oiler"
      dialogue_id: oiler_intro

  - type: NpcSpawn
    px: [560, 432]
    size: [32, 48]
    fields:
      name: News Board
      prompt: "Read the news board"
      dialogue_id: news_board_lab_incident

  # Right-edge EdgeExit (to gate stack).
  - type: LoadingZone
    px: [1008, 0]
    size: [16, 480]
    fields:
      id: drain_to_gate_stack
      name: drain_to_gate_stack
      activation: EdgeExit
      target_room: gate_stack_lower
      target_zone: gate_stack_from_drain
      bidirectional: true

  - type: CameraZone
    px: [0, 0]
    size: [1024, 512]
    fields: { id: drain_alley_camera, name: drain_alley_camera, mode: Default }

  - type: DebugLabel
    px: [40, 64]
    size: [320, 24]
    fields:
      name: drain_alley_signage_staff_only
      text: "DRAIN MARKET — STAFF ONLY"
      category: Custom
  - type: DebugLabel
    px: [40, 96]
    size: [320, 24]
    fields:
      name: drain_alley_signage_no_swordguns
      text: "No swordguns inside the food court"
      category: Custom
  - type: DebugLabel
    px: [40, 128]
    size: [320, 24]
    fields:
      name: drain_alley_signage_ripples
      text: "Report unstable ripples to platform staff"
      category: Custom
  - type: DebugLabel
    px: [840, 320]
    size: [160, 24]
    fields:
      name: drain_alley_exit_arrow
      text: "→ Gate Stack"
      category: Custom
