# gate_stack_lower — Right Utility Switchback (intro-v1 Task 05).
#
# Beat: route-choice junction. Drain Market on the left, official
# gate signage and a portal mechanic in the middle, a sky tease at
# the top, a private side entrance from the Alice/Bob route at the
# bottom (forward-declared), and the combat calibration lab on the
# right. The room shows multiple access models side by side so the
# player understands official/private/neutral/chaotic before any
# dialogue explains them.
#
# Identifier kept as `gate_stack_lower` so existing LoadingZone
# targets in drain_alley and central_hub_complex do not need
# rewriting. Comments / debug labels carry the utility-switchback
# reinterpretation. worldX corrected from the stale spec value
# 108000 to the live value 4928.
#
# Transitions:
# - Left-edge EdgeExit `gate_stack_from_drain` ← drain_alley
# - Right-edge EdgeExit `gate_to_combat_lab` → combat_calibration_lab
#   (Task 05 stub; Task 06 fills out the lab interior.)
# - Mid-room Door `pirate_sky_up` → pirate_sky_arena (existing).
# - Mid-room Door `intro_portal_zone` → central_hub_complex
#   (existing, gated by `intro_portal_switch` via `GatedZoneRegistry`).
# - Forward-declared: a `gate_from_alice_private` connection from
#   alice_relay's `alice_private_return_lock` once Task 08 wires
#   `bob_field_survey_received` into the gating registry. For now a
#   LockWall + label holds the slot.
id: gate_stack_lower
level_id: gate_stack_lower
world_x: 4928
world_y: 0
px_wid: 1600
px_hei: 768
fill_collision: empty
bg_color: "#161D29"
biome: lab

entities:
  - type: Solid
    px: [0, 736]
    size: [1600, 32]
    fields: { name: floor }
  - type: Solid
    px: [16, 0]
    size: [1568, 32]
    fields: { name: ceiling }

  - type: OneWayPlatform
    px: [128, 320]
    size: [256, 16]
    fields: { name: gate_stack_left_balcony }
  - type: OneWayPlatform
    px: [1216, 320]
    size: [256, 16]
    fields: { name: gate_stack_right_balcony }

  # Left-edge EdgeExit back to drain alley.
  - type: LoadingZone
    px: [0, 0]
    size: [16, 736]
    fields:
      id: gate_stack_from_drain
      name: gate_stack_from_drain
      activation: EdgeExit
      target_room: drain_alley
      target_zone: drain_to_gate_stack
      bidirectional: true

  # Top-edge EdgeExit up to the pirate sky arena. Inherited from the
  # v1 layout; not part of intro-v1's required loop but kept so the
  # sky tease has a working transition.
  - type: LoadingZone
    px: [160, 0]
    size: [96, 16]
    fields:
      id: pirate_sky_up
      name: pirate_sky_up
      activation: EdgeExit
      target_room: pirate_sky_arena
      target_zone: sky_arrival
      bidirectional: true

  - type: PlayerStart
    px: [120, 690]
    size: [28, 46]
    fields: { name: gate_stack_spawn }

  # Gate Janitor: explains stable-gates-vs-ripples.
  - type: NpcSpawn
    px: [400, 688]
    size: [32, 48]
    fields:
      name: Gate Janitor
      prompt: "Talk to the Gate Janitor"
      dialogue_id: gate_janitor_ripple

  # Manifest Clerk: confirms the wrong-list mystery.
  - type: NpcSpawn
    px: [960, 688]
    size: [32, 48]
    fields:
      name: Manifest Clerk
      prompt: "Approach the manifest kiosk"
      dialogue_id: manifest_kiosk_wrong_list

  # --- Legally distinct interdimensional gate (the "portal" mechanic
  # for returning to the sandbox while v1 lacks real destination
  # zones). Three colocated entities + a switch:
  #
  #   - Gate Ring: structural arch. Always visible, animates idle.
  #   - Gate Portal: shimmering surface inside the ring. Always
  #     visible too in v1 (no on/off visual yet — the runtime gate
  #     is what blocks traversal). When the visual on/off lands,
  #     a `kind: gate_portal_off` Prop sheet can replace this entry.
  #   - LoadingZone (id `intro_portal_zone`): walks the player back
  #     to `central_hub_main/intro_wake_door` ONLY when
  #     `intro_portal_switch` is toggled on. The gating is enforced
  #     in `detect_room_transition_system` via the runtime
  #     `GatedZoneRegistry` (see crate::intro::plugin —
  #     INTRO_PORTAL_ZONE_ID / INTRO_PORTAL_SWITCH_ID).
  #   - Switch (id `intro_portal_switch`): toggle, no encounter
  #     target. `action: ResetEncounter` + empty `target_encounter`
  #     is the existing pattern that triggers a pure switch toggle
  #     via `save.data_mut().set_switch(id, !old)` without firing
  #     encounter side-effects.
  #
  # Geometry: gate ring is 192×192, sitting on the floor (y=736)
  # so top y = 544. Centered between Gate Janitor (x=400) and
  # Manifest Clerk (x=960) at x=620.
  - type: Prop
    px: [620, 544]
    size: [192, 192]
    fields:
      name: Interdimensional Gate Ring
      kind: gate_ring
  - type: Prop
    px: [620, 544]
    size: [192, 192]
    fields:
      name: Interdimensional Gate Portal
      kind: gate_portal
  # Activation = Door (Interact-press) because this is a mid-room
  # cross-map transition, not a side-scroll edge or a scripted
  # walk-into trigger. See feedback_loading_zone_activation memory.
  # The portal's *own* phase (PortalRegistry: Off/Opening/On/Closing)
  # determines whether the Interact actually fires the transition —
  # not the switch state directly. Switch only commands open/close.
  - type: LoadingZone
    px: [668, 544]
    size: [96, 192]
    fields:
      id: intro_portal_zone
      name: intro_portal_zone
      activation: Door
      target_room: central_hub_complex
      target_zone: intro_wake_door
      bidirectional: false
  - type: Switch
    px: [560, 704]
    size: [24, 32]
    fields:
      id: intro_portal_switch
      name: intro_portal_switch
      prompt: "Toggle gate power"
      target_encounter: ""
      action: ResetEncounter

  - type: CameraZone
    px: [0, 0]
    size: [1600, 768]
    fields: { id: gate_stack_camera, name: gate_stack_camera, mode: Default }

  # Signage. Future-route doors are intentionally NOT LoadingZones in
  # v1 (no destination yet); they're DebugLabels so the player can
  # read what's coming without bumping into broken transitions.
  - type: DebugLabel
    px: [40, 64]
    size: [320, 24]
    fields:
      name: gate_stack_sign_delayed
      text: "GATE 6 DELAYED: SHARK TRAFFIC"
      category: Custom
  - type: DebugLabel
    px: [40, 96]
    size: [320, 24]
    fields:
      name: gate_stack_sign_nazi_suspended
      text: "Nazi Dimension passenger service remains suspended"
      category: Custom
  - type: DebugLabel
    px: [40, 128]
    size: [320, 24]
    fields:
      name: gate_stack_sign_tolls
      text: "Stable gate tolls increased by 3%"
      category: Custom
  - type: DebugLabel
    px: [40, 160]
    size: [320, 24]
    fields:
      name: gate_stack_sign_impossible_luggage
      text: "Please declare all impossible luggage"
      category: Custom
  - type: DebugLabel
    px: [40, 192]
    size: [320, 24]
    fields:
      name: gate_stack_sign_unauthorized
      text: "Unauthorized arrival is still arrival"
      category: Custom

  # Future-route markers. Plain signs for now; promote to
  # LoadingZones when the destinations exist.
  - type: DebugLabel
    px: [1260, 640]
    size: [180, 24]
    fields:
      name: gate_stack_manifest_label
      text: "→ Manifest Office (TBD)"
      category: Custom
  - type: DebugLabel
    px: [1420, 640]
    size: [180, 24]
    fields:
      name: gate_stack_nazi_label
      text: "→ Nazi Fortress (TBD)"
      category: Custom
  - type: DebugLabel
    px: [128, 280]
    size: [256, 24]
    fields:
      name: gate_stack_pirate_label
      text: "[pirate sky route — blocked]"
      category: Custom
  - type: DebugLabel
    px: [1216, 280]
    size: [256, 24]
    fields:
      name: gate_stack_ninja_label
      text: "[ninja shadow — vanishes]"
      category: Custom
  - type: DebugLabel
    px: [40, 640]
    size: [180, 24]
    fields:
      name: gate_stack_lab_return_label
      text: "[lab ruins — collapsed]"
      category: Custom

  # --- Right-edge exit to the combat calibration lab. New for
  # intro-v1 Task 05; the destination is stubbed by Task 05 and
  # filled in by Task 06.
  - type: LoadingZone
    px: [1584, 560]
    size: [16, 176]
    fields:
      id: gate_to_combat_lab
      name: gate_to_combat_lab
      activation: EdgeExit
      target_room: combat_calibration_lab
      target_zone: combat_lab_from_gate
      bidirectional: true
  - type: DebugLabel
    px: [1380, 536]
    size: [200, 24]
    fields:
      name: gate_combat_lab_exit_label
      text: "→ Combat Calibration"
      category: Custom

  # --- Private side entrance from the Alice/Bob route. Currently a
  # LockWall + label so the slot reads as deliberately gated; Task
  # 08 will replace this with a real conditional gate that the
  # `bob_field_survey_received` flag opens. The LockWall sits at the
  # bottom-center of the room (between the gate machinery and the
  # combat-lab exit) so the player sees it as an alternative route
  # to the right side.
  - type: LockWall
    px: [880, 656]
    size: [96, 80]
    fields:
      id: gate_alice_private_lock
      name: gate_alice_private_lock
  - type: DebugLabel
    px: [840, 632]
    size: [256, 24]
    fields:
      name: gate_alice_private_label
      text: "MAP_PRIVATE: opens after Bob survey"
      category: Custom

  # --- Scanner-beam label near the manifest clerk, naming the
  # observed-route axis. Future task (06 or 08) can promote this to
  # a real scanner DamageVolume or observation beam; for intro-v1
  # the label is enough to telegraph the watch-route fiction.
  - type: DebugLabel
    px: [880, 664]
    size: [240, 24]
    fields:
      name: gate_scanner_label
      text: "MAP_WATCHED: scanner beam"
      category: Custom

  # --- Official-route hook. The portal switch already exists; this
  # label names it as the official/lawful-convenience axis so a
  # later evil/lawful "report a route here" hook lands in the right
  # place without rebuilding the geometry.
  - type: DebugLabel
    px: [560, 664]
    size: [240, 24]
    fields:
      name: gate_official_terminal_label
      text: "MAP_OFFICIAL: portal terminal"
      category: Custom

  # --- Evil/lawful report terminal. A second Switch (separate from
  # the portal switch) placed next to the Manifest Clerk. Activating
  # it sets `switch_gate_official_report_used` per the standard
  # interact-system pattern; the intro flag-chain table promotes that
  # to `alice_route_note_reported` and then to
  # `private_routes_compromised` so the cartography route's
  # consequences are durable in save state.
  - type: Switch
    px: [1024, 704]
    size: [24, 32]
    fields:
      id: gate_official_report
      name: gate_official_report
      prompt: "Submit private route data"
      target_encounter: ""
      action: ResetEncounter
  - type: DebugLabel
    px: [968, 664]
    size: [240, 24]
    fields:
      name: gate_official_report_label
      text: "[official report — Alice/Bob route]"
      category: Custom
