# GNU-ton boss arena — wide underground chamber for the giant wildebeest fight.
#
# GNU-ton (the scholar atop a giant GNU) is a stationary boss: the body fills
# the background while the interactive hands sweep in from the sides and the
# head periodically descends to expose a vulnerability window.
#
# Layout (1024 wide × 640 tall):
#
#   +------------------------------------------------------+  y = 0
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  |
#   |                                                      |
#   |                    [BossSpawn]                       |  ← GNU-ton upper center
#   |                                                      |
#   |          ░░░░           ░░░░░░░░░░░░░               |  ← center + right perches
#   |  ░░░░░░░                                             |  ← left perch
#   |                                                      |
#   | [exit door]                                          |  ← return to hall
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  |  y = 608 (floor)
#   +------------------------------------------------------+
#
# The three perches give the player elevation options when dodging the hand
# sweeps (which come from the sides) and a centre platform to reach the
# head's hitbox during its descent window.
id: gnu_ton_arena
level_id: gnu_ton_arena
world_x: 36000
world_y: 0
px_wid: 1024
px_hei: 640
fill_collision: empty

biome: boss
music_track: pulse_drift_voyage
ambient_profile: hum
visual_theme: default

entities:
  # ─────────────────────────────────────────────────────────────────
  # Outer shell.
  # ─────────────────────────────────────────────────────────────────
  - type: Solid
    px: [0, 608]
    size: [1024, 32]
    fields: { name: floor }
  - type: Solid
    px: [0, 0]
    size: [16, 608]
    fields: { name: left_wall }
  - type: Solid
    px: [1008, 0]
    size: [16, 608]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [992, 16]
    fields: { name: ceiling }

  # ─────────────────────────────────────────────────────────────────
  # Player platforms.
  # Left and right perches are close to the sides — safe from hand
  # sweeps only briefly, but give elevation for attacking during the
  # head-down window.  The centre perch is the prime spot for striking
  # the head; it sits mid-room so the player must dash through the
  # hand-slam danger zone to reach it.
  # ─────────────────────────────────────────────────────────────────
  - type: OneWayPlatform
    px: [112, 480]
    size: [128, 16]
    fields: { name: perch_left }
  - type: OneWayPlatform
    px: [784, 480]
    size: [128, 16]
    fields: { name: perch_right }
  - type: OneWayPlatform
    px: [448, 368]
    size: [128, 16]
    fields: { name: perch_center }

  # ─────────────────────────────────────────────────────────────────
  # Player spawn — just inside the entry door on the left.
  # ─────────────────────────────────────────────────────────────────
  - type: PlayerStart
    px: [80, 562]
    size: [28, 46]
    fields: { name: gnu_ton_arena_spawn }

  # Entry / exit door — bidirectional link to hall_of_bosses.
  # `gnu_ton_arena_exit` is the id that hall_of_bosses's
  # `hall_gnu_ton_portal` warps the player to when entering the arena.
  - type: LoadingZone
    px: [64, 512]
    size: [48, 96]
    fields:
      id: gnu_ton_arena_exit
      name: gnu_ton_arena_exit
      activation: Door
      target_room: hall_of_bosses
      target_zone: hall_gnu_ton_portal
      bidirectional: true

  # ─────────────────────────────────────────────────────────────────
  # Boss spawn — stationary, upper centre.
  # `name` drives encounter_id_from_name → "gnu_ton" → BossEncounterSpec::gnu_ton.
  # Width/height is the sprite render extent; the BossBehaviorProfile
  # owns the combat hitbox (580 × 320 px) so these can differ.
  # ─────────────────────────────────────────────────────────────────
  - type: BossSpawn
    px: [512, 180]
    size: [150, 185]
    fields:
      name: GNU-ton
      brain: "PhaseScript:gnu_ton"

  # ─────────────────────────────────────────────────────────────────
  # Camera + signage.
  # ─────────────────────────────────────────────────────────────────
  - type: CameraZone
    px: [0, 0]
    size: [1024, 640]
    fields:
      id: gnu_ton_arena_camera
      name: gnu_ton_arena_camera
      mode: Default

  - type: DebugLabel
    px: [80, 580]
    size: [864, 20]
    fields:
      name: gnu_ton_arena_label
      text: "GNU-ton — dodge the hands; strike the head when it descends."
      category: Custom
