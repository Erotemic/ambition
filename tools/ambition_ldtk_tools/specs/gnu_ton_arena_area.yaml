# GNU-ton boss arena — tall underground chamber for the giant wildebeest fight.
#
# Rev: bumped to 1792×1280 (was 1536×896) so the player drops in from a
# ledge near the top and sees the whole GNU-ton silhouette before
# descending into striking range. The body sprite is z-layered behind
# platforms (see `presentation::rendering::actors::GnuTonBodyLayer`)
# so the player can read jump targets through the giant.
#
# Encounter flow:
#   1. Player enters from `hall_of_bosses` via the top-left LoadingZone.
#   2. Lands on the entry ledge, walks right onto a BreakablePlatform.
#   3. The platform breaks under their weight, forcing a descent into
#      the fight (they fall through a column of perches that catches
#      them safely before the floor).
#   4. Boss fight at floor level. GNU-ton's head is always damageable
#      but high up at rest — climb the perches to reach it, or wait for
#      the head-descent windows that bring it to player level.
#   5. After defeat, the player climbs back up the ladder column near
#      the spawn (the ladder is painted Climbable in IntGrid).
#
# Layout (1792 wide x 1280 tall):
#
#   +------------------------------------------------------------+ y=0
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒|
#   | [door]   [ledge───][BreakablePad]                          | ← top entry
#   |  ▓ladder▓                                                  |
#   |  ▓ladder▓               ░░░░top perch░░░░                  |
#   |  ▓ladder▓                                                  |
#   |  ▓ladder▓        ┌─────[BossSpawn]─────┐                   | ← GNU-ton centered
#   |  ▓ladder▓        │   (220×220 box)     │                   |
#   |  ▓ladder▓        └─────────────────────┘                   |
#   |  ▓ladder▓   ░░perch left       perch right░░               |
#   |  ▓ladder▓                                                  |
#   |  ▓ladder▓       ░░perch mid-left   perch mid-right░░       |
#   |  ▓ladder▓                                                  |
#   |  ▓ladder▓                                                  |
#   |  ▓floor ▓░░perch left low    perch right low░░             |
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ floor ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒| y=1248
#   +------------------------------------------------------------+
#
# Ladder gating: the Climbable IntGrid below is painted unconditionally
# at world-load time, but the sandbox-side `gate_gnu_ton_arena_ladder`
# system (boss_encounter/gnu_ton.rs) removes the Ladder regions from
# `world.climbable_regions` on entry and re-adds them the frame the
# gnu_ton boss is defeated. So the cells exist in LDtk but only count
# at runtime once the player has earned the retreat.
id: gnu_ton_arena
level_id: gnu_ton_arena
world_x: 36000
world_y: 0
px_wid: 1792
px_hei: 1280
fill_collision: empty

biome: boss
music_track: standing_on_shoulders
ambient_profile: hum
visual_theme: default

# Climbable IntGrid: ladder column on the left wall, from just below the
# spawn ledge down to floor level. Lets the player retreat back to the
# entry LoadingZone after defeating the boss. Runtime visibility is
# gated by `gate_gnu_ton_arena_ladder` (see header comment above).
intgrid:
  climbable:
    - kind: Ladder
      px: [120, 224]
      size: [32, 1024]

entities:
  # ─────────────────────────────────────────────────────────────────
  # Outer shell.
  # ─────────────────────────────────────────────────────────────────
  - type: Solid
    px: [0, 1248]
    size: [1792, 32]
    fields: { name: floor }
  - type: Solid
    px: [0, 0]
    size: [16, 1248]
    fields: { name: left_wall }
  - type: Solid
    px: [1776, 0]
    size: [16, 1248]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [1760, 16]
    fields: { name: ceiling }

  # ─────────────────────────────────────────────────────────────────
  # Top entry: solid ledge that catches the player as they teleport
  # in through the LoadingZone, plus a BreakablePlatform extension
  # that the player must step onto to descend. The breakable triggers
  # `OnStand` and never respawns, so the descent is one-way per
  # encounter attempt.
  # ─────────────────────────────────────────────────────────────────
  - type: Solid
    px: [16, 208]
    size: [288, 16]
    fields: { name: entry_ledge }
  - type: BreakablePlatform
    px: [304, 208]
    size: [160, 16]
    fields:
      name: spawn_descent_pad
      collision: Solid
      trigger: OnStand
      respawn: Never

  # ─────────────────────────────────────────────────────────────────
  # Player platforms.
  # Layered from top to bottom so the player can climb back up after
  # the fight (or during it, for vertical positioning vs. the boss
  # head). Boss is centered ~mid-room so the perches at every height
  # offer real combat options.
  # ─────────────────────────────────────────────────────────────────
  - type: OneWayPlatform
    px: [752, 432]
    size: [288, 16]
    fields: { name: perch_top_center }   # over the boss's head — risky landing spot
  - type: OneWayPlatform
    px: [240, 560]
    size: [192, 16]
    fields: { name: perch_left_high }
  - type: OneWayPlatform
    px: [1360, 560]
    size: [192, 16]
    fields: { name: perch_right_high }
  - type: OneWayPlatform
    px: [528, 720]
    size: [160, 16]
    fields: { name: perch_left_mid_high }
  - type: OneWayPlatform
    px: [1104, 720]
    size: [160, 16]
    fields: { name: perch_right_mid_high }
  - type: OneWayPlatform
    px: [752, 832]
    size: [288, 16]
    fields: { name: perch_center_main }  # prime striking spot for head-descent
  - type: OneWayPlatform
    px: [336, 944]
    size: [192, 16]
    fields: { name: perch_left_mid }
  - type: OneWayPlatform
    px: [1264, 944]
    size: [192, 16]
    fields: { name: perch_right_mid }
  - type: OneWayPlatform
    px: [192, 1088]
    size: [224, 16]
    fields: { name: perch_left_low }     # easy reach from the floor
  - type: OneWayPlatform
    px: [1376, 1088]
    size: [224, 16]
    fields: { name: perch_right_low }

  # ─────────────────────────────────────────────────────────────────
  # Player spawn — on the BreakablePlatform descent pad. The platform
  # breaks when the player stands, dropping them into the fight.
  # ─────────────────────────────────────────────────────────────────
  - type: PlayerStart
    px: [368, 162]
    size: [28, 46]
    fields: { name: gnu_ton_arena_spawn }

  # Bidirectional door — entry on the way in, exit on the way out.
  # `gnu_ton_arena_exit` is the id that `hall_of_bosses`'s
  # `hall_gnu_ton_portal` warps the player to. The door sits on the
  # entry ledge so the player teleports in standing on solid ground.
  - type: LoadingZone
    px: [64, 112]
    size: [48, 96]
    fields:
      id: gnu_ton_arena_exit
      name: gnu_ton_arena_exit
      activation: Door
      target_room: hall_of_bosses
      target_zone: hall_gnu_ton_portal
      bidirectional: true

  # ─────────────────────────────────────────────────────────────────
  # Boss spawn — stationary, centered. The bigger 1792×1280 chamber
  # gives the giant room to breathe and lets the camera zoom out
  # without clipping the silhouette against the walls.
  # `name` drives encounter_id_from_name → "gnu_ton" → BossEncounterSpec::gnu_ton.
  # The runtime renders the body behind one-way platforms and the
  # hands in front of them (see `GnuTonBodyLayer` / `GnuTonHandsLayer`).
  # ─────────────────────────────────────────────────────────────────
  # px.y was 498 originally; lowered to 832 (entity center engine y≈942)
  # so the giant's hooves rest on the floor at y=1248 instead of
  # floating ~334 px above it. Hitboxes are entity-relative so they
  # shift down with the boss automatically (perches at 832/944/1088
  # still bracket the head-descent window). See
  # `specs/gnu_ton/lower_boss_spawn.yaml` for the move spec used to
  # apply this on the live sandbox.ldtk.
  - type: BossSpawn
    px: [786, 832]
    size: [220, 220]
    fields:
      name: GNU-ton
      brain: "PhaseScript:gnu_ton"

  # ─────────────────────────────────────────────────────────────────
  # Camera + signage.
  # `camera_zoom: 1.25` is a slight zoom-out so the player sees the
  # full giant + their own footing without losing track of either.
  # Holding the value below 1.5 keeps the player sprite legible at
  # the screen scale set by user video settings.
  # ─────────────────────────────────────────────────────────────────
  - type: CameraZone
    px: [0, 0]
    size: [1792, 1280]
    fields:
      id: gnu_ton_arena_camera
      name: gnu_ton_arena_camera
      mode: Default
      # Slight zoom-out so the player sees the full giant + their own
      # footing without losing track of either. Holding below 1.5 keeps
      # the player sprite legible at the screen scale set by user video
      # settings. Field is `zoom` on the LDtk CameraZone def (conversion
      # accepts `camera_zoom` as an alias, but the LDtk entity only
      # defines `zoom`).
      zoom: 1.25

  - type: DebugLabel
    px: [128, 1216]
    size: [1536, 20]
    fields:
      name: gnu_ton_arena_label
      text: "GNU-ton — drop in from above; strike the head when it descends."
      category: Custom
