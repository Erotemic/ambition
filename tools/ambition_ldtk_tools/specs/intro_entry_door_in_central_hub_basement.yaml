# Test-access door: central_hub_basement → intro_wake_room.
#
# The intro sequence lives in a separate world file (intro.ldtk) and
# the runtime merges its levels into the active project at load time
# (`ldtk_world/loading.rs::merge_secondary_worlds`). The intro is
# reachable in-game only if something in the sandbox map points at one
# of its levels — this door is that pointer.
#
# Door placement was chosen via:
#   python -m ambition_ldtk_tools door free-spots central_hub_basement
# Slot at x=1822 y=832 is the rightmost free 48x96 gap in the basement's
# door row, far enough from the existing lab doors to read as "an extra
# door that wasn't here yesterday."
#
# Run:
#   python -m ambition_ldtk_tools entity add \
#     tools/ambition_ldtk_tools/specs/intro_entry_door_in_central_hub_basement.yaml \
#     --ldtk crates/ambition_sandbox/assets/ambition/worlds/sandbox.ldtk
level_id: central_hub_basement
entities:
  - type: LoadingZone
    px: [1822, 832]
    size: [48, 96]
    fields:
      id: intro_wake_door
      name: intro_wake_door
      activation: Door
      target_room: intro_wake_room
      target_zone: intro_wake_hatch
      bidirectional: true
