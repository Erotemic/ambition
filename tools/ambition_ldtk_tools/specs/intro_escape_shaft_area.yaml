# intro_escape_shaft — third room of the intro sequence.
#
# Beat: Movement-focused vertical climb out of the lab. The player has
# fled the raid and lost the explanation. The room carries the beat
# without dialogue: a broken service shaft, a sealed lab hatch glimpsed
# in a side alcove, a steam vent above, a visible reward they can't
# reach yet, and emergence into Drain Market signage at the top.
#
# Reshaped from the v1 horizontal corridor (1280×512) into a true
# vertical ascent (1280×1280) per intro-v1 Task 02. Width is kept at
# 1280 so the lateral neighbors (drain_alley at worldX=3904 and
# gate_stack_lower at worldX=4928) do not shift; only height grows.
# worldX is corrected from the stale spec value 104000 to the live
# value 2624.
#
# Transitions (now bottom-left in, top-right out):
# - Left-edge EdgeExit `escape_from_raid` ← intro_raid_corridor/raid_to_escape
#   (zone band moved from y=0..480 to y=1152..1248 so the player lands
#   on the floor, not mid-shaft. raid_to_escape lives at the raid
#   corridor's right edge so the source side does not need to change.)
# - Right-edge EdgeExit `escape_to_drain` → drain_alley/drain_from_escape
#   (zone band moved to y=16..240 — the top of the shaft — so the
#   player must climb to leave. drain_from_escape on the drain side
#   still covers the full left edge, so arrival in drain remains
#   wherever the existing spec puts it.)
#
# Layout (1280×1280):
#
#   +----------------------------------------------------------------+
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒          → |   TOP EXIT
#   |                                                                |
#   |  ▒▒▒▒▒▒▒▒                          [pickup: late]              |   late-gated ledge
#   |  // later: pogo/dash                                           |
#   |                                                                |
#   |                                  ▒▒▒▒▒▒▒                       |   top platform
#   |                       ▒▒▒▒▒▒▒                                  |
#   |                                          ▒▒▒▒▒▒▒  ▒▒▒▒▒▒▒     |   landing (solid)
#   |                                                                |
#   |                                  ▒▒▒▒▒▒▒                       |
#   |                       ▒▒▒▒▒▒▒              ▒▒▒                |   upper climb
#   |                                  ▒▒▒▒▒▒▒                       |
#   |                       ▒▒▒▒▒▒▒                                  |
#   |             ░░░░░░░░░░░ steam vent ░░░░░░░░░░░                 |   hazard band
#   |                       ▒▒▒▒▒▒▒                                  |
#   |  ▒▒▒▒▒▒▒▒▒▒▒                     ▒▒▒▒▒▒▒                       |   alcove + mid_c
#   |  [sealed hatch]      ▒▒▒▒▒▒▒                                   |
#   |  pickup: alcove                                                |
#   |  ▒▒▒▒▒▒▒▒▒▒▒  ────────────────  ▒▒▒▒▒▒▒                       |   alcove floor + mid_a
#   |                          ▒▒▒▒▒▒▒                              |
#   |             ▒▒▒▒▒▒▒                  ▒▒▒▒▒▒▒                  |   recovery
#   |                          ▒▒▒▒▒▒▒                              |
#   |             ▒▒▒▒▒▒▒                                            |   lower climb
#   |                                                                |
#   |  ←     start                                                   |   bottom entry
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ floor ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒│
#   +----------------------------------------------------------------+
id: intro_escape_shaft
level_id: intro_escape_shaft
world_x: 2624
world_y: 0
px_wid: 1280
px_hei: 1280
fill_collision: empty
bg_color: "#0A0E14"
biome: lab

entities:
  # --- Outer geometry. Floor at the bottom, ceiling along the top
  # except for a 16-px-wide opening on the right edge where the exit
  # zone lives. No left/right wall solids — the level boundary blocks
  # movement and the EdgeExit zones are the only seams out.
  - type: Solid
    px: [0, 1248]
    size: [1280, 32]
    fields: { name: floor }
  - type: Solid
    px: [16, 0]
    size: [1232, 32]
    fields: { name: ceiling }

  # --- PlayerStart (cold-launch only; live entries arrive via the
  # EdgeExit zone target spawn logic).
  - type: PlayerStart
    px: [160, 1202]
    size: [28, 46]
    fields: { name: escape_shaft_spawn }

  # --- Bottom-edge entry from the raid corridor (left side, just
  # above the floor). Moved from the v1 full-height left band so the
  # player arrives at the bottom and has to climb upward.
  - type: LoadingZone
    px: [0, 1152]
    size: [16, 96]
    fields:
      id: escape_from_raid
      name: escape_from_raid
      activation: EdgeExit
      target_room: intro_raid_corridor
      target_zone: raid_to_escape
      bidirectional: true

  # --- Lower climb. One-way platforms spaced ~64 px vertically so a
  # single jump clears each step. Staggered left/right to force a
  # short horizontal traverse between hops. Missed jumps land back on
  # a lower platform or the floor — no hazards yet.
  - type: OneWayPlatform
    px: [240, 1184]
    size: [192, 16]
    fields: { name: lower_a }
  - type: OneWayPlatform
    px: [560, 1120]
    size: [192, 16]
    fields: { name: lower_b }
  - type: OneWayPlatform
    px: [320, 1056]
    size: [192, 16]
    fields: { name: lower_c }
  - type: OneWayPlatform
    px: [640, 992]
    size: [192, 16]
    fields: { name: lower_d }
  - type: OneWayPlatform
    px: [320, 928]
    size: [192, 16]
    fields: { name: lower_e }

  # --- Mid climb leading into the side alcove. mid_a sits to the right;
  # mid_b is the bridge step that brings the player back left toward
  # the alcove. The alcove itself is a solid pocket at the mid_c level
  # — sealed lab hatch label and a story-flag pickup.
  - type: OneWayPlatform
    px: [560, 864]
    size: [192, 16]
    fields: { name: mid_a }
  - type: OneWayPlatform
    px: [240, 800]
    size: [192, 16]
    fields: { name: mid_b }

  # Alcove floor (left): solid because it's a permanent ledge and a
  # safe rest spot, not a fall-through platform.
  - type: Solid
    px: [32, 736]
    size: [256, 16]
    fields: { name: alcove_floor }
  # Alcove ceiling pinches the pocket so it reads as a recess.
  - type: Solid
    px: [32, 656]
    size: [192, 16]
    fields: { name: alcove_ceiling }
  # Sealed lab hatch label (left wall of the alcove).
  - type: DebugLabel
    px: [40, 696]
    size: [200, 24]
    fields:
      name: shaft_alcove_hatch_label
      text: "// lab service — hatch sealed"
      category: Custom
  # Alcove pickup — sets a story flag so a later Alice/Bob/route-state
  # check can branch on "did the player linger in the lab service
  # alcove on the way out?". Pure flag pickup, no health/currency.
  - type: PickupSpawn
    px: [200, 712]
    size: [24, 24]
    fields:
      name: shaft_alcove_pickup
      kind: "flag:intro_shaft_alcove_visited"

  # mid_c sits right of the alcove at the same Y so the player can
  # hop sideways out of the alcove and continue climbing.
  - type: OneWayPlatform
    px: [560, 736]
    size: [192, 16]
    fields: { name: mid_c }

  # --- Hazard band. A single static steam vent labelled as a
  # pressurized line. Sits between mid_c and the upper climb. The
  # main climb route goes UP and right; the hazard exists primarily
  # to (a) telegraph that the shaft is unsafe and (b) punish sloppy
  # left-side drift back into the alcove area while pressing upward.
  - type: HazardBlock
    px: [288, 656]
    size: [192, 16]
    fields: { name: shaft_steam_vent }
  - type: DebugLabel
    px: [288, 624]
    size: [240, 24]
    fields:
      name: shaft_steam_vent_label
      text: "// pressurized line — venting"
      category: Custom

  # --- Upper climb. Same 64-px vertical spacing. Routes the player
  # back and forth, mostly in the right half of the shaft so the
  # late-gated left-side ledge feels deliberately offset.
  - type: OneWayPlatform
    px: [880, 672]
    size: [192, 16]
    fields: { name: upper_a }
  - type: OneWayPlatform
    px: [560, 608]
    size: [192, 16]
    fields: { name: upper_b }
  - type: OneWayPlatform
    px: [880, 544]
    size: [192, 16]
    fields: { name: upper_c }
  - type: OneWayPlatform
    px: [560, 480]
    size: [192, 16]
    fields: { name: upper_d }
  - type: OneWayPlatform
    px: [880, 416]
    size: [192, 16]
    fields: { name: upper_e }
  - type: OneWayPlatform
    px: [560, 352]
    size: [192, 16]
    fields: { name: upper_f }
  - type: OneWayPlatform
    px: [880, 288]
    size: [192, 16]
    fields: { name: top_a }

  # --- Top landing. Solid platform near the right edge — this is what
  # the player walks across into the exit zone. Made solid (not
  # one-way) so the player can rest here and read the "↑ Drain Market"
  # arrow before leaving.
  - type: Solid
    px: [1056, 224]
    size: [192, 16]
    fields: { name: top_landing }

  # --- Late-gated reward ledge (left side, far above the main climb).
  # Geometrically unreachable from the upper-climb without future
  # traversal abilities (pogo / dash / blink): the closest reachable
  # platform is upper_f at y=352 across the shaft; the late_ledge sits
  # at y=192 in the far left column, requiring both extra height (>=
  # 160 vertical) and significant horizontal reach the player does
  # not yet have.
  - type: Solid
    px: [32, 192]
    size: [224, 16]
    fields: { name: late_ledge }
  - type: PickupSpawn
    px: [96, 160]
    size: [24, 24]
    fields:
      name: shaft_late_pickup
      kind: "flag:intro_shaft_late_ledge_reached"
  - type: DebugLabel
    px: [32, 132]
    size: [240, 24]
    fields:
      name: shaft_late_pickup_label
      text: "// later: pogo / dash"
      category: Custom

  # --- Top-right exit to drain market. Zone band sits between the
  # ceiling cut-off (x=1248, since ceiling solid ends at x=16+1232=
  # 1248) and the right level edge, spanning the upper quarter of the
  # shaft so any approach from the top platforms triggers it.
  - type: LoadingZone
    px: [1264, 16]
    size: [16, 224]
    fields:
      id: escape_to_drain
      name: escape_to_drain
      activation: EdgeExit
      target_room: drain_alley
      target_zone: drain_from_escape
      bidirectional: true

  # Diegetic arrow at the top landing pointing toward drain market.
  - type: DebugLabel
    px: [1056, 192]
    size: [200, 24]
    fields:
      name: shaft_top_exit_label
      text: "↑ Drain Market"
      category: Custom

  # Bottom-entry label so the player has a sense of "I am inside the
  # service shaft, the way out is up".
  - type: DebugLabel
    px: [40, 1208]
    size: [240, 24]
    fields:
      name: shaft_bottom_entry_label
      text: "// service shaft"
      category: Custom

  # --- Camera. Sized to the full vertical room so the existing
  # follow-cam keeps the player centered as they climb. mode=Default
  # because the room is small enough not to need cinematic locks; if a
  # future task wants smoother vertical pans, switch to a Window mode
  # CameraZone with a tight vertical band.
  - type: CameraZone
    px: [0, 0]
    size: [1280, 1280]
    fields: { id: escape_shaft_camera, name: escape_shaft_camera, mode: Default }
