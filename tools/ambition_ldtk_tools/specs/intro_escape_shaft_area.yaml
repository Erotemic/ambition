# intro_escape_shaft — third room of the intro sequence.
#
# Beat: Movement-focused escape from the lab. Reworked as a wide
# horizontal corridor (was a vertical shaft in v1) so the EdgeExit
# walk-through pattern works the same here as everywhere else in
# the intro: walk off the right edge → drain alley.
#
# Transitions:
# - Left-edge EdgeExit `escape_from_raid` ← raid_corridor
# - Right-edge EdgeExit `escape_to_drain` → drain_alley
#
# Layout (1280×512):
#
#   +---------------------------------------------------------+
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  |
#   |                                                         |
#   |        ▒▒▒▒▒▒▒                ▒▒▒▒▒▒▒                   |
#   |                 ▒▒▒▒▒▒▒                                 |
#   | ←                                                     → |
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒│
#   +---------------------------------------------------------+
id: intro_escape_shaft
level_id: intro_escape_shaft
world_x: 104000
world_y: 0
px_wid: 1280
px_hei: 512
fill_collision: empty
bg_color: "#0A0E14"
biome: lab

entities:
  # --- Outer geometry.
  - type: Solid
    px: [0, 480]
    size: [1280, 32]
    fields: { name: floor }
  - type: Solid
    px: [16, 0]
    size: [1248, 32]
    fields: { name: ceiling }

  # --- Two one-way platforms staggered for a quick movement gauntlet.
  - type: OneWayPlatform
    px: [256, 320]
    size: [256, 16]
    fields: { name: escape_platform_left }
  - type: OneWayPlatform
    px: [768, 320]
    size: [256, 16]
    fields: { name: escape_platform_right }
  - type: OneWayPlatform
    px: [512, 192]
    size: [256, 16]
    fields: { name: escape_platform_top }

  # --- Left-edge EdgeExit back to the raid corridor.
  - type: LoadingZone
    px: [0, 0]
    size: [16, 480]
    fields:
      id: escape_from_raid
      name: escape_from_raid
      activation: EdgeExit
      target_room: intro_raid_corridor
      target_zone: raid_to_escape
      bidirectional: true

  # --- PlayerStart (cold-launch only).
  - type: PlayerStart
    px: [110, 434]
    size: [28, 46]
    fields: { name: escape_shaft_spawn }

  # --- Right-edge EdgeExit to drain alley.
  - type: LoadingZone
    px: [1264, 0]
    size: [16, 480]
    fields:
      id: escape_to_drain
      name: escape_to_drain
      activation: EdgeExit
      target_room: drain_alley
      target_zone: drain_from_escape
      bidirectional: true

  # --- Camera zone.
  - type: CameraZone
    px: [0, 0]
    size: [1280, 512]
    fields: { id: escape_shaft_camera, name: escape_shaft_camera, mode: Default }

  # --- Diegetic labels.
  - type: DebugLabel
    px: [40, 80]
    size: [240, 24]
    fields:
      name: shaft_top_label
      text: "// service corridor"
      category: Custom
  - type: DebugLabel
    px: [1040, 320]
    size: [200, 24]
    fields:
      name: shaft_exit_label
      text: "→ drain alley"
      category: Custom
