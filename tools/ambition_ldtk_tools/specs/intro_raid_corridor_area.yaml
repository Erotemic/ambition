# intro_raid_corridor — second room of the intro sequence.
#
# Beat: Raid pressure begins. Two hostile factions enter from opposite
# sides while the creator is dying mid-sentence. The player escapes
# through a maintenance shaft on the far side. Wrong-list realization
# lines plant the mystery (target was ${BIG_AI_NAME}, not the creator).
#
# Layout (1600x512):
#
#   +-----------------------------------------------------------------+
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  |
#   |                                                                 |
#   | [back     [Framebreaker]      [Creator   [Nazi Salvage] [escape |
#   |  door]                         dying]      Guard]        shaft] |
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒│ ← floor
#   +-----------------------------------------------------------------+
#
# The wake-room return door stays open in v1 (no LockWall) because the
# raid-trapped feel is carried by the dialogue cutscene rather than
# physical traversal blocks. Backtracking to the wake room shows the
# creator's body and an "approximately sealed" debug label.
id: intro_raid_corridor
level_id: intro_raid_corridor
world_x: 102000
world_y: 0
px_wid: 1600
px_hei: 512
fill_collision: empty
bg_color: "#1A0F0F"
biome: lab

entities:
  # --- Outer geometry.
  - type: Solid
    px: [0, 480]
    size: [1600, 32]
    fields: { name: floor }
  - type: Solid
    px: [0, 0]
    size: [16, 480]
    fields: { name: left_wall }
  - type: Solid
    px: [1584, 0]
    size: [16, 480]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [1568, 32]
    fields: { name: ceiling }

  # --- Player enters from the left (wake-room hatch).
  - type: PlayerStart
    px: [80, 434]
    size: [28, 46]
    fields: { name: raid_corridor_entry_spawn }

  # --- Back door to the wake room (left wall).
  - type: LoadingZone
    px: [16, 384]
    size: [48, 96]
    fields:
      id: raid_corridor_entry
      name: raid_corridor_entry
      activation: Door
      target_room: intro_wake_room
      target_zone: intro_wake_hatch
      bidirectional: true

  # --- Framebreaker (anti-machine hardliner) blocking the middle-left.
  # Faction: "Framebreakers / Broken Frame / Handwright splinter" per
  # the design doc. Authored as a hostile EnemySpawn — the wrong-list
  # narrative beats fire via the intro_raid cutscene (which pauses
  # gameplay), so the line ("Kill the Clanker before it learns our
  # names") still lands before combat starts. Combat-banter from
  # combat hits can fire via VfxMessage::SpeechBubble in a follow-up.
  - type: EnemySpawn
    px: [400, 432]
    size: [32, 48]
    fields:
      name: Framebreaker
      brain: medium_striker

  # --- Creator: dying mid-sentence, between the two factions.
  # Stays as NpcSpawn — the creator is a talking-head NPC, not an
  # attacker. The wrong-list-realization fragment is delivered via
  # the intro_raid cutscene + this NPC's dialogue node.
  - type: NpcSpawn
    px: [780, 432]
    size: [32, 48]
    fields:
      name: Creator Final
      prompt: "Hear the Creator's last words"
      dialogue_id: creator_final_normal

  # --- Nazi salvage guard from the right. Also EnemySpawn so the
  # player feels squeezed between two hostiles instead of two
  # talking heads. Faster brain (gradient_seeker) plays the
  # "aggressively-funded squad" read.
  - type: EnemySpawn
    px: [1200, 432]
    size: [32, 48]
    fields:
      name: Nazi Salvage Guard
      brain: gradient_seeker

  # --- Escape shaft door on the far right.
  - type: LoadingZone
    px: [1536, 384]
    size: [48, 96]
    fields:
      id: raid_corridor_escape
      name: raid_corridor_escape
      activation: walk
      target_room: intro_escape_shaft
      target_zone: escape_shaft_entry
      bidirectional: true

  # --- Camera zone over the whole corridor.
  - type: CameraZone
    px: [0, 0]
    size: [1600, 512]
    fields: { id: raid_corridor_camera, name: raid_corridor_camera, mode: Default }

  # --- Banners / placeholder signage for the raid feel.
  - type: DebugLabel
    px: [240, 64]
    size: [320, 24]
    fields:
      name: raid_alarm_banner
      text: "// PERIMETER BREACH — TWO HEADINGS"
      category: Custom
  - type: DebugLabel
    px: [40, 96]
    size: [320, 24]
    fields:
      name: raid_wrong_list_banner
      text: "// 'this one isn't on the manifest'"
      category: Custom
  - type: DebugLabel
    px: [1320, 96]
    size: [240, 24]
    fields:
      name: raid_escape_arrow
      text: "→ service shaft"
      category: Custom
