# Military faction lair — a vertical platforming tower with the
# General as the faction leader at the top. (The sprite asset id
# stays `absurd_general` because that's the generator archetype;
# the in-game display name is just "General".)
#
# Layout (480 wide × 1280 tall — taller than other labs to feel like a tower):
#
#   +--------------------+  y = 0
#   |  ▒▒▒ ceiling ▒▒▒  |
#   |   trophy ┐        |
#   |  alcove  │ [General NPC]
#   |   ▒▒▒▒▒▒▒│         |
#   |          ▒▒        |  trophy floor
#   | ▒▒                 |  ── floor 4 (kite-shaped)
#   |        ▒▒ ▒▒       |  ── floor 3 (jump-up gap)
#   | ▒▒                 |  ── floor 2
#   |        ▒▒          |  ── floor 1.5 (one-way landing)
#   |  ║                 |  ── ladder column
#   |  ║                 |
#   |  ║   [Ent door]    |
#   |  ║                 |
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒|  y = 1248 (floor)
#   |  ▒▒▒▒▒ floor ▒▒▒▒  |
#   +--------------------+  y = 1280
#
# Movement contract:
# - Player spawns near the entry door (left-bottom).
# - Climb ladder to floor 2 (left platform).
# - Jump right + up to one-way platform (floor 1.5) -> floor 3 staggered platforms.
# - Jump up to floor 4 (right side), then across to trophy alcove.
# - General is in the trophy alcove with patrol_radius=0 (stationary).
#
# Music: fighters_guild_oath_of_steel — published by the radio cue
# pipeline (`ambition_music_renderer radio publish`). The level's
# `music_track` field is what `RoomMetadata` reads to drive
# `RoomMusicRequest` when the player enters.
id: military_tower
level_id: military_tower
world_x: 32000
world_y: 1024
px_wid: 480
px_hei: 1280
fill_collision: empty

# Level metadata. The level field defs (biome / music_track /
# ambient_profile / visual_theme) are already registered on the
# project, so these get written as field instances on the level.
biome: tower
music_track: fighters_guild_oath_of_steel
ambient_profile: barracks
visual_theme: red

# Reciprocal door from the main hub to this tower. Coordinates
# come from `door free-spots central_hub_main` (right-side ground
# row: gap x=500..1900). The matching return-door is included in
# `entities:` below as `military_tower_entry`.
connect_to:
  - target_room: central_hub_main
    px: [1176, 880]
    size: [48, 96]
    id: military_tower_door
    target_zone: military_tower_entry
    activation: Door
    bidirectional: true

# Climbable ladder running from the floor up to the first platform.
# Lets the player ascend without needing perfect jumps from spawn.
intgrid:
  climbable:
    - kind: Ladder
      px: [96, 1024]
      size: [32, 224]   # bottom of ladder = top of floor (1248-32 inset for cell)

entities:
  # ─────────────────────────────────────────────────────────────────
  # Outer shell: floor, ceiling, and side walls.
  # ─────────────────────────────────────────────────────────────────
  - type: Solid
    px: [0, 1248]
    size: [480, 32]
    fields: { name: floor }
  - type: Solid
    px: [0, 0]
    size: [16, 1248]
    fields: { name: left_wall }
  - type: Solid
    px: [464, 0]
    size: [16, 1248]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [448, 16]
    fields: { name: ceiling }

  # ─────────────────────────────────────────────────────────────────
  # Vertical platforming course (bottom → top). Y values are top-edge
  # (LDtk uses top-left coords). Player base size 28x46 so a 46px
  # vertical gap between platforms is the minimum standing clearance.
  # ─────────────────────────────────────────────────────────────────

  # Floor 1.5 — small one-way landing right above the ladder top.
  # Lets the player step off the ladder onto a platform.
  - type: OneWayPlatform
    px: [80, 1024]
    size: [80, 16]
    fields: { name: ladder_top_landing }

  # Floor 2 — left platform reached by walking off ladder_top_landing.
  - type: Solid
    px: [16, 928]
    size: [128, 16]
    fields: { name: floor_2_left }

  # Floor 2.5 — middle one-way platform (jump from floor_2_left up-right).
  - type: OneWayPlatform
    px: [240, 832]
    size: [96, 16]
    fields: { name: floor_2_5_mid }

  # Floor 3 — right platform.
  - type: Solid
    px: [336, 736]
    size: [128, 16]
    fields: { name: floor_3_right }

  # Floor 3.5 — middle gap-jump platform.
  - type: OneWayPlatform
    px: [176, 624]
    size: [96, 16]
    fields: { name: floor_3_5_mid }

  # Floor 4 — left wide platform.
  - type: Solid
    px: [16, 512]
    size: [192, 16]
    fields: { name: floor_4_left }

  # Floor 4.5 — right one-way platform (small gap-jump from floor_4_left).
  - type: OneWayPlatform
    px: [288, 416]
    size: [128, 16]
    fields: { name: floor_4_5_right }

  # Trophy alcove floor — the platform at the top where the General stands.
  - type: Solid
    px: [16, 304]
    size: [240, 16]
    fields: { name: trophy_floor }

  # Trophy alcove rear wall — gives the alcove a back to make it feel
  # like a proper "throne room" framing for the general.
  - type: Solid
    px: [16, 144]
    size: [16, 160]
    fields: { name: trophy_back_wall }

  # Trophy alcove ceiling — defines the alcove silhouette.
  - type: Solid
    px: [16, 144]
    size: [240, 16]
    fields: { name: trophy_ceiling }

  # ─────────────────────────────────────────────────────────────────
  # Player spawn + entry/exit door.
  # ─────────────────────────────────────────────────────────────────
  - type: PlayerStart
    px: [240, 1202]
    size: [28, 46]
    fields: { name: military_tower_spawn }

  # Return-to-hub LoadingZone. Player walks into this rectangle to
  # warp back to `central_hub_main` at the `military_tower_door` zone
  # (the door we asked `connect_to` to drop into the hub above).
  - type: LoadingZone
    px: [380, 1152]
    size: [48, 96]
    fields:
      id: military_tower_entry
      name: military_tower_entry
      activation: Door
      # `target_room` is the activeArea identifier of the destination,
      # not the LDtk level identifier. central_hub_main + _basement
      # both share the `central_hub_complex` activeArea, so we point
      # at the activeArea here. The validator's
      # `levels_by_area` map keys on activeArea ids, not level ids.
      target_room: central_hub_complex
      target_zone: military_tower_door
      bidirectional: true

  # ─────────────────────────────────────────────────────────────────
  # Faction leader: the General. Stationary at the back of the
  # trophy alcove. The NpcSpawn schema today carries only name /
  # prompt / dialogue_id / patrol_radius — sprite identity is keyed
  # off `name` for now, until we add a `category` field def and the
  # corresponding NPC sprite-dispatcher (see TODO.md).
  # ─────────────────────────────────────────────────────────────────
  - type: NpcSpawn
    px: [120, 234]
    size: [42, 70]
    fields:
      name: General
      prompt: Talk
      dialogue_id: military_general
      patrol_radius: 0

  # ─────────────────────────────────────────────────────────────────
  # Camera + signage.
  # ─────────────────────────────────────────────────────────────────
  - type: CameraZone
    px: [0, 0]
    size: [480, 1280]
    fields:
      id: military_tower_camera
      name: military_tower_camera
      mode: Default

  - type: DebugLabel
    px: [40, 1180]
    size: [400, 20]
    fields:
      name: military_tower_intro_label
      text: "Tower of the General — climb to the top."
      category: Custom
