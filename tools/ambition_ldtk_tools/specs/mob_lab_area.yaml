# Mob lab — basement encounter room.
#
# Layout (1600x768):
#
#   +---------------------------------------------------+
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒ arena ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  |
#   |                ▒|        |                        |
#   |  hallway       ▒|        |       arena            |
#   |▒hwy ceil▒▒▒▒▒▒▒▒|        |                        |
#   |                 |        |                        |
#   | [door]  [Switch]│  ░░░░░░│ [trigger]  [mobs]      |
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒│ ← floor
#   +---------------------------------------------------+
#                    └ jambs └─ LockWall slot ─┘
#                              (floor-level gap)
#
# Key changes from the previous draft:
# - Divider jambs only exist ABOVE the doorway opening (y=0-400) so
#   the floor-level gap (y=400-608) is always open by default. The
#   player walks freely from hallway to arena until the encounter
#   triggers.
# - LockWall fills the floor-level gap only. When the encounter goes
#   Active, the wall slams in here, sealing the player in. When the
#   encounter Clears (or the player walks back out), the wall removes
#   itself and the doorway is open again.
# - EncounterTrigger is deeper in the arena, well past the doorway,
#   so the lock wall closes BEHIND the player as the encounter starts.
#
# Static-collision authoring (Solid / OneWayPlatform / BlinkWall):
# `python -m ambition_ldtk_tools area create` automatically lowers these into the
# `Collision` IntGrid layer when this spec is applied; they don't
# appear as Ambition entity instances in the resulting LDtk file.
# Authoring rectangles by entity type stays ergonomic, but the
# canonical representation in the project is IntGrid cells (which
# the LDtk GUI can paint per cell). Live mob_lab in
# `crates/ambition_sandbox/assets/ambition/worlds/sandbox.ldtk`
# already lives on IntGrid; re-running this spec preserves that.
id: mob_lab
level_id: mob_lab
world_x: 14000
world_y: 1024
px_wid: 1600
px_hei: 768
fill_collision: empty
entities:
  # --- Floor (hallway + arena, full width). 32px thick.
  - type: Solid
    px: [0, 608]
    size: [1600, 32]
    fields: { name: floor }

  # --- Hallway ceiling (so the player has a real corridor).
  - type: Solid
    px: [0, 224]
    size: [480, 32]
    fields: { name: hallway_ceiling }

  # --- Hallway back wall (left side of the level).
  - type: Solid
    px: [0, 0]
    size: [16, 608]
    fields: { name: hallway_back_wall }

  # --- Arena outer walls.
  - type: Solid
    px: [1584, 0]
    size: [16, 608]
    fields: { name: arena_back_wall }
  - type: Solid
    px: [16, 0]
    size: [1568, 16]
    fields: { name: arena_ceiling }

  # --- Divider jambs: ONLY above the doorway opening (y=0-400) so the
  # floor-level passage (y=400-608) is open whenever the LockWall is
  # absent. These give the doorway a visible frame; the LockWall is
  # the only thing that ever closes the player's path.
  - type: Solid
    px: [464, 0]
    size: [16, 400]
    fields: { name: divider_jamb_left }
  - type: Solid
    px: [704, 0]
    size: [16, 400]
    fields: { name: divider_jamb_right }

  # --- PlayerStart in the hallway, on the floor.
  - type: PlayerStart
    px: [80, 562]
    size: [28, 46]
    fields: { name: lab_entry_spawn }

  # --- Loading zone back to the central hub.
  - type: LoadingZone
    px: [16, 512]
    size: [48, 96]
    fields:
      id: lab_entry
      name: lab_entry
      activation: Door
      target_room: central_hub_complex
      target_zone: lab_door
      bidirectional: true

  # --- The reset / arm switch (in the hallway, before the threshold).
  # Pressing Interact toggles whether the encounter is armed (red) or
  # disabled (green). Walking past the trigger only fires the
  # encounter when this switch is red.
  - type: Switch
    px: [320, 576]
    size: [24, 32]
    fields:
      id: mob_lab_reset_switch
      name: mob_lab_reset_switch
      prompt: "Toggle mob lab"
      target_encounter: mob_lab
      action: ResetEncounter

  # --- LockWall: fills the floor-level doorway gap when the encounter
  # is in Starting / Active. Always absent when the encounter is
  # Inactive / Cleared / Failed.
  - type: LockWall
    px: [480, 400]
    size: [224, 208]
    fields:
      id: mob_lab_lock
      name: mob_lab_lock

  # --- Encounter trigger: deep enough in the arena that the LockWall
  # closes BEHIND the player when it fires (the wall is at x=480-704;
  # the trigger starts at x=920, so the player has cleared the doorway
  # by ~216px before the wall slams).
  - type: EncounterTrigger
    px: [920, 400]
    size: [240, 208]
    fields:
      id: mob_lab
      name: mob_lab_trigger
      camera_zoom: 1.4

  # --- Camera zone over the arena half.
  - type: CameraZone
    px: [704, 0]
    size: [880, 768]
    fields: { id: mob_lab_arena, name: mob_lab_arena, mode: Encounter }

  # --- Debug labels for in-game orientation.
  - type: DebugLabel
    px: [80, 240]
    size: [380, 24]
    fields:
      name: lab_label_hallway
      text: "Switch: red = armed, green = disabled"
      category: Custom
  - type: DebugLabel
    px: [780, 32]
    size: [560, 24]
    fields:
      name: lab_label_arena
      text: "Walk past the marker to start the encounter"
      category: Custom
