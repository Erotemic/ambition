# Pirate-faction lair — a wide horizontal cove tucked under the hub
# floor, with the entry to the Mockingbird boss arena at the far end.
#
# Layout (1280 wide × 640 tall):
#
#   +---------------------------------------------------+  y = 0
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  |
#   |                                                   |
#   |        ░░ one-way ledge ░░                        |
#   |                              ░░ one-way ledge ░░  |
#   |                                                   |
#   |  [hub door]                          [arena door] |
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  | y = 608 (floor)
#   +---------------------------------------------------+
#
# Movement contract:
# - Player enters from the hub door on the left, lands on the floor.
# - Walks right past two one-way platforms (purely cosmetic / lookout
#   ledges; the boss room entry is on the floor at the far right).
# - Steps into the mockingbird arena door to drop into the boss fight.
#
# Music: a placeholder ambient track for the cove itself; the boss
# music swap happens when the player enters the arena room.
id: pirate_cove
level_id: pirate_cove
world_x: -8000
world_y: 0
px_wid: 1280
px_hei: 640
fill_collision: empty

biome: cove
# `pirates_guild_black_flag_jig` is already registered in the audio
# catalog (sandbox.ron); the boss arena swaps to the mockingbird
# track when the player crosses the loading zone.
music_track: pirates_guild_black_flag_jig
ambient_profile: tide
visual_theme: blue

# Entry door from central hub. The door entity already exists in
# central_hub_main from the initial pirate_cove creation; the
# `connect_to` block that authored it has been removed so this spec
# is safe to re-apply with `area create --replace-existing` without
# re-poking central_hub_main's door row. The matching cove-side
# `pirate_cove_entry` LoadingZone lives below in `entities`.

entities:
  # ─────────────────────────────────────────────────────────────────
  # Outer shell.
  # ─────────────────────────────────────────────────────────────────
  - type: Solid
    px: [0, 608]
    size: [1280, 32]
    fields: { name: floor }
  - type: Solid
    px: [0, 0]
    size: [16, 608]
    fields: { name: left_wall }
  - type: Solid
    px: [1264, 0]
    size: [16, 608]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [1248, 16]
    fields: { name: ceiling }

  # ─────────────────────────────────────────────────────────────────
  # Two one-way "lookout" ledges. Cosmetic platforming; the route to
  # the boss room is a flat walk along the floor, so these don't gate
  # anything.
  # ─────────────────────────────────────────────────────────────────
  - type: OneWayPlatform
    px: [320, 384]
    size: [192, 16]
    fields: { name: lookout_ledge_left }
  - type: OneWayPlatform
    px: [720, 320]
    size: [192, 16]
    fields: { name: lookout_ledge_right }

  # ─────────────────────────────────────────────────────────────────
  # Player spawn — just inside the hub door on the left side.
  # ─────────────────────────────────────────────────────────────────
  - type: PlayerStart
    px: [80, 562]
    size: [28, 46]
    fields: { name: pirate_cove_spawn }

  # Return-to-hub LoadingZone (matches `pirate_cove_door` on the hub
  # side; `target_room` is the ACTIVE-AREA id, not the level id —
  # `central_hub_main` and `central_hub_basement` share the
  # `central_hub_complex` activeArea, so we point at the area).
  - type: LoadingZone
    px: [56, 512]
    size: [48, 96]
    fields:
      id: pirate_cove_entry
      name: pirate_cove_entry
      activation: Door
      target_room: central_hub_complex
      target_zone: pirate_cove_door
      bidirectional: true

  # Boss-arena entry on the right side of the cove. One-way: walking
  # IN warps the player into the arena, but the arena's own door is
  # blocked by a locked-door Solid panel so the player commits to
  # the boss fight. `bidirectional: false` matches the basement_boss
  # convention and was applied via
  # `python3 -m ambition_ldtk_tools entity set-field`.
  - type: LoadingZone
    px: [1180, 512]
    size: [48, 96]
    fields:
      id: pirate_cove_to_arena
      name: pirate_cove_to_arena
      activation: Door
      target_room: mockingbird_arena
      target_zone: mockingbird_arena_entry
      bidirectional: false

  # ─────────────────────────────────────────────────────────────────
  # Faction NPCs. The Admiral runs the cove and offers the Mockingbird
  # bounty; the Raider grumbles about the missing chest. Both are
  # registered in `NPC_SPRITE_REGISTRY` so they pick up the
  # pirate_admiral / pirate_raider spritesheets at sprite-bind time.
  # `dialogue_id`s match the entries added to `dialog.rs`.
  # ─────────────────────────────────────────────────────────────────
  # y=538 is the snap-to-floor result from
  # `area_authoring --snap-to-surface pirate_cove --x 220/--x 560
  # --door-w 42 --door-h 70` — earlier y=562 sank the NPCs ~24px
  # into the floor (NPC bottom = 562+70 = 632, floor top = 608).
  - type: NpcSpawn
    px: [220, 538]
    size: [42, 70]
    fields:
      name: Pirate Admiral
      prompt: Talk
      dialogue_id: pirate_admiral
      patrol_radius: 0
  - type: NpcSpawn
    px: [560, 538]
    size: [42, 70]
    fields:
      name: Pirate Raider
      prompt: Talk
      dialogue_id: pirate_raider
      patrol_radius: 0
  # Third base pirate — Quartermaster. Slotted between the Raider
  # and the arena door so the cove reads as a real three-NPC crew.
  # Dialogue points the player at `pirate_sky_lookout` (the sandbox
  # sky-lookout room above the cove) so flying-shark combat is
  # discoverable from the cove itself.
  - type: NpcSpawn
    px: [880, 538]
    size: [42, 70]
    fields:
      name: Pirate Quartermaster
      prompt: Talk
      dialogue_id: pirate_quartermaster
      patrol_radius: 0
  # Lady pirate — Lookout. Stands near the foot of the rigging
  # ladder so the player meets her on the way up to the sky hatch.
  # x=712 sits just right of the right-lookout ledge (which spans
  # x=720..912, top y=320); she occupies the deck floor below the
  # ledge so she's visible during the cove approach to the hatch.
  - type: NpcSpawn
    px: [712, 538]
    size: [42, 70]
    fields:
      name: Pirate Lookout
      prompt: Talk
      dialogue_id: pirate_lookout
      patrol_radius: 0

  # Sky-lookout ascent door — the player jumps onto the right
  # lookout ledge and presses Interact at the hatch in the ceiling
  # to ascend to `pirate_sky_lookout` for flying-shark combat.
  # Door activation (Interact) so it doesn't fire on every cove
  # traversal. Placed directly above the right lookout ledge
  # (which is at y=320, x=720..912) — sized 48×96 with top at y=224
  # so the player can land on the ledge, then double-jump up to
  # press Interact at the hatch.
  - type: LoadingZone
    px: [768, 224]
    size: [48, 96]
    fields:
      id: pirate_cove_sky_hatch
      name: pirate_cove_sky_hatch
      activation: Door
      target_room: pirate_sky_lookout
      target_zone: pirate_sky_lookout_entry
      bidirectional: true

  # ─────────────────────────────────────────────────────────────────
  # Camera + signage.
  # ─────────────────────────────────────────────────────────────────
  - type: CameraZone
    px: [0, 0]
    size: [1280, 640]
    fields:
      id: pirate_cove_camera
      name: pirate_cove_camera
      mode: Default

  - type: DebugLabel
    px: [40, 540]
    size: [600, 20]
    fields:
      name: pirate_cove_intro_label
      text: "Pirate Cove — the Mockingbird is through the far door."
      category: Custom
