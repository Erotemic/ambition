# Pirate-faction lair — a wide horizontal cove tucked under the hub
# floor, with the entry to the Mockingbird boss arena at the far end.
#
# Layout (1280 wide × 640 tall):
#
#   +---------------------------------------------------+  y = 0
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  |
#   |                                                   |
#   |        ░░ one-way ledge ░░                        |
#   |                              ░░ one-way ledge ░░  |
#   |                                                   |
#   |  [hub door]                          [arena door] |
#   | ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒  | y = 608 (floor)
#   +---------------------------------------------------+
#
# Movement contract:
# - Player enters from the hub door on the left, lands on the floor.
# - Walks right past two one-way platforms (purely cosmetic / lookout
#   ledges; the boss room entry is on the floor at the far right).
# - Steps into the mockingbird arena door to drop into the boss fight.
#
# Music: a placeholder ambient track for the cove itself; the boss
# music swap happens when the player enters the arena room.
id: pirate_cove
level_id: pirate_cove
world_x: -8000
world_y: 0
px_wid: 1280
px_hei: 640
fill_collision: empty

biome: cove
# `pirates_guild_black_flag_jig` is already registered in the audio
# catalog (sandbox.ron); the boss arena swaps to the mockingbird
# track when the player crosses the loading zone.
music_track: pirates_guild_black_flag_jig
ambient_profile: tide
visual_theme: blue

# Entry door from central hub. Picked from the
# `door free-spots central_hub_main` row at y=880 (gap x=500..1176).
# Slid right to x=1050 to avoid an existing y=832 door at x=800-848
# whose y range overlaps a y=880 placement when the door is 96px tall.
# Bidirectional so the player can walk back out the same way.
connect_to:
  # y=832 was confirmed via `area_authoring --snap-to-surface
  # central_hub_main --x 1050`: the floor surface at this x is
  # OneWayUp at y=832, so the 96-tall door must sit with its top at
  # y=832 to land on the floor (an earlier y=880 placement put the
  # bottom 48px through the floor).
  - target_room: central_hub_main
    px: [1050, 832]
    size: [48, 96]
    id: pirate_cove_door
    target_zone: pirate_cove_entry
    activation: Door
    bidirectional: true

entities:
  # ─────────────────────────────────────────────────────────────────
  # Outer shell.
  # ─────────────────────────────────────────────────────────────────
  - type: Solid
    px: [0, 608]
    size: [1280, 32]
    fields: { name: floor }
  - type: Solid
    px: [0, 0]
    size: [16, 608]
    fields: { name: left_wall }
  - type: Solid
    px: [1264, 0]
    size: [16, 608]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [1248, 16]
    fields: { name: ceiling }

  # ─────────────────────────────────────────────────────────────────
  # Two one-way "lookout" ledges. Cosmetic platforming; the route to
  # the boss room is a flat walk along the floor, so these don't gate
  # anything.
  # ─────────────────────────────────────────────────────────────────
  - type: OneWayPlatform
    px: [320, 384]
    size: [192, 16]
    fields: { name: lookout_ledge_left }
  - type: OneWayPlatform
    px: [720, 320]
    size: [192, 16]
    fields: { name: lookout_ledge_right }

  # ─────────────────────────────────────────────────────────────────
  # Player spawn — just inside the hub door on the left side.
  # ─────────────────────────────────────────────────────────────────
  - type: PlayerStart
    px: [80, 562]
    size: [28, 46]
    fields: { name: pirate_cove_spawn }

  # Return-to-hub LoadingZone (matches `pirate_cove_door` on the hub
  # side; `target_room` is the ACTIVE-AREA id, not the level id —
  # `central_hub_main` and `central_hub_basement` share the
  # `central_hub_complex` activeArea, so we point at the area).
  - type: LoadingZone
    px: [56, 512]
    size: [48, 96]
    fields:
      id: pirate_cove_entry
      name: pirate_cove_entry
      activation: Door
      target_room: central_hub_complex
      target_zone: pirate_cove_door
      bidirectional: true

  # Boss-arena entry on the right side of the cove. One-way (the
  # arena ejects the player back to the cove on its own loading
  # zone, but you can re-enter by walking back into the door).
  - type: LoadingZone
    px: [1180, 512]
    size: [48, 96]
    fields:
      id: pirate_cove_to_arena
      name: pirate_cove_to_arena
      activation: Door
      target_room: mockingbird_arena
      target_zone: mockingbird_arena_entry
      bidirectional: true

  # ─────────────────────────────────────────────────────────────────
  # Faction NPCs. The Admiral runs the cove and offers the Mockingbird
  # bounty; the Raider grumbles about the missing chest. Both are
  # registered in `NPC_SPRITE_REGISTRY` so they pick up the
  # pirate_admiral / pirate_raider spritesheets at sprite-bind time.
  # `dialogue_id`s match the entries added to `dialog.rs`.
  # ─────────────────────────────────────────────────────────────────
  - type: NpcSpawn
    px: [220, 562]
    size: [42, 70]
    fields:
      name: Pirate Admiral
      prompt: Talk
      dialogue_id: pirate_admiral
      patrol_radius: 0
  - type: NpcSpawn
    px: [560, 562]
    size: [42, 70]
    fields:
      name: Pirate Raider
      prompt: Talk
      dialogue_id: pirate_raider
      patrol_radius: 0

  # ─────────────────────────────────────────────────────────────────
  # Camera + signage.
  # ─────────────────────────────────────────────────────────────────
  - type: CameraZone
    px: [0, 0]
    size: [1280, 640]
    fields:
      id: pirate_cove_camera
      name: pirate_cove_camera
      mode: Default

  - type: DebugLabel
    px: [40, 540]
    size: [600, 20]
    fields:
      name: pirate_cove_intro_label
      text: "Pirate Cove — the Mockingbird is through the far door."
      category: Custom
