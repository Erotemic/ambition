# Tech-Bros Basement faction lair — a satirical office basement.
#
# Layout (640 wide × 1024 tall, descending vertically — opposite of
# the military_tower's climb):
#
#   +------------------------------+  y = 0
#   |  ▒▒▒▒▒ ceiling ▒▒▒▒▒▒▒▒▒▒▒▒▒  |
#   | [Ent door]         ▒▒        |  ← entry from hub at top
#   |▒▒▒▒▒▒▒▒▒▒▒                   |  ── upper office floor
#   |          ↓ open shaft (drop) |
#   |                ▒▒▒  ▒▒▒      |
#   |     ▒▒▒                      |  ── descending one-way ledges
#   |              ▒▒▒             |
#   |        ▒▒▒                   |
#   |                  ▒▒▒         |
#   |  ▒▒▒                         |
#   |             ▒▒▒              |
#   |  ── boardroom floor ──       |
#   |  [Chadwick on the riser]     |  ← Tech-Bro disruptor
#   |▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒|  ← bottom (boardroom)
#   +------------------------------+  y = 1024
#
# Movement contract: drop down through a series of staggered
# one-way ledges into the boardroom. The descent uses OneWay so
# the player can't get stuck on the way down (and getting back up
# is the door at the top, not a climb).
id: tech_bros_basement
level_id: tech_bros_basement
world_x: 35008
world_y: 1024
px_wid: 640
px_hei: 1024
fill_collision: empty

biome: basement
music_track: tech_bros_disruption
ambient_profile: hum
visual_theme: pink

connect_to:
  # `connect_to.target_room` is the LEVEL identifier (where the
  # reciprocal door is placed). The runtime warp target on the
  # entity below uses the activeArea (`central_hub_complex`).
  # `snap_to_surface: true` lands the door on the lower Solid floor;
  # x=1538 is in the right-side gap of the hub's ground row.
  - target_room: central_hub_main
    px: [1538, 880]
    size: [48, 96]
    snap_to_surface: true
    id: tech_bros_door
    target_zone: tech_bros_entry
    activation: Door
    bidirectional: true

entities:
  # Outer shell.
  - type: Solid
    px: [0, 992]
    size: [640, 32]
    fields: { name: boardroom_floor }
  - type: Solid
    px: [0, 0]
    size: [16, 992]
    fields: { name: left_wall }
  - type: Solid
    px: [624, 0]
    size: [16, 992]
    fields: { name: right_wall }
  - type: Solid
    px: [16, 0]
    size: [608, 16]
    fields: { name: ceiling }

  # ─────────────────────────────────────────────────────────────────
  # Upper office — a thin floor at the top with a drop-shaft.
  # PlayerStart is on this floor near the door; player walks left
  # then drops through the shaft.
  # ─────────────────────────────────────────────────────────────────
  - type: Solid
    px: [16, 96]
    size: [256, 16]
    fields: { name: upper_office_floor_left }
  # Right-side decoration platform (visual: monitor stack).
  - type: Solid
    px: [432, 80]
    size: [80, 32]
    fields: { name: monitor_stack }

  # ─────────────────────────────────────────────────────────────────
  # Descent: alternating one-way ledges. Player drops through gaps
  # between left- and right-aligned ledges to zig-zag down.
  # ─────────────────────────────────────────────────────────────────
  - type: OneWayPlatform
    px: [320, 224]
    size: [144, 16]
    fields: { name: ledge_d1 }
  - type: OneWayPlatform
    px: [80, 336]
    size: [144, 16]
    fields: { name: ledge_d2 }
  - type: OneWayPlatform
    px: [400, 448]
    size: [144, 16]
    fields: { name: ledge_d3 }
  - type: OneWayPlatform
    px: [144, 560]
    size: [144, 16]
    fields: { name: ledge_d4 }
  - type: OneWayPlatform
    px: [400, 672]
    size: [144, 16]
    fields: { name: ledge_d5 }
  - type: OneWayPlatform
    px: [80, 784]
    size: [144, 16]
    fields: { name: ledge_d6 }

  # Boardroom riser — solid pedestal where Chadwick stands.
  - type: Solid
    px: [256, 944]
    size: [192, 48]
    fields: { name: chadwick_riser }

  # ─────────────────────────────────────────────────────────────────
  # Spawn + door (top of the level, opposite the boardroom).
  # ─────────────────────────────────────────────────────────────────
  - type: PlayerStart
    px: [60, 50]
    size: [28, 46]
    fields: { name: tech_bros_spawn }

  - type: LoadingZone
    px: [16, 0]
    size: [48, 96]
    fields:
      id: tech_bros_entry
      name: tech_bros_entry
      activation: Door
      target_room: central_hub_complex
      target_zone: tech_bros_door
      bidirectional: true

  # ─────────────────────────────────────────────────────────────────
  # Faction leader: Chadwick Disruptor III, on the boardroom riser.
  # ─────────────────────────────────────────────────────────────────
  - type: NpcSpawn
    px: [336, 874]
    size: [42, 70]
    fields:
      name: Chadwick Disruptor III
      prompt: Talk
      dialogue_id: tech_bros_disruptor
      patrol_radius: 0

  - type: CameraZone
    px: [0, 0]
    size: [640, 1024]
    fields:
      id: tech_bros_camera
      name: tech_bros_camera
      mode: Default

  - type: DebugLabel
    px: [40, 940]
    size: [560, 20]
    fields:
      name: tech_bros_intro_label
      text: "Tech-Bros Basement — drop down to the boardroom."
      category: Custom
