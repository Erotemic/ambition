schema: ambition.musicir.v1
id: for_emmy_forever_ago
title: For Emmy, Forever Ago
seed: 2026062006
notes: Emmy Noether's Noether Chamber theme, de-hissed after the first report-bundle pass. The 8e091 spectral
  evidence showed the continuous nylon pluck owned most high/vhigh/air energy, so this revision makes
  piano the runtime core and turns guitar back into a sparse, dark folk pulse. It keeps the Bon Iver-adjacent
  intimacy, faster early-20th-century chamber-waltz motion, and strict two-bar palindrome motif, but avoids
  depending on bright pluck transients or large shared-stem gain.
