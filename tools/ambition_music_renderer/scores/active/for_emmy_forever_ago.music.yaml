  - {name: piano, group: keys, program: acoustic_grand_piano, volume: 54, pan: 48, expression: 74}
  - {name: falsetto, group: voice, program: lead_voice, volume: 58, pan: 66, expression: 80, modulation: 12}
  - {name: choir, group: choir_pad, program: choir_aahs, volume: 44, pan: 60, expression: 66, modulation: 5}
  - {name: warm_strings, group: strings, program: string_ensemble_1, volume: 46, pan: 52, expression: 68, modulation: 4}
  - {name: cello, group: low_strings, program: cello, volume: 52, pan: 40, expression: 70}
  - {name: harp, group: glimmer, program: orchestral_harp, volume: 44, pan: 76, expression: 64}
motifs:
  # A melodic palindrome: intervals read identically forwards and backwards, so
  # the phrase is invariant under time-reversal — its own conserved quantity.
  - id: emmy_palindrome
    root: D5
    intervals: [0, 2, 5, 7, 9, 7, 5, 2, 0]
    rhythm: [0.75, 0.5, 0.75, 1.0, 1.0, 1.0, 0.75, 0.5, 1.75]
    velocities: [0.46, 0.5, 0.56, 0.64, 0.7, 0.62, 0.54, 0.48, 0.4]
  - id: answer
    root: A4
    intervals: [0, 3, 5, 3, 0]
    rhythm: [1.0, 1.0, 1.5, 1.0, 1.5]
    velocities: [0.48, 0.54, 0.6, 0.5, 0.42]
