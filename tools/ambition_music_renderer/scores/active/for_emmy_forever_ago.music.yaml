schema: ambition.musicir.v1
id: for_emmy_forever_ago
title: For Emmy, Forever Ago
seed: 2026062007
notes: >-
  Emmy Noether's Noether Chamber theme, refined after the dissonance and
  runtime-stem passes. This version keeps the Bon Iver-adjacent intimacy and the
  early-20th-century waltz pulse, but makes the piano more ambient and gives the
  horns a clear supporting role. The low register is deliberately sparse so the
  bass does not fight the melody. The main melody remains a strict two-bar
  palindrome, so the cue's conserved quantity is still the tune itself.

