schema: ambition.musicir.v1
id: for_emmy_forever_ago
title: For Emmy, Forever Ago
seed: 2026062007
notes: Emmy Noether's Noether Chamber theme, re-spaced after dissonance-hotspot auditing. The previous
  no-noise pass proved the renderer could be quiet, but the audit showed the continuous piano lilt and
  guitar pulse collided with the palindrome/answer phrases. This revision keeps the Bon Iver-adjacent
  chamber-waltz identity while making accompaniment leave deliberate windows for the foreground symmetry
  material.
