  highpass_hz: 32
  lowpass_hz: 11000
  presence_low_hz: 1700
  presence_high_hz: 4000
  presence_db: 0.2
  reverb_wet: 0.27
  reverb_decay_seconds: 2.6
  reverb_damping_hz: 4800
  stereo_width: 0.2
  compressor_threshold_db: -18.0
  compressor_ratio: 2.4
  compressor_attack_ms: 16.0
  compressor_release_ms: 130.0
  compressor_makeup_db: 1.0
  compressor_knee_db: 6.5
  limiter_drive: 0.96
