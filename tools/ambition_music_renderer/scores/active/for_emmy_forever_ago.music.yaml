schema: ambition.musicir.v1
id: for_emmy_forever_ago
title: For Emmy, Forever Ago
seed: 2026062009
notes: >-
  Emmy Noether's Noether Chamber theme. This pass restores a warmer chamber-folk
  body after the horn/balance experiments: ambient piano chords carry the room,
  low piano gives a gentle waltz floor, and French horn pads sit as prominent
  backing rather than a lead. The Bon Iver-adjacent intimacy remains, but the
  arrangement should breathe more organically and avoid exposed dissonance. The
  main melody remains a strict two-bar palindrome, so the cue's conserved
  quantity is still the tune itself.

