schema: ambition.musicir.v1
id: for_emmy_forever_ago
title: For Emmy, Forever Ago
seed: 2026062001
notes: >-
  Emmy No-Ether's theme for the Noether Chamber. A hushed, Bon Iver-leaning
  folk reverie — slow 4/4, warm open maj7/sus voicings, fingerpicked nylon and
  soft piano under a falsetto-ish lead doubled by an aahs choir, all bathed in a
  long reverb tail. The lead phrase is a melodic PALINDROME (it reads the same
  forwards and backwards): a symmetry whose conserved quantity is the melody
  itself — Noether's theorem, sung. Title nods to "For Emma, Forever Ago".
tempo:
  bpm: 68
meter:
  beats_per_bar: 4
  beat_unit: 4
render:
