schema: ambition.musicir.v1
id: move_fast_and_break_things
title: Move Fast and Break Things - Ship It Before It Breaks
seed: 14920577
notes: >-
  A frantic darksynth chase in the Disruption family, pushed toward glitch and
  panic. A minor at 140 BPM, 4/4, with a Phrygian b2 (Bb) for menace and an E
  major (harmonic-minor V) bite. The lead is deliberately SPARSE and stabby —
  short jagged figures in the mid register with only occasional high "alert"
  pings, so when a high note lands it actually means something (no wall of
  shrieking). The engine is a relentless 16th sequencer over a driving offbeat
  synth bass; the kit is a broken breakbeat that gets more shattered as the
  build escalates. Same six repurposed runtime stem groups:
    strings    -> thin pad + driving sub-bass (pad_warm, pad_poly, synth_bass_1)
    winds      -> chip/stab leads (lead_square + lead_saw) and a glassy lead_chiff
                  reserved for the rare high "alert" ping
    brass      -> synth brass stabs (the deploy klaxon)
    mallets    -> 16th sequencer (synth_bass_2) + fx_crystal glitch sparkle
    percussion -> broken breakbeat kit, stutters and reverse-cymbal risers
    choir_pad  -> digital dread (fx_scifi + fx_atmosphere)
  Layout (~120 s): boot (intro) -> sprint (main_a) -> the glitch (main_b, the
  bug surfaces) -> it's down (bridge, sparse panic) -> total system failure
  (main_c, max chaos).

tempo:
  bpm: 140
meter:
  beats_per_bar: 4
  beat_unit: 4

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi

postprocess:
  gain_db: 0.0
  highpass_hz: 36
  reverb_wet: 0.018
  reverb_decay_seconds: 0.50
  reverb_damping_hz: 8200
  stereo_width: 0.05
  compressor_threshold_db: -16.0
  compressor_ratio: 3.6
  compressor_attack_ms: 6.0
  compressor_release_ms: 80.0
  compressor_makeup_db: 1.5
  compressor_knee_db: 5.0
  limiter_drive: 0.95
  normalize: true
  target_peak_db: -2.0

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 36
  reverb_wet: 0.003
  reverb_decay_seconds: 0.28
  reverb_damping_hz: 8200
  stereo_width: 0.035
  limiter_drive: 0.93
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: pad_warm,     group: strings,    program: pad_warm,      volume: 72, pan: 70, expression: 84, modulation: 4}
  - {name: pad_poly,     group: strings,    program: pad_poly,      volume: 68, pan: 56, expression: 80, modulation: 4}
  - {name: sub_bass,     group: strings,    program: synth_bass_1,  volume: 100, pan: 64, expression: 104}

  - {name: lead_square,  group: winds,      program: lead_square,   volume: 92, pan: 66, expression: 100, modulation: 5}
  - {name: lead_saw,     group: winds,      program: lead_saw,      volume: 88, pan: 52, expression: 98,  modulation: 6}
  - {name: lead_ping,    group: winds,      program: lead_chiff,    volume: 78, pan: 82, expression: 92,  modulation: 4}

  - {name: synth_brass_a, group: brass,     program: synth_brass_1, volume: 90, pan: 72, expression: 100, modulation: 3}
  - {name: synth_brass_b, group: brass,     program: synth_brass_2, volume: 84, pan: 48, expression: 96,  modulation: 3}

  - {name: arp_synth,    group: mallets,    program: synth_bass_2,  volume: 88, pan: 60, expression: 98}
  - {name: glitch_bell,  group: mallets,    program: fx_crystal,    volume: 66, pan: 84, expression: 82}

  - {name: scifi,        group: choir_pad,  program: fx_scifi,      volume: 58, pan: 64, expression: 76, modulation: 5}
  - {name: atmos,        group: choir_pad,  program: fx_atmosphere, volume: 54, pan: 64, expression: 74, modulation: 4}

  - {name: kit,          group: percussion, is_drum: true,          volume: 104, pan: 64, expression: 112}

motifs:
  # Stab lead — punchy, syncopated, tops at E5. The "ship it" jab.
  # A4 A4 C5 A4 E5 D5 C5 A4
  - id: stab_theme
    root: A4
    intervals: [0, 0, 3, 0, 7, 5, 3, 0]
    rhythm:    [0.5, 0.25, 0.25, 0.5, 0.5, 0.5, 0.75, 0.75]
    velocities: [1.00, 0.84, 0.92, 0.86, 0.96, 0.88, 0.82, 0.90]

  # Glitch variation — a chromatic Eb (the bug) creeps in. Tops at Eb5.
  # A4 C5 D5 Eb5 D5 C5 A4 G4
  - id: stab_glitch
    root: A4
    intervals: [0, 3, 5, 6, 5, 3, 0, -2]
    rhythm:    [0.5, 0.5, 0.5, 0.25, 0.25, 0.5, 0.75, 0.75]
    velocities: [0.96, 0.88, 0.90, 1.00, 0.86, 0.84, 0.80, 0.88]

  # Rare high "alert" ping — two notes only, used at phrase tops. E6 D6.
  - id: alert_ping
    root: E6
    intervals: [0, -2]
    rhythm:    [0.5, 0.5]
    velocities: [1.00, 0.84]

  # Climax stab — wider leap, reaches A5 once before crashing back down.
  # A4 C5 E5 A5 G5 E5 D5 C5 A4 G4 A4 E4
  - id: stab_climax
    root: A4
    intervals: [0, 3, 7, 12, 10, 7, 5, 3, 0, -2, 0, -5]
    rhythm:    [0.5, 0.25, 0.25, 0.5, 0.25, 0.25, 0.5, 0.5, 0.5, 0.25, 0.25, 0.5]
    velocities: [0.96, 0.84, 0.90, 1.00, 0.88, 0.86, 0.84, 0.82, 0.88, 0.80, 0.82, 0.86]

layer_templates:
  expression_swell:
    kind: automation
    automation:
      - {group: winds,     cc: expression, from: 70, to: 110, curve: smooth, points: 16}
      - {group: brass,     cc: expression, from: 58, to: 104, curve: smooth, points: 16}
      - {group: strings,   cc: expression, from: 74, to: 104, curve: smooth, points: 16}
      - {group: mallets,   cc: expression, from: 74, to: 106, curve: smooth, points: 16}
      - {group: choir_pad, cc: expression, from: 50, to: 82,  curve: smooth, points: 12}

  # Driving offbeat synth bass — straight 8ths with octave pops, follows chords.
  drive_bass:
    kind: bassline
    instrument: sub_bass
    octave: 1
    velocity: 96
    articulation: marcato
    humanize_ms: 1
    humanize_velocity_pct: 3
    pattern:
      - [0, 0.0, 0.42]
      - [0, 0.5, 0.42]
      - [12, 1.0, 0.42]
      - [0, 1.5, 0.42]
      - [0, 2.0, 0.42]
      - [0, 2.5, 0.42]
      - [12, 3.0, 0.42]
      - [7, 3.5, 0.42]

  # Thinned drive bass for the breakdown.
  drive_bass_sparse:
    kind: bassline
    instrument: sub_bass
    octave: 1
    velocity: 84
    articulation: marcato
    humanize_ms: 1
    humanize_velocity_pct: 3
    pattern:
      - [0, 0.0, 0.6]
      - [0, 1.5, 0.5]
      - [12, 2.0, 0.5]
      - [7, 3.5, 0.5]

  arp_16th:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 1, 2, 1, 2, 1, 0, 2]
    step: 0.25
    duration_beats: 0.18
    velocity: 78
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 4

  arp_8th:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 2, 1, 2]
    step: 0.5
    duration_beats: 0.36
    velocity: 64
    density: 0.9
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 3

  synth_pad:
    kind: pad_chords
    instruments: [pad_warm, pad_poly]
    instrument_octave_offsets: {pad_warm: 0, pad_poly: 1}
    instrument_velocity_offsets: {pad_warm: 0, pad_poly: -8}
    octave: 3
    duration_beats: 4.0
    velocity: 58
    articulation: pad
    voicing: open
    humanize_ms: 4
    humanize_velocity_pct: 3

  lead_stab_voice:
    kind: motif
    instrument: lead_square
    motif: stab_theme
    velocity: 90
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 4

  lead_glitch_voice:
    kind: motif
    instrument: lead_saw
    motif: stab_glitch
    velocity: 88
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 4

  lead_climax_voice:
    kind: motif
    instrument: lead_square
    motif: stab_climax
    velocity: 92
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 4

  alert_ping_voice:
    kind: motif
    instrument: lead_ping
    motif: alert_ping
    velocity: 82
    articulation: staccato
    humanize_ms: 1
    humanize_velocity_pct: 3

  synth_brass_stab:
    kind: chord_hits
    instruments: [synth_brass_a, synth_brass_b]
    instrument_octave_offsets: {synth_brass_a: 0, synth_brass_b: -1}
    octave: 3
    velocity: 88
    duration_beats: 0.75
    articulation: marcato
    voicing: closed
    humanize_ms: 2
    humanize_velocity_pct: 3

  glitch_sparkle:
    kind: chord_hits
    instrument: glitch_bell
    octave: 5
    velocity: 70
    duration_beats: 2.0
    articulation: bell
    voicing: closed
    humanize_ms: 0
    humanize_velocity_pct: 3

  scifi_wash:
    kind: pad_chords
    instrument: scifi
    octave: 4
    every_bars: 4
    duration_beats: 16.0
    velocity: 54
    articulation: pad
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  atmos_wash:
    kind: pad_chords
    instrument: atmos
    octave: 4
    every_bars: 4
    duration_beats: 16.0
    velocity: 48
    articulation: pad
    voicing: wide
    humanize_ms: 0
    humanize_velocity_pct: 3

  # Broken breakbeat — syncopated kick, ghost-snare, busy 16th hats.
  drums_break_basic:
    kind: drums
    instrument: kit
    humanize_ms: 1
    humanize_velocity_pct: 4
    events:
      - {drum: kick,           beats: [0.0, 0.75, 2.0],                          velocity: 94}
      - {drum: electric_snare, beats: [1.0, 3.0],                                velocity: 84}
      - {drum: electric_snare, beat: 3.5,                                        velocity: 40, probability: 0.5}
      - {drum: closed_hat,     beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5],  velocity: 30}
      - {drum: open_hat,       beat: 2.5,                                        velocity: 34}

  # Shattered breakbeat — more stutter, double-kick, ride bell.
  drums_break_busy:
    kind: drums
    instrument: kit
    humanize_ms: 1
    humanize_velocity_pct: 4
    events:
      - {drum: kick,           beats: [0.0, 0.75, 1.5, 2.0, 2.75],               velocity: 94}
      - {drum: electric_snare, beats: [1.0, 3.0],                                velocity: 86}
      - {drum: electric_snare, beats: [1.75, 3.5],                               velocity: 42, probability: 0.6}
      - {drum: closed_hat,     beats: [0.0, 0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75, 3.0, 3.25, 3.5, 3.75], velocity: 24}
      - {drum: open_hat,       beats: [2.5, 3.75],                               velocity: 32}
      - {drum: ride_bell,      beat: 0.0,                                        velocity: 30, probability: 0.5}

  # Total failure — relentless 16th kick stutter, crash markers, china.
  drums_failure:
    kind: drums
    instrument: kit
    humanize_ms: 1
    humanize_velocity_pct: 4
    events:
      - {drum: kick,           beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5],  velocity: 96}
      - {drum: electric_snare, beats: [1.0, 3.0],                                velocity: 88}
      - {drum: hand_clap,      beats: [1.0, 3.0],                                velocity: 56}
      - {drum: closed_hat,     beats: [0.25, 0.75, 1.25, 1.75, 2.25, 2.75, 3.25, 3.75], velocity: 30}
      - {drum: china,          beats: [0.0, 2.0],                                velocity: 36}
      - {drum: crash,          beat: 0.0, velocity: 84, bars: [0, 4, 8, 12]}
      - {drum: splash,         beat: 3.0, velocity: 44, bars: [3, 7, 11, 15]}

playback:
  mode: section_stem_matrix
  intro: intro
  loop_components: [main_a, main_b, bridge, main_c]
  outro: outro
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 2
    bridge_stems: [strings, choir_pad]
    fade_stems: [winds, brass, mallets, percussion]

state_map:
  starting: {section: intro}

  exploring:
    preferred_section: main_a
    stems: {strings: 1.0, mallets: 0.85, percussion: 0.70, winds: 0.50, brass: 0.0, choir_pad: 0.45}

  hacking:
    preferred_section: main_b
    stems: {strings: 1.0, mallets: 1.0, percussion: 0.85, winds: 0.70, brass: 0.25, choir_pad: 0.50}

  ambushed:
    preferred_section: bridge
    stems: {strings: 1.0, mallets: 0.45, percussion: 0.30, winds: 0.45, brass: 0.0, choir_pad: 0.85}

  confrontation:
    preferred_section: main_c
    stems: {strings: 1.0, mallets: 1.0, percussion: 1.0, winds: 1.0, brass: 1.0, choir_pad: 0.45}

  retreating:
    transition: outro_at_next_valid_exit_bar
    outro: outro

sections:
  - id: intro
    kind: intro
    label: boot sequence - the sequencer spins up
    bars: 8
    intensity: 0.52
    density: 0.45
    loopable: false
    harmony: ["Am", "Am", "F", "G", "Am", "Bb", "E", "E"]
    postprocess:
      reverb_wet: 0.040
      reverb_decay_seconds: 0.80
    layers:
      - expression_swell
      - kind: arpeggio
        instrument: arp_synth
        octave: 3
        pattern: [0, 1, 2, 1]
        step: 0.5
        duration_beats: 0.36
        velocity: 58
        density: 1.0
        voicing: closed
        articulation: pluck
      - {template: drive_bass_sparse, velocity: 82}
      - {template: scifi_wash, velocity: 46}
      - {template: atmos_wash, velocity: 40}
      - kind: drums
        instrument: kit
        humanize_ms: 1
        events:
          - {drum: kick,       beat: 0.0, velocity: 76, bars: [4, 5, 6, 7]}
          - {drum: closed_hat, beats: [0.5, 1.5, 2.5, 3.5], velocity: 24, bars: [5, 6, 7]}
          - {drum: splash,     beat: 3.0, velocity: 44, bars: [7]}

  - id: main_a
    kind: loop_component
    label: sprint - stab lead over relentless 16ths
    bars: 16
    intensity: 0.78
    density: 0.72
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["Am", "Am", "F", "G", "Am", "Bb", "G", "E",
              "Am", "Am", "F", "G", "Dm", "Bb", "E", "E"]
    layers:
      - {template: lead_stab_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 88}
      - {template: arp_16th, density: 1.0, velocity: 78}
      - {template: drive_bass, velocity: 94}
      - {template: synth_pad, velocity: 56}
      - drums_break_basic
      - {template: scifi_wash, velocity: 50}
      - {template: atmos_wash, velocity: 44}

  - id: main_b
    kind: loop_component
    label: the glitch - the bug surfaces, alert pings, busier kit
    bars: 16
    intensity: 0.82
    density: 0.78
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["Am", "Bb", "Am", "G", "F", "G", "Am", "E",
              "Am", "Bb", "C", "Bb", "Dm", "F", "E", "E"]
    layers:
      - {template: lead_glitch_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 90}
      - {template: lead_stab_voice,   starts: [[2, 0.0], [6, 0.0], [10, 0.0], [14, 0.0]], velocity: 78}
      # Rare high alert ping — only on two phrase tops.
      - {template: alert_ping_voice, starts: [[3, 3.0], [11, 3.0]], velocity: 82}
      - {template: arp_16th, density: 1.0, velocity: 80}
      - {template: drive_bass, velocity: 94}
      - {template: synth_pad, velocity: 58}
      - {template: synth_brass_stab, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 78}
      - drums_break_busy
      - {template: glitch_sparkle, hits: [[0, 0.0], [8, 0.0]], velocity: 64}
      - {template: scifi_wash, velocity: 54}
      - {template: atmos_wash, velocity: 46}

  - id: bridge
    kind: loop_component
    label: it's down - sparse panic, the room goes quiet
    bars: 8
    intensity: 0.50
    density: 0.38
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Dm", "Bb", "F", "C", "Dm", "Bb", "E", "E"]
    postprocess:
      reverb_wet: 0.030
      reverb_decay_seconds: 0.55
    layers:
      - kind: motif
        instrument: lead_saw
        motif: stab_glitch
        velocity: 72
        articulation: normal
        humanize_ms: 3
        starts: [[0, 0.0], [4, 0.0]]
      - {template: arp_8th, density: 0.85, velocity: 58}
      - {template: drive_bass_sparse, velocity: 80}
      - {template: synth_pad, velocity: 60}
      - kind: drums
        instrument: kit
        humanize_ms: 1
        events:
          - {drum: kick, beats: [0.0, 2.0], velocity: 64}
          - {drum: side_stick, beats: [1.0, 3.0], velocity: 32}
          - {drum: closed_hat, beats: [0.5, 1.5, 2.5, 3.5], velocity: 22}
      - {template: scifi_wash, velocity: 64}
      - {template: atmos_wash, velocity: 58}

  - id: main_c
    kind: loop_component
    label: total system failure - full chaos, the climax stab
    bars: 16
    intensity: 0.96
    density: 0.90
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["Am", "F", "G", "E", "Am", "Bb", "G", "E",
              "Am", "F", "Dm", "Bb", "F", "G", "E", "E"]
    postprocess:
      reverb_wet: 0.034
      reverb_decay_seconds: 0.70
    layers:
      - {template: lead_climax_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 92}
      - {template: lead_glitch_voice, starts: [[2, 0.0], [6, 0.0], [10, 0.0], [14, 0.0]], velocity: 82}
      - {template: alert_ping_voice, starts: [[3, 3.0], [7, 3.0], [11, 3.0], [15, 3.0]], velocity: 84}
      - {template: arp_16th, density: 1.0, velocity: 84}
      - {template: drive_bass, velocity: 96}
      - {template: synth_pad, velocity: 62}
      - {template: synth_brass_stab, hits: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0], [8, 0.0], [10, 0.0], [12, 0.0], [14, 0.0]], velocity: 86}
      - drums_failure
      - {template: glitch_sparkle, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 70}
      - {template: scifi_wash, velocity: 52}
      - {template: atmos_wash, velocity: 44}

  - id: outro
    kind: outro
    label: kernel panic - one last stab, then dark
    bars: 4
    intensity: 0.54
    density: 0.40
    loopable: false
    harmony: ["Am", "F", "E", "Am"]
    layers:
      - {template: lead_stab_voice, starts: [[0, 0.0]], velocity: 80}
      - {template: arp_16th, density: 0.7, velocity: 58}
      - {template: drive_bass_sparse, velocity: 80}
      - {template: synth_pad, velocity: 56}
      - kind: drums
        instrument: kit
        humanize_ms: 1
        events:
          - {drum: kick, beat: 0.0, velocity: 94, bars: [3]}
          - {drum: crash, beat: 0.0, velocity: 84, bars: [3]}
          - {drum: china, beat: 0.0, velocity: 50, bars: [3]}
          - {drum: closed_hat, beats: [0.0, 0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75], velocity: 28, bars: [2]}
      - {template: scifi_wash, velocity: 48}
      - {template: atmos_wash, velocity: 40}

group_postprocess:
  strings:    {gain_db: 0.0,  lowpass_hz: 14000, high_shelf_hz: 5800, high_shelf_db: 0.4, transient_tame: 0.03, reverb_wet: 0.004}
  winds:      {gain_db: 1.0,  lowpass_hz: 14500, high_shelf_hz: 5600, high_shelf_db: 1.2, presence_low_hz: 1600, presence_high_hz: 6000, presence_db: 1.4, transient_tame: 0.01, reverb_wet: 0.004}
  brass:      {gain_db: 0.0,  lowpass_hz: 13000, high_shelf_hz: 5600, high_shelf_db: 0.6, transient_tame: 0.02, reverb_wet: 0.004}
  mallets:    {gain_db: 0.0,  lowpass_hz: 14000, high_shelf_hz: 6000, high_shelf_db: 0.6, transient_tame: 0.02, reverb_wet: 0.005}
  percussion: {gain_db: -0.5, lowpass_hz: 12500, high_shelf_hz: 6000, high_shelf_db: 0.2, transient_tame: 0.02, reverb_wet: 0.002}
  choir_pad:  {gain_db: -2.0, lowpass_hz: 11500, high_shelf_hz: 5600, high_shelf_db: -0.2, transient_tame: 0.04, reverb_wet: 0.011}
