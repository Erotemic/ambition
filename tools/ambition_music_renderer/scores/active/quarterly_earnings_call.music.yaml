schema: ambition.musicir.v1
id: quarterly_earnings_call
title: Quarterly Earnings Call - Beat the Estimates, Lower the Guidance
seed: 33180644
notes: >-
  A close sibling to tech_bros_disruption with a story twist. Same F# minor at
  124 BPM, same all-electronic palette and six repurposed stem groups — but
  where Disruption rides a continuous lead, this one is STAB-and-CHANT driven:
  the numbers get barked out in repeated-note synth-brass and square-lead figures
  like an investor-relations deck read aloud. The twist is a deceptive macro
  structure:
    main_a  - "the report": F# minor, half-time, drilling the quarter's numbers
    main_b  - "beat estimates": a bright lift that tonicizes the relative A major
              (Lydian D# color) and gear-shifts to double-time — the applause
    bridge  - "however, regarding guidance...": the collapse, a chromatic D->Dm
              slip over a C# (harmonic-minor V) — the air leaves the room
    main_c  - "the spin": defiant full mix, damage control
  The lead is capped at C#6 (an octave below Disruption's F#6 climax) so the
  hook punches without shrieking. Stem-group repurposing:
    strings    -> pad bed + sub-bass (pad_warm, pad_poly, synth_bass_1)
    winds      -> the barked-numbers leads (lead_square + lead_saw) and lead_voice
                  for "the spin"
    brass      -> the corporate fanfare front-and-center (synth_brass_1/2)
    mallets    -> 16th sequencer (synth_bass_2) + fx_crystal "ka-ching" sparkle
    percussion -> corporate-funk synthwave kit; half-time report, double-time hype
    choir_pad  -> boardroom dread (fx_atmosphere + pad_metallic)

tempo:
  bpm: 124
meter:
  beats_per_bar: 4
  beat_unit: 4

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi

postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.030
  reverb_decay_seconds: 0.80
  reverb_damping_hz: 7000
  stereo_width: 0.06
  compressor_threshold_db: -18.0
  compressor_ratio: 3.0
  compressor_attack_ms: 10.0
  compressor_release_ms: 100.0
  compressor_makeup_db: 1.5
  compressor_knee_db: 6.0
  limiter_drive: 0.94
  normalize: true
  target_peak_db: -2.0

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.004
  reverb_decay_seconds: 0.40
  reverb_damping_hz: 7000
  stereo_width: 0.040
  limiter_drive: 0.92
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: pad_warm,    group: strings,    program: pad_warm,      volume: 78, pan: 70, expression: 90, modulation: 4}
  - {name: pad_poly,    group: strings,    program: pad_poly,      volume: 74, pan: 56, expression: 86, modulation: 4}
  - {name: sub_bass,    group: strings,    program: synth_bass_1,  volume: 98, pan: 64, expression: 100}

  - {name: lead_square, group: winds,      program: lead_square,   volume: 94, pan: 66, expression: 102, modulation: 4}
  - {name: lead_saw,    group: winds,      program: lead_saw,      volume: 90, pan: 52, expression: 100, modulation: 6}
  - {name: lead_voice,  group: winds,      program: lead_voice,    volume: 84, pan: 64, expression: 92,  modulation: 5}

  - {name: synth_brass_a, group: brass,    program: synth_brass_1, volume: 96, pan: 70, expression: 104, modulation: 3}
  - {name: synth_brass_b, group: brass,    program: synth_brass_2, volume: 90, pan: 50, expression: 100, modulation: 3}

  - {name: arp_synth,   group: mallets,    program: synth_bass_2,  volume: 88, pan: 60, expression: 96}
  - {name: kaching,     group: mallets,    program: fx_crystal,    volume: 70, pan: 80, expression: 84}

  - {name: atmos,       group: choir_pad,  program: fx_atmosphere, volume: 62, pan: 64, expression: 78, modulation: 4}
  - {name: pad_metallic,group: choir_pad,  program: pad_metallic,  volume: 54, pan: 64, expression: 74, modulation: 3}

  - {name: kit,         group: percussion, is_drum: true,          volume: 102, pan: 64, expression: 110}

motifs:
  # "The numbers" — repeated-note stabs drilling a figure, then a tail.
  # F#5 F#5 F#5 A5 G#5 F#5 E5 C#5
  - id: the_numbers
    root: F#5
    intervals: [0, 0, 0, 3, 2, 0, -2, -5]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
    velocities: [1.00, 0.84, 0.92, 0.96, 0.86, 0.90, 0.82, 0.94]

  # "Beat estimates" — the hype lift, brighter, tops at C#6 (the applause).
  # A5 C#6 B5 A5 F#5 A5 B5 A5
  - id: beat_estimates
    root: A5
    intervals: [0, 3, 2, 0, -3, 0, 2, 0]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
    velocities: [0.96, 1.00, 0.90, 0.88, 0.84, 0.90, 0.92, 0.94]

  # "Guidance lowered" — the chromatic collapse, descending, deflating.
  # F#5 F5 E5 D5 C#5 C5 B4 A4
  - id: guidance_lowered
    root: F#5
    intervals: [0, -1, -2, -4, -5, -6, -7, -9]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 1.0, 1.0]
    velocities: [0.90, 0.82, 0.80, 0.74, 0.70, 0.66, 0.62, 0.58]

  # "The spin" — defiant recap, climbs back up but stays under D6.
  # F#5 A5 C#6 B5 A5 G#5 F#5 E5 F#5 A5 B5 F#5
  - id: the_spin
    root: F#5
    intervals: [0, 3, 7, 5, 3, 2, 0, -2, 0, 3, 5, 0]
    rhythm:    [0.5, 0.25, 0.25, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.25, 0.25, 0.5]
    velocities: [0.94, 0.84, 0.96, 0.90, 0.88, 0.86, 0.92, 0.84, 0.92, 0.84, 0.88, 0.90]

  # Sub-bass: tonic + fifth pulse. F#1 F#1 C#2 F#1
  - id: sub_bass_pulse
    root: F#1
    intervals: [0, 0, 7, 0]
    rhythm:    [1.0, 1.0, 1.0, 1.0]
    velocities: [1.00, 0.84, 0.92, 0.86]

  # Sub-bass with the V push (C#) for the hype section.
  # F#1 C#2 F#1 C#2
  - id: sub_bass_push
    root: F#1
    intervals: [0, 7, 0, 7]
    rhythm:    [1.0, 1.0, 1.0, 1.0]
    velocities: [1.00, 0.92, 0.88, 0.94]

layer_templates:
  expression_swell:
    kind: automation
    automation:
      - {group: winds,     cc: expression, from: 70, to: 110, curve: smooth, points: 16}
      - {group: brass,     cc: expression, from: 60, to: 108, curve: smooth, points: 16}
      - {group: strings,   cc: expression, from: 70, to: 100, curve: smooth, points: 16}
      - {group: mallets,   cc: expression, from: 70, to: 105, curve: smooth, points: 16}
      - {group: choir_pad, cc: expression, from: 50, to: 86,  curve: smooth, points: 12}

  sub_bass_voice:
    kind: motif
    instrument: sub_bass
    motif: sub_bass_pulse
    velocity: 90
    articulation: tenuto
    humanize_ms: 1
    humanize_velocity_pct: 3
    starts: [[0, 0.0]]
    repeats: 24
    every_bars: 1

  sub_bass_push_voice:
    kind: motif
    instrument: sub_bass
    motif: sub_bass_push
    velocity: 92
    articulation: tenuto
    humanize_ms: 1
    humanize_velocity_pct: 3
    starts: [[0, 0.0]]
    repeats: 24
    every_bars: 1

  arp_16th:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 1, 2, 1, 0, 2, 1, 2]
    step: 0.25
    duration_beats: 0.20
    velocity: 78
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 3

  arp_8th:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 2, 1, 2]
    step: 0.5
    duration_beats: 0.40
    velocity: 66
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 3

  synth_pad:
    kind: pad_chords
    instruments: [pad_warm, pad_poly]
    instrument_octave_offsets: {pad_warm: 0, pad_poly: 1}
    instrument_velocity_offsets: {pad_warm: 0, pad_poly: -8}
    octave: 3
    duration_beats: 4.0
    velocity: 68
    articulation: pad
    voicing: open
    humanize_ms: 4
    humanize_velocity_pct: 3

  numbers_voice:
    kind: motif
    instrument: lead_square
    motif: the_numbers
    velocity: 92
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 3

  beat_estimates_voice:
    kind: motif
    instrument: lead_saw
    motif: beat_estimates
    velocity: 92
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  guidance_voice:
    kind: motif
    instrument: lead_voice
    motif: guidance_lowered
    velocity: 80
    articulation: legato
    humanize_ms: 3
    humanize_velocity_pct: 3

  spin_voice:
    kind: motif
    instrument: lead_saw
    motif: the_spin
    velocity: 94
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  spin_voice_double:
    kind: motif
    instrument: lead_voice
    motif: the_spin
    transpose: -12
    velocity: 78
    articulation: tenuto
    humanize_ms: 3
    humanize_velocity_pct: 3

  # Barked-numbers brass stabs — the IR deck read aloud.
  brass_numbers:
    kind: chord_hits
    instruments: [synth_brass_a, synth_brass_b]
    instrument_octave_offsets: {synth_brass_a: 0, synth_brass_b: -1}
    octave: 3
    velocity: 92
    duration_beats: 0.5
    articulation: marcato
    voicing: closed
    humanize_ms: 2
    humanize_velocity_pct: 3

  brass_pad:
    kind: pad_chords
    instruments: [synth_brass_a, synth_brass_b]
    instrument_octave_offsets: {synth_brass_a: 0, synth_brass_b: -1}
    octave: 3
    duration_beats: 4.0
    velocity: 78
    articulation: legato
    voicing: closed
    humanize_ms: 3
    humanize_velocity_pct: 3

  kaching_sparkle:
    kind: chord_hits
    instrument: kaching
    octave: 5
    velocity: 74
    duration_beats: 4.0
    articulation: bell
    voicing: closed
    humanize_ms: 0
    humanize_velocity_pct: 3

  atmos_wash:
    kind: pad_chords
    instrument: atmos
    octave: 4
    every_bars: 4
    duration_beats: 16.0
    velocity: 58
    articulation: pad
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  metallic_layer:
    kind: pad_chords
    instrument: pad_metallic
    octave: 3
    every_bars: 4
    duration_beats: 16.0
    velocity: 44
    articulation: pad
    voicing: wide
    humanize_ms: 0
    humanize_velocity_pct: 3

  # Half-time corporate-funk groove — the report.
  drums_report:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 2.0],            velocity: 90}
      - {drum: electric_snare, beats: [1.0, 3.0],            velocity: 78}
      - {drum: closed_hat,     beats: [0.5, 1.5, 2.5, 3.5],  velocity: 30}
      - {drum: side_stick,     beat: 2.75,                   velocity: 30, probability: 0.6}

  # Double-time hype groove — four-on-the-floor + claps, the applause.
  drums_hype:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 1.0, 2.0, 3.0],             velocity: 96}
      - {drum: electric_snare, beats: [1.0, 3.0],                       velocity: 82}
      - {drum: hand_clap,      beats: [1.0, 3.0],                       velocity: 54}
      - {drum: closed_hat,     beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5], velocity: 30}
      - {drum: open_hat,       beats: [0.25, 1.25, 2.25, 3.25],         velocity: 26}
      - {drum: tambourine,     beats: [0.5, 1.5, 2.5, 3.5],             velocity: 24}

  # The spin — driving club groove with ride.
  drums_spin:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 1.0, 2.0, 3.0],             velocity: 96}
      - {drum: electric_snare, beats: [1.0, 3.0],                       velocity: 84}
      - {drum: hand_clap,      beats: [1.0, 3.0],                       velocity: 50}
      - {drum: closed_hat,     beats: [0.5, 1.5, 2.5, 3.5],             velocity: 38}
      - {drum: ride,           beats: [0.0, 1.0, 2.0, 3.0],             velocity: 22}
      - {drum: crash,          beat: 0.0, velocity: 84, bars: [0, 4, 8, 12]}

playback:
  mode: section_stem_matrix
  intro: intro
  loop_components: [main_a, main_b, bridge, main_c]
  outro: outro
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [strings, choir_pad]
    fade_stems: [winds, brass, mallets, percussion]

state_map:
  starting: {section: intro}

  exploring:
    preferred_section: main_a
    stems: {strings: 1.0, mallets: 0.80, percussion: 0.65, winds: 0.55, brass: 0.45, choir_pad: 0.55}

  hacking:
    preferred_section: main_b
    stems: {strings: 1.0, mallets: 1.0, percussion: 0.90, winds: 0.85, brass: 0.65, choir_pad: 0.45}

  ambushed:
    preferred_section: bridge
    stems: {strings: 1.0, mallets: 0.40, percussion: 0.25, winds: 0.65, brass: 0.0, choir_pad: 0.90}

  confrontation:
    preferred_section: main_c
    stems: {strings: 1.0, mallets: 1.0, percussion: 1.0, winds: 1.0, brass: 1.0, choir_pad: 0.50}

  retreating:
    transition: outro_at_next_valid_exit_bar
    outro: outro

sections:
  - id: intro
    kind: intro
    label: thank you all for joining - the dial-in tone, brass clears its throat
    bars: 8
    intensity: 0.50
    density: 0.42
    loopable: false
    harmony: ["F#m", "D", "A", "E", "F#m", "D", "C#", "C#"]
    postprocess:
      reverb_wet: 0.075
      reverb_decay_seconds: 1.30
    layers:
      - expression_swell
      - {template: sub_bass_voice, repeats: 8, velocity: 80}
      - kind: arpeggio
        instrument: arp_synth
        octave: 3
        pattern: [0, 1, 2, 1]
        step: 0.5
        duration_beats: 0.40
        velocity: 58
        density: 1.0
        voicing: closed
        articulation: pluck
      - {template: synth_pad, velocity: 60}
      - {template: atmos_wash, velocity: 50}
      - {template: metallic_layer, velocity: 38}
      - {template: brass_numbers, hits: [[6, 0.0], [6, 1.0], [7, 0.0], [7, 1.0]], velocity: 70}
      - kind: drums
        instrument: kit
        humanize_ms: 0
        events:
          - {drum: kick,       beat: 0.0, velocity: 70, bars: [4, 5, 6, 7]}
          - {drum: closed_hat, beats: [0.5, 1.5, 2.5, 3.5], velocity: 26, bars: [6, 7]}

  - id: main_a
    kind: loop_component
    label: the report - drilling the numbers, half-time
    bars: 16
    intensity: 0.74
    density: 0.66
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["F#m", "A", "E", "B", "F#m", "D", "A", "C#",
              "F#m", "A", "E", "B", "D", "A", "C#", "C#"]
    layers:
      - {template: numbers_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 90}
      - {template: brass_numbers, hits: [[0, 0.0], [0, 1.0], [0, 2.0], [4, 0.0], [4, 1.0], [4, 2.0], [8, 0.0], [8, 1.0], [8, 2.0], [12, 0.0], [12, 1.0], [12, 2.0]], velocity: 80}
      - {template: arp_16th, density: 1.0, velocity: 76}
      - {template: sub_bass_voice, repeats: 16, velocity: 88}
      - {template: synth_pad, velocity: 66}
      - drums_report
      - {template: atmos_wash, velocity: 54}
      - {template: metallic_layer, velocity: 40}

  - id: main_b
    kind: loop_component
    label: beat estimates - the lift to A major, double-time, applause
    bars: 16
    intensity: 0.84
    density: 0.78
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["A", "E", "D", "A", "Bm", "E", "A", "A",
              "A", "E", "F#m", "D", "Bm", "E", "A", "A"]
    layers:
      - {template: beat_estimates_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 92}
      - {template: numbers_voice, starts: [[2, 0.0], [6, 0.0], [10, 0.0], [14, 0.0]], velocity: 80}
      - {template: arp_16th, density: 1.0, velocity: 80}
      - {template: sub_bass_push_voice, repeats: 16, velocity: 90}
      - {template: synth_pad, velocity: 70}
      - {template: brass_numbers, hits: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0], [8, 0.0], [10, 0.0], [12, 0.0], [14, 0.0]], velocity: 84}
      - drums_hype
      - {template: kaching_sparkle, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 68}
      - {template: atmos_wash, velocity: 50}
      - {template: metallic_layer, velocity: 40}

  - id: bridge
    kind: loop_component
    label: however, regarding guidance - the chromatic collapse
    bars: 8
    intensity: 0.50
    density: 0.34
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["F#m", "D", "Dm", "C#", "F#m", "D", "Dm", "C#"]
    postprocess:
      reverb_wet: 0.025
      reverb_decay_seconds: 0.70
    layers:
      - {template: guidance_voice, starts: [[0, 0.0], [4, 0.0]], velocity: 80}
      - {template: arp_8th, density: 0.80, velocity: 56}
      - kind: motif
        instrument: sub_bass
        motif: sub_bass_pulse
        velocity: 70
        articulation: tenuto
        humanize_ms: 0
        starts: [[0, 0.0], [4, 0.0]]
      - {template: synth_pad, velocity: 66}
      - kind: drums
        instrument: kit
        humanize_ms: 0
        events:
          - {drum: kick, beats: [0.0, 2.0], velocity: 58}
          - {drum: side_stick, beats: [1.0, 3.0], velocity: 28}
      - {template: atmos_wash, velocity: 72}
      - {template: metallic_layer, velocity: 52}

  - id: main_c
    kind: loop_component
    label: the spin - defiant full mix, damage control
    bars: 16
    intensity: 0.94
    density: 0.85
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["F#m", "D", "A", "E", "F#m", "Bm", "C#", "C#",
              "F#m", "A", "D", "C#", "Bm", "C#", "F#m", "F#m"]
    postprocess:
      reverb_wet: 0.075
      reverb_decay_seconds: 1.40
    layers:
      - {template: spin_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 94}
      - {template: spin_voice_double, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 78}
      - {template: numbers_voice, starts: [[2, 0.0], [6, 0.0], [10, 0.0], [14, 0.0]], velocity: 84}
      - {template: arp_16th, density: 1.0, velocity: 84}
      - {template: sub_bass_voice, repeats: 16, velocity: 92}
      - {template: synth_pad, velocity: 74}
      - {template: brass_pad, velocity: 76}
      - {template: brass_numbers, hits: [[0, 0.0], [0, 1.0], [4, 0.0], [4, 1.0], [8, 0.0], [8, 1.0], [12, 0.0], [12, 1.0]], velocity: 90}
      - drums_spin
      - {template: kaching_sparkle, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 74}
      - {template: atmos_wash, velocity: 56}
      - {template: metallic_layer, velocity: 42}

  - id: outro
    kind: outro
    label: this concludes the call - a clipped button, line goes dead
    bars: 4
    intensity: 0.55
    density: 0.40
    loopable: false
    harmony: ["F#m", "Bm", "C#", "F#m"]
    layers:
      - {template: numbers_voice, starts: [[0, 0.0]], velocity: 84}
      - {template: arp_16th, density: 0.7, velocity: 58}
      - {template: sub_bass_voice, repeats: 4, velocity: 78}
      - {template: synth_pad, velocity: 64}
      - kind: drums
        instrument: kit
        humanize_ms: 0
        events:
          - {drum: kick, beat: 0.0, velocity: 92, bars: [3]}
          - {drum: crash, beat: 0.0, velocity: 84, bars: [3]}
          - {drum: electric_snare, beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5], velocity: 36, bars: [2]}
      - {template: brass_numbers, hits: [[3, 0.0]], velocity: 88}
      - {template: kaching_sparkle, hits: [[3, 0.0]], velocity: 70}
      - {template: atmos_wash, velocity: 50}
      - {template: metallic_layer, velocity: 38}

group_postprocess:
  strings:    {gain_db: 0.0,  lowpass_hz: 14000, high_shelf_hz: 5500, high_shelf_db: 0.4, transient_tame: 0.04, reverb_wet: 0.005}
