schema: ambition.musicir.v1
id: pivot_to_ai
title: Pivot to AI - We've Always Been an AI Company
seed: 80264417
notes: >-
  A Disruption-family synthwave built as a MODULAR FADER BOARD: the six runtime
  stem groups are authored so the game can add or drop them by situation, and the
  track scales from a single idle-terminal bleep all the way up to a full
  launch-day banger without ever sounding incomplete. G minor at 126 BPM, 4/4.
  Read the stem groups as a mixing desk where each fader is one idea:

    strings    = THE RUNWAY  (sub-bass + warm pad)  -- the capital. Always on;
                 it is the floor everything else stands on.
    mallets    = THE ENGINE  (16th arp + bell)       -- the training loop. The
                 relentless sequencer; on whenever anything is "building".
    percussion = THE DRIVE   (electronic kit)        -- shipping cadence.
    winds      = THE PRODUCT  (saw/square/voice leads)-- the actual feature/hook;
                 raise it when you have something to demo.
    brass      = THE HYPE     (synth-brass fanfare)   -- the pitch deck; reserved
                 for launch day / crisis. Loud, triumphant, a little fake.
    choir_pad  = THE DREAD    (fx_atmosphere + fx_scifi)-- "is any of this real?";
                 raise it when the valuation stops making sense.

  So MINIMAL = runway + engine (sub + arp): a server humming at 2am. MAXIMAL =
  every fader up: the keynote. The state_map below is deliberately written like a
  fader automation lane so each gameplay state is a clearly different blend, and
  the in_game_minimal / in_game_maximal previews bracket the usable range. The
  lead sits in a moderate register (G4-D5) with bell sparkle only at the top, so
  layering up never turns shrill.

tempo:
  bpm: 126
meter:
  beats_per_bar: 4
  beat_unit: 4

constraints:
  voice_leading: minimize_motion
  no_clusters: true

render:
  sample_rate: 48000
  ogg_quality: 6
  backend: pretty-midi

postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.032
  reverb_decay_seconds: 0.90
  reverb_damping_hz: 7200
  stereo_width: 0.07
  compressor_threshold_db: -18.0
  compressor_ratio: 3.0
  compressor_attack_ms: 10.0
  compressor_release_ms: 100.0
  compressor_makeup_db: 1.5
  compressor_knee_db: 6.0
  limiter_drive: 0.94
  normalize: true
  target_peak_db: -2.0

stem_postprocess:
  gain_db: 0.0
  highpass_hz: 30
  reverb_wet: 0.004
  reverb_decay_seconds: 0.42
  reverb_damping_hz: 7200
  stereo_width: 0.045
  limiter_drive: 0.92
  normalize: false
  target_peak_db: -3.0

instruments:
  # THE RUNWAY (strings) = sub-bass + warm pad, always on.
  - {name: pad_warm,    group: strings,    program: pad_warm,      volume: 80, pan: 66, expression: 92, modulation: 4}
  - {name: pad_poly,    group: strings,    program: pad_poly,      volume: 74, pan: 58, expression: 86, modulation: 4}
  - {name: sub_bass,    group: strings,    program: synth_bass_1,  volume: 98, pan: 64, expression: 100}

  # THE PRODUCT (winds) = the leads / the feature.
  - {name: lead_saw,    group: winds,      program: lead_saw,      volume: 94, pan: 68, expression: 102, modulation: 6}
  - {name: lead_square, group: winds,      program: lead_square,   volume: 88, pan: 52, expression: 96,  modulation: 4}
  - {name: lead_voice,  group: winds,      program: lead_voice,    volume: 82, pan: 64, expression: 90,  modulation: 5}

  # THE HYPE (brass) = the fanfare / pitch deck.
  - {name: synth_brass_a, group: brass,    program: synth_brass_1, volume: 94, pan: 70, expression: 102, modulation: 3}
  - {name: synth_brass_b, group: brass,    program: synth_brass_2, volume: 88, pan: 50, expression: 98,  modulation: 3}

  # THE ENGINE (mallets) = the sequencer + bell sparkle.
  - {name: arp_synth,   group: mallets,    program: synth_bass_2,  volume: 88, pan: 60, expression: 96}
  - {name: bell_synth,  group: mallets,    program: fx_crystal,    volume: 70, pan: 82, expression: 84}

  # THE DREAD (choir_pad) = atmosphere + sci-fi unease.
  - {name: atmos,       group: choir_pad,  program: fx_atmosphere, volume: 62, pan: 64, expression: 78, modulation: 4}
  - {name: scifi,       group: choir_pad,  program: fx_scifi,      volume: 54, pan: 64, expression: 74, modulation: 5}

  # THE DRIVE (percussion).
  - {name: kit,         group: percussion, is_drum: true,          volume: 102, pan: 64, expression: 110}

motifs:
  # THE PRODUCT hook — clean, moderate register, G4..D5. The feature demo.
  # G4 Bb4 D5 C5 Bb4 D5 C5 A4
  - id: product_hook
    root: G4
    intervals: [0, 3, 7, 5, 3, 7, 5, 2]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
    velocities: [1.00, 0.86, 0.94, 0.84, 0.90, 0.92, 0.84, 0.94]

  # Hook variation — descends then resolves up. Stays under D5.
  # D5 C5 Bb4 A4 G4 A4 Bb4 D5
  - id: product_hook_b
    root: G4
    intervals: [7, 5, 3, 2, 0, 2, 3, 7]
    rhythm:    [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
    velocities: [0.96, 0.86, 0.88, 0.84, 0.98, 0.86, 0.90, 0.94]

  # THE HYPE fanfare — a triumphant climb to G5 (one peak) then settles.
  # G4 Bb4 D5 G5 F5 D5 Eb5 D5
  - id: hype_fanfare
    root: G4
    intervals: [0, 3, 7, 12, 10, 7, 8, 7]
    rhythm:    [0.5, 0.5, 0.5, 0.75, 0.25, 0.5, 0.5, 0.5]
    velocities: [0.92, 0.86, 0.94, 1.00, 0.90, 0.92, 0.86, 0.94]

  # Launch-day product line — extended, climbs to F5, lots of motion, caps low.
  # G4 Bb4 D5 F5 Eb5 D5 C5 Bb4 G4 A4 Bb4 G4
  - id: product_launch
    root: G4
    intervals: [0, 3, 7, 10, 8, 7, 5, 3, 0, 2, 3, 0]
    rhythm:    [0.5, 0.25, 0.25, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.25, 0.25, 0.5]
    velocities: [0.94, 0.84, 0.92, 1.00, 0.92, 0.90, 0.88, 0.84, 0.92, 0.84, 0.86, 0.90]

  # THE RUNWAY sub-bass: tonic + fifth pulse. G1 G1 D2 G1
  - id: sub_bass_pulse
    root: G1
    intervals: [0, 0, 7, 0]
    rhythm:    [1.0, 1.0, 1.0, 1.0]
    velocities: [1.00, 0.84, 0.92, 0.86]

  # Sub-bass motion — adds the b6 (Eb) then V (D). G1 G1 Eb2 D2
  - id: sub_bass_motion
    root: G1
    intervals: [0, 0, 8, 7]
    rhythm:    [1.0, 1.0, 1.0, 1.0]
    velocities: [1.00, 0.84, 0.94, 0.92]

layer_templates:
  expression_swell:
    kind: automation
    automation:
      - {group: winds,     cc: expression, from: 70, to: 110, curve: smooth, points: 16}
      - {group: brass,     cc: expression, from: 60, to: 106, curve: smooth, points: 16}
      - {group: strings,   cc: expression, from: 70, to: 100, curve: smooth, points: 16}
      - {group: mallets,   cc: expression, from: 70, to: 105, curve: smooth, points: 16}
      - {group: choir_pad, cc: expression, from: 50, to: 86,  curve: smooth, points: 12}

  # --- THE RUNWAY (strings) ---
  sub_bass_voice:
    kind: motif
    instrument: sub_bass
    motif: sub_bass_pulse
    velocity: 90
    articulation: tenuto
    humanize_ms: 1
    humanize_velocity_pct: 3
    starts: [[0, 0.0]]
    repeats: 24
    every_bars: 1

  sub_bass_motion_voice:
    kind: motif
    instrument: sub_bass
    motif: sub_bass_motion
    velocity: 90
    articulation: tenuto
    humanize_ms: 1
    humanize_velocity_pct: 3
    starts: [[0, 0.0]]
    repeats: 24
    every_bars: 1

  synth_pad:
    kind: pad_chords
    instruments: [pad_warm, pad_poly]
    instrument_octave_offsets: {pad_warm: 0, pad_poly: 1}
    instrument_velocity_offsets: {pad_warm: 0, pad_poly: -8}
    octave: 3
    duration_beats: 4.0
    velocity: 68
    articulation: pad
    voicing: open
    humanize_ms: 4
    humanize_velocity_pct: 3

  # --- THE ENGINE (mallets) ---
  arp_16th:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 1, 2, 1, 0, 2, 1, 2]
    step: 0.25
    duration_beats: 0.20
    velocity: 78
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 3

  arp_8th:
    kind: arpeggio
    instrument: arp_synth
    octave: 3
    pattern: [0, 2, 1, 2]
    step: 0.5
    duration_beats: 0.40
    velocity: 66
    density: 1.0
    voicing: closed
    articulation: pluck
    humanize_ms: 0
    humanize_velocity_pct: 3

  bell_sparkle:
    kind: chord_hits
    instrument: bell_synth
    octave: 5
    velocity: 72
    duration_beats: 4.0
    articulation: bell
    voicing: closed
    humanize_ms: 0
    humanize_velocity_pct: 3

  # --- THE PRODUCT (winds) ---
  product_voice:
    kind: motif
    instrument: lead_saw
    motif: product_hook
    velocity: 90
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  product_voice_b:
    kind: motif
    instrument: lead_square
    motif: product_hook_b
    velocity: 86
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  product_launch_voice:
    kind: motif
    instrument: lead_saw
    motif: product_launch
    velocity: 94
    articulation: tenuto
    humanize_ms: 2
    humanize_velocity_pct: 3

  product_launch_double:
    kind: motif
    instrument: lead_voice
    motif: product_launch
    transpose: -12
    velocity: 78
    articulation: tenuto
    humanize_ms: 3
    humanize_velocity_pct: 3

  # --- THE HYPE (brass) ---
  hype_fanfare_voice:
    kind: motif
    instruments: [synth_brass_a, synth_brass_b]
    instrument_octave_offsets: {synth_brass_a: 0, synth_brass_b: -1}
    motif: hype_fanfare
    velocity: 86
    articulation: marcato
    humanize_ms: 2
    humanize_velocity_pct: 3

  hype_stab:
    kind: chord_hits
    instruments: [synth_brass_a, synth_brass_b]
    instrument_octave_offsets: {synth_brass_a: 0, synth_brass_b: -1}
    octave: 3
    velocity: 88
    duration_beats: 1.5
    articulation: marcato
    voicing: closed
    humanize_ms: 2
    humanize_velocity_pct: 3

  hype_pad:
    kind: pad_chords
    instruments: [synth_brass_a, synth_brass_b]
    instrument_octave_offsets: {synth_brass_a: 0, synth_brass_b: -1}
    octave: 3
    duration_beats: 4.0
    velocity: 76
    articulation: legato
    voicing: closed
    humanize_ms: 3
    humanize_velocity_pct: 3

  # --- THE DREAD (choir_pad) ---
  atmos_wash:
    kind: pad_chords
    instrument: atmos
    octave: 4
    every_bars: 4
    duration_beats: 16.0
    velocity: 58
    articulation: pad
    voicing: open
    humanize_ms: 0
    humanize_velocity_pct: 3

  scifi_layer:
    kind: pad_chords
    instrument: scifi
    octave: 3
    every_bars: 4
    duration_beats: 16.0
    velocity: 46
    articulation: pad
    voicing: wide
    humanize_ms: 0
    humanize_velocity_pct: 3

  # --- THE DRIVE (percussion) ---
  drums_build:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 2.0],            velocity: 88}
      - {drum: electric_snare, beats: [1.0, 3.0],            velocity: 76}
      - {drum: closed_hat,     beats: [0.5, 1.5, 2.5, 3.5],  velocity: 32}
      - {drum: hand_clap,      beats: [1.0, 3.0],            velocity: 34}

  drums_ship:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 2.0],                       velocity: 90}
      - {drum: electric_snare, beats: [1.0, 3.0],                       velocity: 78}
      - {drum: hand_clap,      beats: [1.0, 3.0],                       velocity: 38}
      - {drum: closed_hat,     beats: [0.0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5], velocity: 28}
      - {drum: open_hat,       beats: [1.5, 3.5],                       velocity: 30}

  drums_launch:
    kind: drums
    instrument: kit
    humanize_ms: 0
    humanize_velocity_pct: 3
    events:
      - {drum: kick,           beats: [0.0, 1.0, 2.0, 3.0],             velocity: 96}
      - {drum: electric_snare, beats: [1.0, 3.0],                       velocity: 84}
      - {drum: hand_clap,      beats: [1.0, 3.0],                       velocity: 50}
      - {drum: closed_hat,     beats: [0.5, 1.5, 2.5, 3.5],             velocity: 40}
      - {drum: open_hat,       beats: [0.25, 1.25, 2.25, 3.25],         velocity: 24}
      - {drum: ride,           beats: [0.0, 1.0, 2.0, 3.0],             velocity: 22}
      - {drum: crash,          beat: 0.0, velocity: 84, bars: [0, 4, 8, 12]}

playback:
  mode: section_stem_matrix
  intro: intro
  loop_components: [main_a, main_b, bridge, main_c]
  outro: outro
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [strings, choir_pad]
    fade_stems: [winds, brass, mallets, percussion]

# The fader board. Each state is a distinct blend of the six "ideas" above.
state_map:
  starting: {section: intro}

  # IDLE TERMINAL: just runway + engine. A server humming. No product, no hype.
  exploring:
    preferred_section: main_a
    stems: {strings: 1.0, mallets: 0.90, percussion: 0.55, winds: 0.0, brass: 0.0, choir_pad: 0.40}

  # DEMOING: the product fader comes up over the engine.
  hacking:
    preferred_section: main_b
    stems: {strings: 1.0, mallets: 1.0, percussion: 0.85, winds: 0.85, brass: 0.0, choir_pad: 0.40}

  # DOUBT: drive drops, dread rises, product thins. The valuation wobbles.
  ambushed:
    preferred_section: bridge
    stems: {strings: 1.0, mallets: 0.50, percussion: 0.25, winds: 0.40, brass: 0.0, choir_pad: 1.0}

  # LAUNCH DAY: every fader up, the hype fanfare blaring.
  confrontation:
    preferred_section: main_c
    stems: {strings: 1.0, mallets: 1.0, percussion: 1.0, winds: 1.0, brass: 1.0, choir_pad: 0.45}

  retreating:
    transition: outro_at_next_valid_exit_bar
    outro: outro

sections:
  - id: intro
    kind: intro
    label: 2am in the office - the runway hums, the engine spins up
    bars: 8
    intensity: 0.50
    density: 0.40
    loopable: false
    harmony: ["Gm", "Eb", "Bb", "F", "Gm", "Eb", "D", "D"]
    postprocess:
      reverb_wet: 0.075
      reverb_decay_seconds: 1.30
    layers:
      - expression_swell
      - {template: sub_bass_voice, repeats: 8, velocity: 80}
      - kind: arpeggio
        instrument: arp_synth
        octave: 3
        pattern: [0, 1, 2, 1]
        step: 0.5
        duration_beats: 0.40
        velocity: 58
        density: 1.0
        voicing: closed
        articulation: pluck
      - {template: synth_pad, velocity: 60}
      - {template: atmos_wash, velocity: 48}
      - {template: scifi_layer, velocity: 38}
      - {template: bell_sparkle, hits: [[0, 0.0], [7, 0.0]], velocity: 62}
      - kind: drums
        instrument: kit
        humanize_ms: 0
        events:
          - {drum: kick,       beat: 0.0, velocity: 70, bars: [4, 5, 6, 7]}
          - {drum: closed_hat, beats: [0.5, 1.5, 2.5, 3.5], velocity: 26, bars: [6, 7]}

  - id: main_a
    kind: loop_component
    label: building - engine + runway, product fader still down
    bars: 16
    intensity: 0.72
    density: 0.64
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["Gm", "Eb", "Bb", "F", "Gm", "Cm", "Eb", "D",
              "Gm", "Eb", "Bb", "F", "Cm", "Eb", "D", "Gm"]
    layers:
      # The product hook IS written here, but the exploring state mutes winds to
      # 0.0 so in-game "building" hears only the engine + runway. The preview and
      # any state that raises winds reveals the hook.
      - {template: product_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 88}
      - {template: arp_16th, density: 1.0, velocity: 78}
      - {template: sub_bass_voice, repeats: 16, velocity: 88}
      - {template: synth_pad, velocity: 66}
      - drums_build
      - {template: atmos_wash, velocity: 54}
      - {template: scifi_layer, velocity: 40}

  - id: main_b
    kind: loop_component
    label: demoing - the product hook front and center
    bars: 16
    intensity: 0.78
    density: 0.70
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["Gm", "Bb", "Cm", "D", "Gm", "Eb", "F", "D",
              "Gm", "Bb", "Eb", "D", "Cm", "F", "D", "D"]
    layers:
      - {template: product_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 90}
      - {template: product_voice_b, starts: [[2, 0.0], [6, 0.0], [10, 0.0], [14, 0.0]], velocity: 80}
      - {template: arp_16th, density: 1.0, velocity: 80}
      - {template: sub_bass_motion_voice, repeats: 16, velocity: 90}
      - {template: synth_pad, velocity: 68}
      - {template: hype_stab, hits: [[0, 0.0], [8, 0.0]], velocity: 72}
      - drums_ship
      - {template: bell_sparkle, hits: [[0, 0.0], [8, 0.0]], velocity: 66}
      - {template: atmos_wash, velocity: 56}
      - {template: scifi_layer, velocity: 42}

  - id: bridge
    kind: loop_component
    label: doubt - the dread fader comes up, the drive falls away
    bars: 8
    intensity: 0.50
    density: 0.34
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Cm", "Eb", "Bb", "Gm", "Cm", "D", "Eb", "D"]
    postprocess:
      reverb_wet: 0.025
      reverb_decay_seconds: 0.70
    layers:
      - kind: motif
        instrument: lead_voice
        motif: product_hook_b
        velocity: 74
        articulation: legato
        humanize_ms: 4
        starts: [[0, 0.0], [4, 0.0]]
      - {template: arp_8th, density: 0.80, velocity: 56}
      - kind: motif
        instrument: sub_bass
        motif: sub_bass_pulse
        velocity: 70
        articulation: tenuto
        humanize_ms: 0
        starts: [[0, 0.0], [4, 0.0]]
      - {template: synth_pad, velocity: 66}
      - kind: drums
        instrument: kit
        humanize_ms: 0
        events:
          - {drum: kick, beats: [0.0, 2.0], velocity: 58}
          - {drum: side_stick, beats: [1.0, 3.0], velocity: 28}
      - {template: atmos_wash, velocity: 74}
      - {template: scifi_layer, velocity: 56}

  - id: main_c
    kind: loop_component
    label: launch day - every fader up, the hype fanfare blares
    bars: 16
    intensity: 0.94
    density: 0.86
    loopable: true
    valid_exit_local_bars: [4, 8, 12, 16]
    harmony: ["Gm", "Eb", "Bb", "D", "Gm", "Cm", "F", "D",
              "Gm", "Bb", "Cm", "D", "Eb", "F", "Gm", "Gm"]
    postprocess:
      reverb_wet: 0.075
      reverb_decay_seconds: 1.40
    layers:
      - {template: product_launch_voice, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 94}
      - {template: product_launch_double, starts: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 78}
      - {template: hype_fanfare_voice, starts: [[2, 0.0], [6, 0.0], [10, 0.0], [14, 0.0]], velocity: 84}
      - {template: arp_16th, density: 1.0, velocity: 84}
      - {template: sub_bass_voice, repeats: 16, velocity: 92}
      - {template: synth_pad, velocity: 72}
      - {template: hype_pad, velocity: 76}
      - {template: hype_stab, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 88}
      - drums_launch
      - {template: bell_sparkle, hits: [[0, 0.0], [4, 0.0], [8, 0.0], [12, 0.0]], velocity: 72}
      - {template: atmos_wash, velocity: 56}
      - {template: scifi_layer, velocity: 42}

  - id: outro
    kind: outro
    label: acqui-hired - the faders come down one by one
    bars: 4
    intensity: 0.54
    density: 0.40
    loopable: false
    harmony: ["Gm", "Cm", "D", "Gm"]
    layers:
      - {template: product_voice, starts: [[0, 0.0]], velocity: 80}
      - {template: arp_16th, density: 0.7, velocity: 58}
      - {template: sub_bass_voice, repeats: 4, velocity: 78}
      - {template: synth_pad, velocity: 62}
      - kind: drums
        instrument: kit
        humanize_ms: 0
        events:
          - {drum: kick, beat: 0.0, velocity: 92, bars: [3]}
          - {drum: crash, beat: 0.0, velocity: 84, bars: [3]}
          - {drum: electric_snare, beats: [0.0, 0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5, 2.75], velocity: 36, bars: [2]}
      - {template: bell_sparkle, hits: [[3, 0.0]], velocity: 70}
      - {template: atmos_wash, velocity: 50}
      - {template: scifi_layer, velocity: 38}

group_postprocess:
  strings:    {gain_db: 0.0,  lowpass_hz: 14000, high_shelf_hz: 5500, high_shelf_db: 0.4, transient_tame: 0.04, reverb_wet: 0.005}
