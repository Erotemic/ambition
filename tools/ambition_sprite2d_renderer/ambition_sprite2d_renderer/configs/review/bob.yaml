target: bob_engineer
name: Bob
output_name: bob
seed: 510
archetype: bob
# Bob's bespoke template ships three-quarter (idle), side (walk),
# and front (talk + interact) views. Animation order intentionally
# alternates views so the spritesheet preview is easy to scan.
animations:
  - idle
  - walk
  - talk
  - interact
  - idle_front
  - idle_side
render:
  frame_width: 128
  frame_height: 128
  single_width: 160
  single_height: 160
  supersample: 4
  downsample: lanczos
  background: transparent
  sheet_background: transparent
  border: 4
  label_width: 112
