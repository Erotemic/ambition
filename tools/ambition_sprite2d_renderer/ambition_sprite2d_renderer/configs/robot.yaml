target: robot
seed: 7
archetype: cute_scout
animations:
  # The order of this list is the PNG row order for the generated sheet,
  # which is the source of truth for ROBOT_SHEET in
  # crates/ambition_sandbox/src/character_sprites/sheets.rs. Append new
  # rows at the end so existing flat-atlas indices stay stable.
  - idle
  - walk
  - run
  - jump
  - fall
  - slash
  - hit
  - death
  - blink_out
  - blink_in
  - dash
  - hover
  - ledge_grab
  - dash_startup
  - land_hard
  - land_recovery
  - wall_grab
  - ledge_climb
  - ledge_getup
  - float_glide
  - attack_side
  - attack_up
  - attack_down
  - air_neutral
  - air_forward
  - air_back
  - air_down
  - air_up
render:
  frame_width: 128
  frame_height: 128
  single_width: 128
  single_height: 128
  supersample: 3
  downsample: lanczos
  background: transparent
  sheet_background: transparent
  border: 0
  label_width: 100
