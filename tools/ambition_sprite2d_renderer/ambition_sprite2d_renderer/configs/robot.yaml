target: robot
seed: 7
archetype: cute_scout
animations:
  # The order of this list is the PNG row order for the generated sheet,
  # which is the source of truth for ROBOT_SHEET in
  # crates/ambition_sandbox/src/character_sprites/sheets.rs. Append new
  # rows at the end so existing flat-atlas indices stay stable.
  - idle
  - walk
  - run
  - jump
  - fall
  - slash
  - hit
  - death
  - blink_out
  - blink_in
  - dash
  - hover
  - ledge_grab
  - dash_startup
  - land_hard
  - land_recovery
  - wall_grab
  - ledge_climb
  - ledge_getup
  - float_glide
  - attack_side
  - attack_up
  - attack_down
  - air_neutral
  - air_forward
  - air_back
  - air_down
  - air_up
  # Appended 2026-05-23: Smash-Bros ledge options now have dedicated
  # animation rows so roll / getup-attack don't share the plain
  # mantle pop with `ledge_getup`. New rows go at the END so earlier
  # flat-atlas indices stay stable (per the comment above).
  - ledge_roll
  - ledge_getup_attack
render:
  frame_width: 128
  frame_height: 128
  single_width: 128
  single_height: 128
  supersample: 3
  downsample: lanczos
  background: transparent
  sheet_background: transparent
  border: 0
  label_width: 100
# Per ADR 0017 (Rust = behavior, RON = content): manifest-authored
# gameplay tuning. The Rust runtime's `spec_from_record` prefers this
# over the hardcoded `ROBOT_TUNING` const in
# `crates/ambition_sandbox/src/presentation/character_sprites/sheets.rs`.
# Values mirror the legacy `SheetTuning::new(2.1, 1)` — robot sprite
# is much larger than its hitbox after auto-crop, so collision_scale
# > 1 keeps the visible body roughly matched to the gameplay AABB.
# First migrated character (2026-05-24); see TODO.md V3/D4 entry.
sheet_tuning:
  collision_scale: 2.1
  frame_sample_inset: 1
