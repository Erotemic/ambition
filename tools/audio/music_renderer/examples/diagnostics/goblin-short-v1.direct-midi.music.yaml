schema: ambition.musicir.direct_midi.v1
id: goblin_short_v1
title: Goblin Short v1 - Direct YAML Regression of Original Cue
notes: 'Exact YAML serialization of the MIDI event stream generated by the first hard-coded goblin orchestra renderer. This
  diagnostic target checks whether later MusicIR/YAML translations preserve the original cue before reintroducing adaptive
  sections/stems.


  Mix v2: event stream is unchanged, but rendering now supports separate-instrument summing so solo winds/mallets can sit
  forward while string/choir beds stay supportive. This is intended to diagnose the faint-lead regression without changing
  the composition.


  Mix v3: lowers overall loudness, reduces buzz/saturation, and moves leads forward by ducking accompaniment under winds/mallets
  instead of boosting solo velocities.'
