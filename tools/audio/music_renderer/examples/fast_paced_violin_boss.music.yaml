schema: ambition.musicir.v1
id: fast_paced_violin_boss
title: Fast-Paced Violin Boss Battle
seed: 20260506
notes: >-
  Adaptive boss cue focused on a frantic solo-violin / fiddle-style sixteenth-note
  ostinato.  The strings stem carries the identity; brass, drums, choir pad, winds,
  and mallets are staged in progressively so later waves feel larger without
  burying the violin line.
tempo:
  bpm: 176
meter:
  beats_per_bar: 4
  beat_unit: 4
render:
  sample_rate: 48000
  ogg_quality: 6
  backend: fast
  soundfont: /usr/share/sounds/sf2/TimGM6mb.sf2
postprocess:
  gain_db: -0.5
  highpass_hz: 34
  reverb_wet: 0.075
  reverb_decay_seconds: 1.05
  reverb_damping_hz: 6800
  stereo_width: 0.055
  limiter_drive: 0.94
  normalize: true
  target_peak_db: -2.2
stem_postprocess:
  gain_db: 0.0
  highpass_hz: 34
  reverb_wet: 0.006
  reverb_decay_seconds: 0.35
  reverb_damping_hz: 6500
  stereo_width: 0.030
  limiter_drive: 0.90
  normalize: false
  target_peak_db: -3.0

instruments:
  - {name: solo_violin,  group: strings,    program: violin,            volume: 100, pan: 72, expression: 104, modulation: 8}
  - {name: violins_i,    group: strings,    program: string_ensemble_1, volume: 78,  pan: 82, expression: 84,  modulation: 10}
  - {name: violins_ii,   group: strings,    program: string_ensemble_2, volume: 72,  pan: 40, expression: 78,  modulation: 8}
  - {name: violas,       group: strings,    program: viola,             volume: 72,  pan: 50, expression: 78,  modulation: 6}
  - {name: celli,        group: strings,    program: cello,             volume: 80,  pan: 36, expression: 82,  modulation: 6}
  - {name: contrabass,   group: strings,    program: contrabass,        volume: 76,  pan: 30, expression: 78}

  - {name: horns,        group: brass,      program: french_horn,       volume: 72,  pan: 70, expression: 76,  modulation: 5}
  - {name: trumpets,     group: brass,      program: trumpet,           volume: 66,  pan: 84, expression: 72,  modulation: 3}
  - {name: trombones,    group: brass,      program: trombone,          volume: 70,  pan: 44, expression: 74}
  - {name: tuba,         group: brass,      program: tuba,              volume: 66,  pan: 34, expression: 70}

  - {name: flute,        group: winds,      program: flute,             volume: 68,  pan: 82, expression: 80,  modulation: 8}
  - {name: oboe,         group: winds,      program: oboe,              volume: 70,  pan: 68, expression: 82,  modulation: 6}
  - {name: clarinet,     group: winds,      program: clarinet,          volume: 68,  pan: 54, expression: 80,  modulation: 5}
  - {name: bassoon,      group: winds,      program: bassoon,           volume: 74,  pan: 38, expression: 78}

  - {name: choir,        group: choir_pad,  program: choir_aahs,        volume: 42,  pan: 64, expression: 58,  modulation: 8}
  - {name: pad_bowed,    group: choir_pad,  program: pad_bowed,         volume: 34,  pan: 64, expression: 50,  modulation: 10}

  - {name: harp,         group: mallets,    program: orchestral_harp,   volume: 52,  pan: 70, expression: 66}
  - {name: xylophone,    group: mallets,    program: xylophone,         volume: 42,  pan: 84, expression: 58}

  - {name: timpani,      group: percussion, program: timpani,           volume: 66,  pan: 52, expression: 74}
  - {name: war_drums,    group: percussion, is_drum: true,              volume: 70,  pan: 64, expression: 74}

motifs:
  - id: blade_run_minor
    root: D5
    intervals: [0, 2, 3, 5, 7, 8, 10, 12, 10, 8, 7, 5, 3, 2, -1, 0]
    rhythm: [0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25]
    velocities: [1.00, 0.84, 0.88, 0.82, 0.96, 0.84, 0.88, 1.00, 0.90, 0.82, 0.92, 0.80, 0.94, 0.84, 0.88, 1.00]
  - id: blade_run_dim
    root: D5
    intervals: [0, 1, 3, 4, 6, 7, 9, 10, 12, 10, 9, 7, 6, 4, 3, 1]
    rhythm: [0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25, 0.25]
    velocities: [1.00, 0.86, 0.90, 0.84, 0.96, 0.86, 0.90, 0.84, 1.00, 0.84, 0.90, 0.86, 0.96, 0.84, 0.90, 0.86]
  - id: boss_stab_answer
    root: D4
    intervals: [0, -5, 0, 3, 7, 6, 3, 0]
    rhythm: [0.5, 0.25, 0.25, 0.5, 0.75, 0.25, 0.5, 1.0]
    velocities: [1.00, 0.92, 1.00, 0.88, 0.98, 0.86, 0.90, 0.94]
  - id: hero_cut
    root: D4
    intervals: [0, 5, 7, 10, 12, 10, 7, 5]
    rhythm: [0.5, 0.5, 0.5, 0.5, 0.25, 0.25, 0.5, 1.0]
    velocities: [0.94, 0.88, 0.92, 0.86, 1.00, 0.88, 0.90, 0.82]

layer_templates:
  battle_expression:
    kind: automation
    group: strings
    automation:
      - {group: strings, cc: expression, from: 92, to: 112, curve: smooth, points: 12}
      - {group: brass, cc: expression, from: 62, to: 92, curve: smooth, points: 10}
      - {group: winds, cc: expression, from: 64, to: 90, curve: smooth, points: 10}
      - {group: choir_pad, cc: expression, from: 32, to: 68, curve: smooth, points: 10}

  violin_blade_run:
    kind: motif
    instrument: solo_violin
    motif: blade_run_minor
    root: D5
    velocity: 94
    articulation: spiccato
    humanize_ms: 3
    instrument_pitch_scoop_cents: {solo_violin: 1.0}

  violin_dim_run:
    kind: motif
    instrument: solo_violin
    motif: blade_run_dim
    root: D5
    velocity: 96
    articulation: spiccato
    humanize_ms: 3
    instrument_pitch_scoop_cents: {solo_violin: 1.5}

  string_saw_bed:
    kind: arpeggio
    instruments: [violins_i, violins_ii, violas]
    instrument_octave_offsets: {violins_i: 1, violins_ii: 0, violas: 0}
    instrument_velocity_offsets: {violins_i: -10, violins_ii: -12, violas: -16}
    octave: 3
    pattern: [0, 2, 1, 2, 0, 3, 2, 1]
    step: 0.25
    duration_beats: 0.22
    velocity: 54
    density: 0.70
    articulation: spiccato
    humanize_ms: 3

  low_engine:
    kind: bassline
    instrument: contrabass
    octave: 2
    velocity: 68
    articulation: marcato
    humanize_ms: 3
    pattern:
      - [0, 0.0, 0.72]
      - [0, 1.0, 0.42]
      - [7, 1.5, 0.42]
      - [12, 2.5, 0.42]
      - [7, 3.25, 0.35]

  cello_knives:
    kind: motif
    instruments: [celli, bassoon]
    motif: boss_stab_answer
    root: D3
    velocity: 62
    articulation: marcato
    instrument_velocity_offsets: {celli: 0, bassoon: -8}
    instrument_pitch_scoop_cents: {bassoon: 1.0}

  hero_brass_cut:
    kind: motif
    instruments: [horns, trumpets, solo_violin]
    motif: hero_cut
    root: D4
    velocity: 66
    articulation: tenuto
    instrument_octave_offsets: {horns: 0, trumpets: 1, solo_violin: 1}
    instrument_velocity_offsets: {horns: 0, trumpets: -8, solo_violin: -20}

  brass_stabs:
    kind: chord_hits
    instruments: [horns, trombones]
    octave: 3
    velocity: 72
    duration_beats: 0.55
    articulation: marcato
    voicing: closed
    humanize_ms: 4
    hits: [[0, 0.0], [2, 2.0], [4, 0.0], [6, 2.0]]

  tuba_floor:
    kind: root_hits
    instrument: tuba
    octave: 2
    velocity: 64
    articulation: marcato
    humanize_ms: 3
    hits:
      - [0, 0.0, -12, 0.75]
      - [2, 0.0, -12, 0.55]
      - [4, 0.0, -12, 0.75]
      - [6, 0.0, -12, 0.55]

  timpani_floor:
    kind: root_hits
    instrument: timpani
    octave: 2
    velocity: 64
    articulation: marcato
    humanize_ms: 2
    hits:
      - [0, 0.0, -12, 0.70]
      - [1, 3.0, 7, 0.35]
      - [4, 0.0, -12, 0.70]
      - [5, 3.0, 7, 0.35]

  wind_screams:
    kind: motif
    instruments: [flute, oboe, clarinet]
    motif: blade_run_minor
    root: D5
    velocity: 54
    articulation: staccato
    instrument_octave_offsets: {flute: 1, oboe: 0, clarinet: 0}
    instrument_velocity_offsets: {flute: -12, oboe: -8, clarinet: -10}

  harp_clock:
    kind: arpeggio
    instrument: harp
    octave: 4
    pattern: [0, 2, 3, 1, 2, 4]
    step: 0.25
    duration_beats: 0.20
    velocity: 34
    density: 0.34
    articulation: staccato
    humanize_ms: 4

  xylophone_sparks:
    kind: arpeggio
    instrument: xylophone
    octave: 5
    pattern: [0, 1, 3, 4]
    step: 0.5
    duration_beats: 0.22
    velocity: 34
    density: 0.20
    articulation: staccato
    humanize_ms: 3

  choir_threat:
    kind: pad_chords
    instruments: [choir, pad_bowed]
    instrument_octave_offsets: {choir: 0, pad_bowed: -1}
    instrument_velocity_offsets: {choir: 0, pad_bowed: -8}
    octave: 3
    every_bars: 4
    duration_beats: 16.0
    velocity: 28
    articulation: pad
    voicing: wide
    humanize_ms: 10

  drums_chase:
    kind: drums
    instrument: war_drums
    humanize_ms: 0.0
    events:
      - {drum: concert_bass_drum, beat: 0.0, velocity: 70}
      - {drum: snare, beat: 2.0, velocity: 58}
      - {drum: low_tom, beats: [1.0, 1.75, 3.0], velocity: 48, probability: 0.66}
      - {drum: mid_tom, beats: [3.5], velocity: 38, probability: 0.50}

  drums_rage:
    kind: drums
    instrument: war_drums
    humanize_ms: 0.0
    events:
      - {drum: concert_bass_drum, beat: 0.0, velocity: 82}
      - {drum: concert_bass_drum, beat: 2.5, velocity: 58, probability: 0.70}
      - {drum: snare, beat: 2.0, velocity: 72}
      - {drum: low_tom, beats: [1.0, 1.5, 3.0, 3.5], velocity: 58, probability: 0.78}
      - {drum: mid_tom, beats: [3.75], velocity: 50, probability: 0.62}

playback:
  mode: section_stem_matrix
  intro: intro
  loop_components: [phase1, phase2, phase3, desperation_loop]
  outro: outro
  exit_policy:
    request_outro: next_valid_exit_bar
    fade_aggressive_stems_beats: 4
    bridge_stems: [strings, winds]
    fade_stems: [brass, percussion, choir_pad, mallets]

state_map:
  starting: {section: intro}
  wave_1:
    preferred_section: phase1
    stems: {strings: 1.0, winds: 0.10, mallets: 0.16, percussion: 0.35, brass: 0.14, choir_pad: 0.00}
  wave_2:
    preferred_section: phase2
    stems: {strings: 1.0, winds: 0.38, mallets: 0.22, percussion: 0.62, brass: 0.40, choir_pad: 0.12}
  large_brute_spawned:
    fade_in: {brass: 0.82, choir_pad: 0.34, percussion: 0.78}
    fade_beats: 4
  wave_3:
    preferred_section: phase3
    stems: {strings: 1.0, winds: 0.56, mallets: 0.18, percussion: 0.82, brass: 0.76, choir_pad: 0.32}
  long_active_fallback: {preferred_section: desperation_loop}
  cleared:
    transition: outro_at_next_valid_exit_bar
    outro: outro

sections:
  - id: intro
    kind: intro
    label: blade drawn before the boss drops
    bars: 4
    intensity: 0.42
    density: 0.46
    loopable: false
    harmony: ["Dm(add9)", "Bbmaj7(#11)", "Gm9", "A7"]
    layers:
      - battle_expression
      - {template: violin_blade_run, starts: [[1, 0.0], [2, 0.0]], velocity: 70}
      - {template: cello_knives, starts: [[0, 2.0]], velocity: 46}
      - {template: harp_clock, density: 0.16, velocity: 24}
      - kind: drums
        instrument: war_drums
        humanize_ms: 0.0
        events:
          - {drum: concert_bass_drum, bars: [0, 2], beat: 0.0, velocity: 54}
          - {drum: low_tom, bars: [3], beat: 3.0, velocity: 48}

  - id: phase1
    kind: loop_component
    label: phase 1 - violin chase
    bars: 8
    intensity: 0.66
    density: 0.74
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Dm", "C", "Bb", "A7", "Dm", "F", "Gm", "A7"]
    layers:
      - battle_expression
      - {template: violin_blade_run, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 92}
      - {template: string_saw_bed, density: 0.58, velocity: 46}
      - {template: low_engine, velocity: 58}
      - {template: cello_knives, starts: [[1, 0.0], [5, 0.0]], velocity: 52}
      - {template: harp_clock, density: 0.22, velocity: 28}
      - drums_chase

  - id: phase2
    kind: loop_component
    label: phase 2 - brass pressure, violin still leads
    bars: 8
    intensity: 0.80
    density: 0.86
    loopable: true
    valid_exit_local_bars: [4, 8]
    reinforcement_bar: 4
    harmony: ["Dm", "C#dim7", "Dm", "F", "Bb", "Gm", "A7", "A7"]
    layers:
      - battle_expression
      - {template: violin_blade_run, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 98}
      - {template: violin_dim_run, starts: [[3, 0.0], [7, 0.0]], velocity: 94}
      - {template: string_saw_bed, density: 0.78, velocity: 54}
      - {template: low_engine, velocity: 66}
      - {template: hero_brass_cut, starts: [[2, 0.0], [6, 0.0]], velocity: 62}
      - {template: brass_stabs, velocity: 66}
      - {template: tuba_floor, velocity: 58}
      - {template: timpani_floor, velocity: 62}
      - {template: wind_screams, starts: [[4, 0.0]], velocity: 44}
      - {template: harp_clock, density: 0.28, velocity: 30}
      - drums_chase
      - {template: choir_threat, velocity: 22}

  - id: phase3
    kind: loop_component
    label: phase 3 - full boss fury
    bars: 8
    intensity: 0.94
    density: 0.96
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Dm", "Ebmaj7", "Ddim7", "A7", "Dm", "Bb", "Gm", "A7"]
    layers:
      - battle_expression
      - {template: violin_blade_run, starts: [[0, 0.0], [1, 0.0], [2, 0.0], [4, 0.0], [5, 0.0], [6, 0.0]], velocity: 104}
      - {template: violin_dim_run, starts: [[3, 0.0], [7, 0.0]], velocity: 102}
      - {template: string_saw_bed, density: 1.0, velocity: 62}
      - {template: low_engine, velocity: 72}
      - {template: cello_knives, starts: [[0, 2.0], [4, 2.0]], velocity: 62}
      - {template: hero_brass_cut, starts: [[2, 0.0], [6, 0.0]], velocity: 72}
      - {template: brass_stabs, velocity: 78}
      - {template: tuba_floor, velocity: 66}
      - {template: timpani_floor, velocity: 72}
      - {template: wind_screams, starts: [[1, 0.0], [5, 0.0]], velocity: 50}
      - {template: xylophone_sparks, density: 0.26, velocity: 30}
      - {template: choir_threat, velocity: 34}
      - drums_rage
      - kind: drums
        instrument: war_drums
        humanize_ms: 0.0
        events:
          - {drum: crash, bars: [0, 4], beat: 0.0, velocity: 74}

  - id: desperation_loop
    kind: loop_component
    label: desperation loop - keep the blade spinning
    bars: 8
    intensity: 0.88
    density: 0.86
    loopable: true
    valid_exit_local_bars: [4, 8]
    harmony: ["Dm", "Bbmaj7", "C", "A7", "Dm", "Gm", "Bb", "A7"]
    layers:
      - battle_expression
      - {template: violin_blade_run, starts: [[0, 0.0], [2, 0.0], [4, 0.0], [6, 0.0]], velocity: 98}
      - {template: violin_dim_run, starts: [[3, 0.0]], velocity: 92}
      - {template: string_saw_bed, density: 0.76, velocity: 54}
      - {template: low_engine, velocity: 66}
      - {template: hero_brass_cut, starts: [[6, 0.0]], velocity: 64}
      - {template: brass_stabs, hits: [[0, 0.0], [4, 0.0]], velocity: 66}
      - {template: timpani_floor, velocity: 62}
      - {template: harp_clock, density: 0.24, velocity: 28}
      - drums_chase
      - {template: choir_threat, velocity: 24}

  - id: outro
    kind: outro
    label: boss defeated - final downward cut
    bars: 4
    intensity: 0.44
    density: 0.34
    loopable: false
    harmony: ["Dm", "Bbmaj7", "A7sus4", "Dm(add9)"]
    layers:
      - kind: automation
        group: strings
        automation:
          - {group: strings, cc: expression, from: 104, to: 44, curve: smooth, points: 10}
          - {group: brass, cc: expression, from: 88, to: 34, curve: smooth, points: 10}
          - {group: choir_pad, cc: expression, from: 68, to: 28, curve: smooth, points: 8}
      - {template: violin_dim_run, starts: [[0, 0.0]], velocity: 78}
      - {template: hero_brass_cut, starts: [[1, 0.0]], velocity: 56}
      - {template: choir_threat, velocity: 20}
      - kind: drums
        instrument: war_drums
        humanize_ms: 0.0
        events:
          - {drum: concert_bass_drum, bars: [0], beat: 0.0, velocity: 80}
          - {drum: crash, bars: [0], beat: 0.0, velocity: 70}
          - {drum: low_tom, bars: [2], beat: 0.0, velocity: 46}

group_postprocess:
  strings: {gain_db: 1.8, lowpass_hz: 14200, high_shelf_hz: 5600, high_shelf_db: 0.9, presence_low_hz: 1800, presence_high_hz: 5200, presence_db: 1.6, transient_tame: 0.02, reverb_wet: 0.004}
  winds: {gain_db: 0.2, lowpass_hz: 12500, high_shelf_hz: 5200, high_shelf_db: 0.4, presence_low_hz: 1600, presence_high_hz: 5000, presence_db: 1.0, transient_tame: 0.03, reverb_wet: 0.004}
  mallets: {gain_db: -5.0, lowpass_hz: 9800, high_shelf_hz: 5200, high_shelf_db: -0.4, transient_tame: 0.12, reverb_wet: 0.003}
  percussion: {gain_db: -1.8, lowpass_hz: 10000, high_shelf_hz: 5200, high_shelf_db: -0.2, transient_tame: 0.10, reverb_wet: 0.002}
  brass: {gain_db: -0.6, lowpass_hz: 10800, high_shelf_hz: 5200, high_shelf_db: 0.1, transient_tame: 0.03, reverb_wet: 0.004}
  choir_pad: {gain_db: -6.5, lowpass_hz: 7800, high_shelf_hz: 4800, high_shelf_db: -0.7, transient_tame: 0.04, reverb_wet: 0.006}
