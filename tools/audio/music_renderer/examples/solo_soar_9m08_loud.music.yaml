schema: ambition.musicir.v1
id: solo_soar_9m08_loud
title: Solo Soar - 9:08 Loud Southern Flight
seed: 2026050602
notes: 'Full-length 9:08 legally distinct Southern-rock homage.  The cue makes the reference obvious through the macro-architecture:
  clean-guitar/organ ballad, lifted refrain, then an extended double-time twin-lead guitar flight.  It deliberately avoids
  copied lyric, melody, and exact chord-sequence material while preserving the recognizable long-solo payoff.  At 120 BPM
  in 4/4, 274 authored bars render to exactly 548 seconds.'
