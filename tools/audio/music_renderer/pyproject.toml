[project]
name = "ambition-musicir-renderer"
version = "0.3.0"
description = "Data-driven non-ML adaptive music renderer for Ambition MusicIR YAML specs"
requires-python = ">=3.10"
dependencies = [
  "numpy",
  "scipy",
  "pretty_midi",
  "pyfluidsynth",
  "soundfile",
  "PyYAML",
  "music21",
  "midiutil",
  "mido",
  "pydub",
]

[project.scripts]
render-ambition-music = "ambition_music_renderer.musicir_renderer:main"
