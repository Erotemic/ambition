[project]
name = "proc2d-character-lab"
version = "0.2.0"
description = "Deterministic pure-Python/Pillow procedural 2D character sprite generator."
requires-python = ">=3.9"
dependencies = ["Pillow>=9", "PyYAML>=6", "rich>=13"]

[project.scripts]
pcg2d = "proc2d_character_lab.cli:main"

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
