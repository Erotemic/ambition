[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ambition-gen3d-blender-lab"
version = "0.4.0"
description = "Blender-first procedural character rigging and sprite-sheet generation"
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "Ambition procedural art prototype"}]
license = {text = "Apache-2.0"}
dependencies = [
  "pillow>=10",
  "pyyaml>=6",
  "numpy>=1.24",
  "typer>=0.9",
  "rich>=13",
  "pydantic>=2",
]

[project.scripts]
gen3dlab = "gen3d_blender_lab.cli:app"
pcglab = "gen3d_blender_lab.cli:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["gen3d_blender_lab*"]

[tool.setuptools.package-data]
gen3d_blender_lab = ["configs/*.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
