version: 0.3.0+canonical-cute
name: cute_robot_component_sheet_canonical
description: Canonical cute stubby robot component atlas. Uses the new modular sheet
  as the default atlas while keeping the previous greenscreen atlas in *_legacy metadata
  files.
image:
  file: ../assets/robot_components_cute_canonical.png
  size:
  - 1448
  - 1086
  background: greenscreen
  background_color_hint: '#09F50D'
  coordinate_system: pixels_top_left
  units: px
metadata_quality:
  rect_precision: connected_component_from_canonical_sheet
  pivot_precision: heuristic_anchor_defaults
  anchor_precision: heuristic_rig_defaults
  notes:
  - This metadata promotes the new cute/stubby component sheet to canonical status.
  - Legacy atlas metadata remains available as robot_components_legacy.refined.yaml
    and robot_components_legacy.rough.yaml.
  - Face expression sprites are synthetic cyan overlays generated for head compositing
    compatibility.
  - Pelvis components are included in the atlas for GUI authoring, even though the
    current default runtime rig still drives legs from torso hip sockets.
style:
  character: cute stubby white cartoon robot
  proportion_note: head is roughly 0.9x the size of the rest of the body mass, with
    compact toy-like limbs
