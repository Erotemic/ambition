aliases:
  joint_large: arm_capsule_vertical
  joint_medium: arm_capsule_diagonal_a
  joint_small: arm_capsule_diagonal_b
  joint_tiny: arm_upper_vertical
rig:
  root:
    pivot:
    - 0
    - 0
    meaning: character ground contact point
  draw_order:
  - fx_behind
  - back_arm
  - back_leg
  - torso
  - side_pods
  - front_leg
  - head
  - face
  - antenna
  - front_arm
  - hands
  - weapon
  - fx_front
animation_vocabulary:
  hit: brief recoil/stagger, use hurt face, recover to idle; never collapse
  death: separate collapse/downed state
  teleport: idle -> cyan particles -> vanish -> reappear; replaces old blink action
  slash: front arm leads, purple slash arc on front layer
  dash: cyan streaks behind character
