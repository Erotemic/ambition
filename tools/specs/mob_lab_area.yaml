# Mob lab — basement encounter room.
#
# Layout (1600x768):
#
#   +-----------------------------------------------------+
#   |                       (open ceiling)                |
#   |  hallway              |       arena                 |
#   |                       |                             |
#   |                       |                             |
#   |  ┌──────────┐         |                             |
#   |  │entry door│  Switch │  [LockWall slot]            |
#   |  │          │         │                             |
#   |  └──────────┘  ──────/ \─── divider opening ──── ── │
#   |  ████████████████████   ████████████████████████████│ ← floor
#   +-----------------------------------------------------+
#
# - Hallway floor + arena floor share y=608. The opening between them
#   is at x≈480-700, full-height (no ceiling block to fall through).
# - PlayerStart is in the hallway near the back door; the player walks
#   right through the threshold into the arena.
# - The Switch sits in the hallway at chest height of the player.
# - The LockWall fills the doorway only while the encounter is Active.
# - The EncounterTrigger AABB straddles the threshold in the arena half
#   so crossing it (even briefly) starts the encounter.
# - Wave enemy spawns are not LDtk EnemySpawn entities — the encounter
#   system spawns mobs dynamically on its own timeline (see
#   `crate::encounter::mob_lab_wave_specs`).
id: mob_lab
level_id: mob_lab
world_x: 14000
world_y: 1024
px_wid: 1600
px_hei: 768
fill_collision: empty
entities:
  # --- Floor (hallway + arena, full width). 32px thick.
  - type: Solid
    px: [0, 608]
    size: [1600, 32]
    fields: { name: floor }

  # --- Hallway ceiling (so the player has a real corridor, not a pit).
  - type: Solid
    px: [0, 224]
    size: [480, 32]
    fields: { name: hallway_ceiling }

  # --- Hallway back wall (left side of the level).
  - type: Solid
    px: [0, 0]
    size: [16, 608]
    fields: { name: hallway_back_wall }

  # --- Arena outer walls.
  - type: Solid
    px: [1584, 0]
    size: [16, 608]
    fields: { name: arena_back_wall }
  - type: Solid
    px: [16, 0]
    size: [1568, 16]
    fields: { name: arena_ceiling }

  # --- Divider posts: short jambs on either side of the threshold so
  # the doorway has a visible frame even when the LockWall is gone.
  - type: Solid
    px: [464, 224]
    size: [16, 384]
    fields: { name: divider_jamb_left }
  - type: Solid
    px: [704, 0]
    size: [16, 608]
    fields: { name: divider_jamb_right }

  # --- PlayerStart in the hallway, on the floor.
  - type: PlayerStart
    px: [80, 562]
    size: [28, 46]
    fields: { name: lab_entry_spawn }

  # --- Loading zone back to the central hub.
  - type: LoadingZone
    px: [16, 512]
    size: [48, 96]
    fields:
      id: lab_entry
      name: lab_entry
      activation: Door
      target_room: central_hub_complex
      target_zone: lab_door
      bidirectional: true

  # --- The reset switch (in the hallway, before the threshold).
  - type: Switch
    px: [320, 576]
    size: [24, 32]
    fields:
      id: mob_lab_reset_switch
      name: mob_lab_reset_switch
      prompt: "Toggle mob lab"
      target_encounter: mob_lab
      action: ResetEncounter

  # --- LockWall: the slot the encounter spawns a Solid into while
  # Active. Position fills the doorway opening; the encounter system
  # reads this entity's px+size from the LDtk project.
  - type: LockWall
    px: [480, 224]
    size: [224, 384]
    fields:
      id: mob_lab_lock
      name: mob_lab_lock

  # --- Encounter trigger AABB: just inside the arena so crossing the
  # threshold (left → right) fires it.
  - type: EncounterTrigger
    px: [720, 384]
    size: [200, 224]
    fields:
      id: mob_lab
      name: mob_lab_trigger
      camera_zoom: 1.6

  # --- Camera zone over the arena half.
  - type: CameraZone
    px: [704, 0]
    size: [880, 768]
    fields: { id: mob_lab_arena, name: mob_lab_arena, mode: Encounter }

  # --- Debug labels for in-game orientation.
  - type: DebugLabel
    px: [80, 240]
    size: [320, 24]
    fields:
      name: lab_label_hallway
      text: "Hallway — toggle switch to arm/disable lab"
      category: Custom
  - type: DebugLabel
    px: [780, 32]
    size: [560, 24]
    fields:
      name: lab_label_arena
      text: "Cross threshold to start encounter"
      category: Custom
