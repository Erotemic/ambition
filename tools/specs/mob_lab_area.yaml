# Mob lab — basement encounter room with the reset-switch antechamber.
#
# Layout (one level, two chambers separated by a gap with a vertical
# divider wall):
#
#   ┌──────────────────────────────────────────┐
#   │ antechamber (switch + back door)         │
#   │  [door↓→hub]  [Switch]  ─────  [trigger]→ │
#   │                              ░░░░░░░░░░░ │  ← divider wall (dotted = floor opening)
#   │                                          │
#   │ lab interior (encounter zone)            │
#   │   [enemy] [enemy] [enemy] [enemy]        │
#   └──────────────────────────────────────────┘
#
# `EncounterTrigger` is at the threshold between antechamber and the
# lab interior. The switch (`reset_switch`) sits in the antechamber.
# The level's `LoadingZone` `lab_entry` connects back to
# central_hub_complex/lab_door (added separately by
# tools/specs/hub_lab_door.yaml).
id: mob_lab
level_id: mob_lab
world_x: 14000          # right of basement_npcs (12000–13500)
world_y: 1024
px_wid: 1024
px_hei: 768
fill_collision: solid_border
entities:
  # PlayerStart — the spawn the LoadingZone targets when the player
  # walks into mob_lab from the hub.
  - type: PlayerStart
    px: [80, 64]
    fields: { name: lab_entry_spawn }

  # Loading zone back to the central hub. Two-way once the matching
  # zone is added to central_hub_basement (tools/specs/hub_lab_door.yaml).
  - type: LoadingZone
    px: [16, 80]
    size: [48, 96]
    fields:
      id: lab_entry
      name: lab_entry
      activation: Door
      target_room: central_hub_complex
      target_zone: lab_door
      bidirectional: true

  # Switch — the encounter reset.
  - type: Switch
    px: [200, 96]
    size: [24, 32]
    fields:
      id: mob_lab_reset_switch
      name: mob_lab_reset_switch
      prompt: "Reset mob lab"
      target_encounter: mob_lab
      action: ResetEncounter

  # Divider wall between antechamber and lab interior. Leaves a 96px
  # opening at the bottom for the encounter trigger / player passage.
  - type: Solid
    px: [400, 0]
    size: [32, 540]
    fields: { name: divider_wall }

  # Encounter trigger — the threshold the player crosses to start it.
  - type: EncounterTrigger
    px: [432, 384]
    size: [96, 256]
    fields:
      id: mob_lab
      name: mob_lab_trigger
      camera_zoom: 1.6

  # Wave 1 (3 sandbag dummies, easy intro).
  - type: EnemySpawn
    px: [600, 600]
    size: [32, 64]
    fields: { name: wave1_a, brain: sandbag_finite }
  - type: EnemySpawn
    px: [720, 600]
    size: [32, 64]
    fields: { name: wave1_b, brain: sandbag_finite }
  - type: EnemySpawn
    px: [840, 600]
    size: [32, 64]
    fields: { name: wave1_c, brain: sandbag_finite }

  # Camera zone over the lab interior so the encounter zoom-out
  # targets a clear bounded region.
  - type: CameraZone
    px: [432, 0]
    size: [592, 768]
    fields: { id: mob_lab_arena, name: mob_lab_arena, mode: Encounter }

  # Debug labels for in-game orientation. Explicit sizes so they fit
  # within level bounds (DebugLabel's authored default is 620x24 which
  # would overflow this 1024-wide level when placed mid-room).
  - type: DebugLabel
    px: [60, 32]
    size: [320, 24]
    fields:
      name: lab_label_antechamber
      text: "Antechamber — switch resets the lab"
      category: Custom
  - type: DebugLabel
    px: [500, 32]
    size: [480, 24]
    fields:
      name: lab_label_arena
      text: "Cross threshold to start encounter"
      category: Custom
