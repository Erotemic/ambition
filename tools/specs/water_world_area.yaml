# Water world — two-pool swim lab.
#
# Layout (1600x768, 100x48 cells, grid 16):
#
#   y=0    [ceiling ███ outer wall ███]
#   y=16   open air                    ║              ║
#   y=272  [door]══entry═platform═════ ║              ║
#   y=304                               ║              ║   ← divider
#   y=448  ~~~ Clear pool surface ~~~  ║~~~ Murky ~~~║
#   y=720  ███ pool floor ███████████████████████████
#   y=752  ███ bottom wall ████████████████████████████
#
# - Entry platform on the left; player walks east and falls into
#   either pool. The pools are physically isolated by a solid
#   divider column (so the swim-up-and-exit gesture is what carries
#   the player from clear to murky).
# - The Water IntGrid layer is painted in a follow-up pass by
#   `tools/paint_water_world_pools.py` because `author_ldtk_area.py`
#   only knows about the Collision IntGrid layer today.
id: water_world
level_id: water_world
world_x: 16000
world_y: 1024
px_wid: 1600
px_hei: 768
fill_collision: empty
bg_color: "#0F2A38"
entities:
  # --- Outer walls (16px borders).
  - type: Solid
    px: [0, 0]
    size: [1600, 16]
    fields: { name: ceiling }
  - type: Solid
    px: [0, 752]
    size: [1600, 16]
    fields: { name: bottom_wall }
  - type: Solid
    px: [0, 16]
    size: [16, 736]
    fields: { name: left_wall }
  - type: Solid
    px: [1584, 16]
    size: [16, 736]
    fields: { name: right_wall }

  # --- Pool floor under both pools.
  - type: Solid
    px: [16, 720]
    size: [1568, 32]
    fields: { name: pool_floor }

  # --- Entry platform: solid block the door sits on top of.
  - type: Solid
    px: [16, 272]
    size: [464, 32]
    fields: { name: entry_platform }

  # --- Divider column between Clear and Murky pools. Tall enough
  # that the player must surface and jump across to traverse from
  # one pool to the other.
  - type: Solid
    px: [960, 304]
    size: [80, 416]
    fields: { name: pool_divider }

  # --- PlayerStart on the entry platform.
  - type: PlayerStart
    px: [80, 226]
    size: [28, 46]
    fields: { name: water_world_spawn }

  # --- Return door back to the basement hub.
  - type: LoadingZone
    px: [40, 176]
    size: [48, 96]
    fields:
      id: return_door
      name: to basement hub
      activation: Door
      target_room: central_hub_complex
      target_zone: water_door
      bidirectional: false

  # --- Debug labels.
  - type: DebugLabel
    px: [60, 64]
    size: [620, 24]
    fields:
      name: water_label_intro
      text: "Two pools: clear (left) is shallow buoyancy; murky (right) hides what's under."
      category: Room
  - type: DebugLabel
    px: [560, 408]
    size: [380, 24]
    fields:
      name: water_label_clear
      text: "~ clear pool ~"
      category: Custom
  - type: DebugLabel
    px: [1100, 408]
    size: [380, 24]
    fields:
      name: water_label_murky
      text: "~ murky pool ~"
      category: Custom
